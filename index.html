    // フルモード解除後にスキップ等が割り込んでも古いタイマーが
    // startCrossfade を余分に発火しないようにする。
    const myOp  = ++operationId;

    const audio   = audios[activeSlot];
    const snapNow = Date.now();
    const rem     = isFinite(audio.duration) ? Math.max(0, audio.duration - audio.currentTime) : 0;
    const endTime = snapNow + rem * 1000;

    // slotEndTime を更新しておく。finishCrossfade の fadeTimer が
    // slotEndTime - Date.now() を参照するためここで合わせる。
    slotEndTime = endTime;

    if (rem > fadeDuration + 1) {
      startCountdown(rem, endTime);
      clearTimeout(fadeTimer);
      fadeTimer = setTimeout(() => {
        if (myOp !== operationId || !isPlaying || isFading || isFullPlay) return;
        // shouldAdvancePlayback: 自然終了なら advance、外部 pause なら様子見
        if (!shouldAdvancePlayback()) return;
        startCrossfade(true);  // operationId はインクリメント済み
      }, Math.max(100, endTime - fadeDuration * 1000 - Date.now()));
    } else {
      // すでにフェード圏内
      startCrossfade(true);
    }

    setUIPlaying(files[currentIdx]?.name ?? '', false);
    // NEXTタイトルを復元
    document.getElementById('nextTitle').textContent = files[nextIdx]?.name ? stripExt(files[nextIdx].name) : '—';
  } else {
    // フルモード開始
    // リピート1と排他: リピート中ならまず解除する（audio.loop=true のままだと
    // フルモードの ended リスナーが永遠に発火しない）
    if (isRepeatOne) {
      isRepeatOne = false;
      audios.forEach(a => { a.loop = false; });
      updateRepeatBtn();
    }
    isFullPlay = true;
    isFading   = false;
    operationId++;               // 古い onMeta / fadeTimer 等を無効化
    clearTimeout(fadeTimer);
    clearTimeout(preloadTimer);
    if (_preloadMetaCleanup) { _preloadMetaCleanup(); _preloadMetaCleanup = null; }
    preloadedForIdx = -1;
    clearInterval(xfadeTimer);
    clearInterval(tickTimer);
    updateFullBtn();

    // クロスフェード中（isFading だった）にフルを押した場合、
    // 必ず inSlot（フェードイン側＝これから流れる新曲）を activeSlot に昇格させる。
    // ユーザーが「フルで聴く」を押す意図は通常「今フェードインしてきた新曲を最後まで」
    // であり、旧来の resolveActiveSlot ベース（ゲイン比較で主役決定）だと
    // フェード前半で out 側（旧曲）が主役のままになり「聴きたい曲と違う」UXバグになっていた。
    // フェード後半（in 側がゲインで勝っているとき）の挙動は従来と同じなので、
    // 「半分以下なら旧曲、半分以上なら新曲」という曖昧さを排除し、必ず新曲側に統一する。
    if (isFading) {
      const newActive = 1 - activeSlot;
      // 旧 active（フェードアウト中）の曲を即停止＆解放
      markInternalAudioOp();
      try { audios[activeSlot].pause(); } catch (_) {}
      clearSlotSrc(activeSlot);
      setSlotGain(activeSlot, 0);
      // インデックスを新主役の曲に揃える（onFullEnded → playTrack(false) が
      // 再生済み旧曲を currentIdx として使う重複ロードバグを防ぐ）
      activeSlot = newActive;
      currentIdx = nextIdx;
      nextIdx    = randIdx(currentIdx);
      // inSlot がまだ play() 完了途中なら起こす（startCrossfade の play() Promise が
      // pending のまま toggleFullPlay が呼ばれたケースの保険）
      const inAudio = audios[activeSlot];
      if (inAudio.src && inAudio.paused) {
        inAudio.play().catch(() => {});
      }
    }
    // フルモードは activeSlot を最終音量 1 で再生するため確実に戻す。
    setSlotGain(activeSlot, 1);

    const audio = audios[activeSlot];
    const myOp  = operationId;

    // 前回フルモードのリスナーが残っていれば先に除去してから登録する。
    if (_onFullEnded) {
      audios.forEach(a => a.removeEventListener('ended', _onFullEnded));
      _onFullEnded = null;
    }

    // 曲が終わったら自動でノーマルへ戻り次の曲へ
    function onFullEnded() {
      audio.removeEventListener('ended', onFullEnded);
      _onFullEnded = null;
      if (myOp !== operationId || !isPlaying || !isFullPlay) return;
      isFullPlay = false;
      updateFullBtn();
      playTrack(false);
    }
    _onFullEnded = onFullEnded;
    audio.addEventListener('ended', onFullEnded);

    startFullCountdown();
    // 現在曲名を確実に表示（クロスフェード途中でフルを押した場合にも対応）
    const currentFile = files[currentIdx];
    if (currentFile) {
      const el = document.getElementById('npTitle');
      el.textContent = stripExt(currentFile.name);
      el.classList.remove('idle');
    }
    setUIFullPlay();
  }
}

function updateFullBtn() {
  const btn = document.getElementById('btnFull');
  if (!btn) return;
  if (isFullPlay) {
    btn.textContent = '⏱ ノーマルへ戻す';
    btn.classList.add('full-active');
    btn.setAttribute('aria-pressed', 'true');
  } else {
    btn.textContent = '♾ フルで聴く';
    btn.classList.remove('full-active');
    btn.setAttribute('aria-pressed', 'false');
  }
}

function startFullCountdown() {
  clearInterval(tickTimer);
  const audio = audios[activeSlot];

  // DOM ref キャッシュ（startCountdown と同様の理由）
  const progressFill = document.getElementById('progressFill');
  const progressBar  = document.getElementById('progressBar');
  let lastAriaVal = -1;

  tickTimer = setInterval(() => {
    if (!isFullPlay) { clearInterval(tickTimer); return; }
    // 一時停止中はバーを更新しない
    if (!isPlaying) return;
    const rem   = isFinite(audio.duration) ? Math.max(0, audio.duration - audio.currentTime) : 0;
    const total = isFinite(audio.duration) ? audio.duration : 1;
    const pct   = total > 0 ? ((total - rem) / total) * 100 : 0;

    progressFill.style.width = pct + '%';
    const ariaVal = Math.round(pct);
    if (ariaVal !== lastAriaVal) {
      progressBar.setAttribute('aria-valuenow', ariaVal);
      lastAriaVal = ariaVal;
    }

    if (rem <= 0) clearInterval(tickTimer);
  }, 80);
}

// ════════════════════════════════════════════════════════
//  CORE: PLAY A TRACK IN THE ACTIVE SLOT
// ════════════════════════════════════════════════════════
function playTrack(first = false) {
  if (!isPlaying) return;
  isFading   = false;
  isFullPlay = false;
  updateFullBtn();
  clearTimeout(fadeTimer);
  clearInterval(xfadeTimer);

  // この呼び出しの世代番号を確定（以降の非同期処理はこれで自分を識別する）
  const myOp = ++operationId;

  // toggleFullPlay が登録した ended リスナーが残っていれば除去する。
  // playTrack は isFullPlay = false をセット済みなので、もし onFullEnded が
  // 発火しても guard で弾かれるが、リスナー自体を残さないほうが安全。
  if (_onFullEnded) {
    audios.forEach(a => a.removeEventListener('ended', _onFullEnded));
    _onFullEnded = null;
  }

  currentIdx = first ? randIdx() : (nextIdx >= 0 ? nextIdx : randIdx());
  nextIdx    = randIdx(currentIdx);

  const slot  = activeSlot;
  const audio = audios[slot];
  const file  = files[currentIdx];

  setSlotGain(slot, 0);   // フェードイン開始点
  highlightFile(currentIdx);
  document.getElementById('nextTitle').textContent = files[nextIdx]?.name ? stripExt(files[nextIdx].name) : '—';

  setSlotSrc(slot, file);

  function onMeta() {
    audio.removeEventListener('loadedmetadata', onMeta);
    audio.removeEventListener('error',          onLoadError);
    audio.removeEventListener('ended', onEnded);   // 先に両方を解除してから判定
    // 世代が変わっていたら（スキップ・停止等）この処理は無効
    if (myOp !== operationId || !isPlaying) return;

    const dur   = audio.duration;
    const total = playDuration + fadeDuration;
    if (isFinite(dur) && dur > total + 2) {
      audio.currentTime = Math.random() * (dur - total - 1);
    } else if (isFinite(dur) && dur > 4) {
      audio.currentTime = Math.random() * (dur * 0.4);
    }

    // audio.load() がブラウザ依存で preservesPitch をリセットする場合があるため、
    // play() 直前に再適用しておく（揺らぎモードの playbackRate が「テープの揺れ」として
    // 効くように、ピッチ補正は明示的に切る）。
    disablePitchPreservation(audio);

    audio.play().then(() => {
      if (myOp !== operationId || !isPlaying) return; // play()完了時に再チェック
      document.getElementById('vinyl').classList.add('spinning');
      setUIPlaying(file.name, true);

      // ── フェードイン（クロスフェード秒数に合わせる）──
      // Web Audio が使える場合はオーディオスレッドでランプし、main スレッド負荷を削減。
      // バックグラウンド時に setInterval がスロットルされてもフェードインが進む。
      const fiSec = fadeDuration;
      if (actx && gainA) {
        const now = actx.currentTime;
        const gNode = slot === 0 ? gainA : gainB;
        gNode.gain.cancelScheduledValues(now);
        gNode.gain.setValueAtTime(0, now);
        gNode.gain.linearRampToValueAtTime(1, now + fiSec);
      } else {
        const fiSteps = Math.max(1, Math.round(fiSec * 20));
        let fi = 0;
        const fiTimer = setInterval(() => {
          if (myOp !== operationId || !isPlaying) { clearInterval(fiTimer); return; }
          fi++;
          setSlotGain(slot, Math.min(fi / fiSteps, 1));
          if (fi >= fiSteps) clearInterval(fiTimer);
        }, 50);
      }

      startCountdown(playDuration + fadeDuration);  // 合計時間でカウント

      // カウントダウンが0になるタイミングにtriggerNextSong
      fadeTimer = setTimeout(() => {
        if (myOp !== operationId || !isPlaying || isFading || isFullPlay) return;
        // shouldAdvancePlayback: 自然終了なら advance、外部 pause なら様子見
        if (!shouldAdvancePlayback()) return;
        triggerNextSong();
      }, (playDuration + fadeDuration) * 1000);

      // ended イベントはここで再登録（世代ガード付き）
      audio.addEventListener('ended', onEnded);

      // ── 次曲プリロード ──
      // playDuration の 50% 経過時点で inSlot を先行ロードしておく。
      // これにより startCrossfade 発火時に loadedmetadata 待ちが不要になり、
      // fadeDuration が短い / ファイルが大きい / ディスクが低速な環境でも
      // クロスフェードが途切れずに始まる。
      clearTimeout(preloadTimer);
      // 前サイクルで残ったプリロードリスナーをクリアしてから新しいタイマーを設定する
      if (_preloadMetaCleanup) { _preloadMetaCleanup(); _preloadMetaCleanup = null; }
      preloadedForIdx = -1;
      preloadTimer = setTimeout(() => {
        if (myOp !== operationId || !isPlaying || isFading) return;
        schedulePreload(nextIdx, myOp, 1 - slot);
      }, Math.max(0, playDuration * 0.5 * 1000));

    }).catch(err => {
      if (myOp !== operationId || !isPlaying) return;
      console.warn('Play failed:', err);
      // 失敗の主因は AudioContext suspend or 自動再生ポリシー。
      // resume を試みてから世代ガード越しにリトライする。
      if (actx && actx.state === 'suspended') actx.resume().catch(() => {});
      setTimeout(() => { if (myOp === operationId && isPlaying) playTrack(false); }, 500);
    });
  }

  function onEnded() {
    audio.removeEventListener('ended', onEnded);
    if (myOp !== operationId || !isPlaying || isFading || isFullPlay) return;
    clearTimeout(fadeTimer);
    triggerNextSong();
  }

  // ── ロードエラー時の自動スキップ ──
  // MediaError（デコード失敗・ファイル破損など）で loadedmetadata が
  // 永遠に来ないケースをカバーする。世代ガード付きで次曲へ自動スキップ。
  function onLoadError(e) {
    audio.removeEventListener('loadedmetadata', onMeta);
    audio.removeEventListener('error',          onLoadError);
    audio.removeEventListener('ended',          onEnded);
    if (myOp !== operationId || !isPlaying) return;
    console.warn('Audio load error, skipping track:', file?.name, e);
    setTimeout(() => { if (myOp === operationId && isPlaying) playTrack(false); }, 300);
  }

  audio.addEventListener('loadedmetadata', onMeta);
  audio.addEventListener('error',          onLoadError);
  audio.load();
}

// ════════════════════════════════════════════════════════
//  PRELOAD — 再生中に次曲を先行ロード
//  playTrack の中盤でタイマー起動し、クロスフェード開始前に
//  inSlot の src セット・load・シーク位置決定まで済ませておく。
//  startCrossfade がプリロード済みを検知した場合は loadedmetadata
//  待ちをスキップして即 play() へ移行することでプツン切れを防ぐ。
// ════════════════════════════════════════════════════════
function schedulePreload(targetIdx, myOp, inSlot) {
  // 前回の schedulePreload が登録した onPreloadMeta が残っていれば先に除去する。
  // 連続スキップや設定変更で schedulePreload が再呼び出しされた場合に
  // 古いリスナーが loadedmetadata を誤処理するのを防ぐ。
  if (_preloadMetaCleanup) { _preloadMetaCleanup(); _preloadMetaCleanup = null; }

  if (isFading || targetIdx < 0 || !files[targetIdx]) return;

  const inAudio = audios[inSlot];
  const inFile  = files[targetIdx];

  setSlotGain(inSlot, 0);     // 無音で準備
  setSlotSrc(inSlot, inFile);

  function onPreloadMeta() {
    inAudio.removeEventListener('loadedmetadata', onPreloadMeta);
    inAudio.removeEventListener('error',          onPreloadError);
    _preloadMetaCleanup = null;
    if (myOp !== operationId || !isPlaying || isFading) return;

    const dur   = inAudio.duration;
    const total = playDuration + fadeDuration;
    if (isFinite(dur) && dur > total + 2) {
      inAudio.currentTime = Math.random() * (dur - total - 1);
    } else if (isFinite(dur) && dur > 4) {
      inAudio.currentTime = Math.random() * (dur * 0.4);
    }

    preloadedForIdx = targetIdx;
  }

  // プリロード中にファイルが読めなかった場合はリスナーを解除してリセットするだけ。
  // startCrossfade は preloadedForIdx !== nextIdx を検知して自力でロードし直す。
  function onPreloadError() {
    inAudio.removeEventListener('loadedmetadata', onPreloadMeta);
    inAudio.removeEventListener('error',          onPreloadError);
    _preloadMetaCleanup = null;
    preloadedForIdx = -1;
    console.warn('Preload error, will reload on crossfade:', inFile?.name);
  }

  _preloadMetaCleanup = () => {
    inAudio.removeEventListener('loadedmetadata', onPreloadMeta);
    inAudio.removeEventListener('error',          onPreloadError);
  };
  inAudio.addEventListener('loadedmetadata', onPreloadMeta);
  inAudio.addEventListener('error',          onPreloadError);
  inAudio.load();
}

// ════════════════════════════════════════════════════════
//  TRIGGER NEXT SONG ― カウント0と同時に呼ばれる司令塔
//  ① 曲名を次の曲に切り替え（履歴追加）
//  ② 新しい20秒カウントダウンをスタート
//  ③ クロスフェードを開始
// ════════════════════════════════════════════════════════
function triggerNextSong() {
  if (!isPlaying || isFading || isFullPlay || isRepeatOne) return;

  // ① NOW PLAYINGを次の曲名に切り替え（カウント0の瞬間）
  const nextFile = files[nextIdx];
  if (nextFile) setUIPlaying(nextFile.name, true);

  // ② operationId をここでインクリメントし startCrossfade に伝える。
  //    startCrossfade 内で二重インクリメントされるのを防ぐ。
  operationId++;
  slotEndTime = Date.now() + (playDuration + fadeDuration) * 1000;
  startCountdown(playDuration + fadeDuration, slotEndTime);

  // ③ クロスフェード開始（operationId はインクリメント済み）
  startCrossfade(true);
}

// ════════════════════════════════════════════════════════
//  CROSSFADE
// ════════════════════════════════════════════════════════
function startCrossfade(alreadyBumped = false) {
  if (!isPlaying || isFading || isRepeatOne) return;
  isFading = true;
  clearTimeout(fadeTimer);
  clearTimeout(preloadTimer);  // 進行中のプリロードタイマーを止める

  // この呼び出しの世代番号を確定
  // skipTrack 等が呼び出し前に operationId をインクリメント済みの場合は
  // 二重インクリメントを避けるため現在値をそのまま使う。
  const myOp = alreadyBumped ? operationId : ++operationId;

  const outSlot = activeSlot;
  const inSlot  = 1 - activeSlot;
  const inAudio = audios[inSlot];
  const inFile  = files[nextIdx];

  if (!inFile) {
    // ファイルが見つからない場合もスロット情報を渡して
    // activeSlot と currentIdx が正しく更新されるようにする。
    isFading = false;
    finishCrossfade(outSlot, inSlot);
    return;
  }

  setSlotGain(inSlot, 0);

  function onNextMeta() {
    inAudio.removeEventListener('loadedmetadata', onNextMeta);
    inAudio.removeEventListener('error',          onNextLoadError);
    // バグ②: isFullPlay もガードする。
    // ロード待ち中にユーザーがフルモードをONにした場合、
    // クロスフェードをここで止めて何もしない。
    if (myOp !== operationId || !isPlaying || isFullPlay) return;

    // プリロード時にシーク済みでなければここで決定する
    // （nextIdx が skip 等で変わっていた場合もここで再シークされる）
    if (preloadedForIdx !== nextIdx) {
      const dur   = inAudio.duration;
      const total = playDuration + fadeDuration;
      if (isFinite(dur) && dur > total + 2) {
        inAudio.currentTime = Math.random() * (dur - total - 1);
      } else if (isFinite(dur) && dur > 4) {
        inAudio.currentTime = Math.random() * (dur * 0.4);
      }
    }

    // audio.load() 後にブラウザが preservesPitch をリセットする可能性に備えて再適用
    disablePitchPreservation(inAudio);

    inAudio.play().then(() => {
      if (myOp !== operationId || !isPlaying || isFullPlay) return; // play()完了時に再チェック
      setUIFading();

      // ── 新曲の ended リスナー登録 ──
      // 以前は startCrossfade で乗ってきた曲に ended リスナーが付かず、
      // 何らかの理由（drift・短い audio）で fadeTimer より先に自然終了すると
      // triggerNextSong が呼ばれず音が止まる致命バグがあった。
      // ここで世代ガード付きの ended ハンドラを登録して保険にする。
      function onCrossfadeEnded() {
        inAudio.removeEventListener('ended', onCrossfadeEnded);
        if (myOp !== operationId || !isPlaying || isFading || isFullPlay) return;
        clearTimeout(fadeTimer);
        triggerNextSong();
      }
      inAudio.addEventListener('ended', onCrossfadeEnded);

      clearInterval(xfadeTimer);

      const startOutGain = (actx && gainA)
        ? (outSlot === 0 ? gainA.gain.value : gainB.gain.value)
        : 1;

      if (actx && gainA) {
        // Web Audio のオーディオスレッド側でランプを実行する。
        // バックグラウンド時に main スレッド setInterval がスロットルされても
        // ゲイン遷移は AudioContext 時間軸で正確に進むのでクロスフェードが途切れない。
        const now = actx.currentTime;
        const outNode = outSlot === 0 ? gainA : gainB;
        const inNode  = inSlot  === 0 ? gainA : gainB;

        outNode.gain.cancelScheduledValues(now);
        outNode.gain.setValueAtTime(startOutGain, now);
        outNode.gain.linearRampToValueAtTime(0, now + fadeDuration);

        inNode.gain.cancelScheduledValues(now);
        inNode.gain.setValueAtTime(0, now);
        inNode.gain.linearRampToValueAtTime(1, now + fadeDuration);

        xfadeTimer = setTimeout(() => {
          if (myOp === operationId && isPlaying) finishCrossfade(outSlot, inSlot);
        }, fadeDuration * 1000);
      } else {
        // Web Audio 未対応環境: 旧来の setInterval ランプ
        const totalSteps = fadeDuration * 20;
        let step = 0;
        xfadeTimer = setInterval(() => {
          if (myOp !== operationId || !isPlaying) { clearInterval(xfadeTimer); return; }
          step++;
          const t = Math.min(step / totalSteps, 1);
          setSlotGain(outSlot, startOutGain * (1 - t));
          setSlotGain(inSlot,  t);

          if (t >= 1) {
            clearInterval(xfadeTimer);
            if (myOp === operationId) finishCrossfade(outSlot, inSlot);
          }
        }, 50);
      }

    }).catch(err => {
      // バグ③: play() 失敗時に finishCrossfade でスロットを切り替えると
      // inAudio が無音のまま activeSlot になってしまう。
      // isFading を解除して playTrack で仕切り直す。
      if (myOp !== operationId || !isPlaying) return;
      console.warn('Next play failed:', err);
      isFading = false;
      setSlotGain(outSlot, 1);   // outSlot を音量MAX に戻す
      setSlotGain(inSlot,  0);
      // 失敗主因は AudioContext suspend のことが多い。resume を試みてから仕切り直す。
      if (actx && actx.state === 'suspended') actx.resume().catch(() => {});
      setTimeout(() => { if (myOp === operationId && isPlaying) playTrack(false); }, 300);
    });
  }

  // ── クロスフェード先のロードエラー時の回復 ──
  // 次曲ファイルが破損している等で loadedmetadata が来ない場合に
  // finishCrossfade でスロット切替だけ済ませ、その後 playTrack が
  // 新たな曲を選びなおす（finishCrossfade 内の fadeTimer で自然につながる）。
  function onNextLoadError(e) {
    inAudio.removeEventListener('loadedmetadata', onNextMeta);
    inAudio.removeEventListener('error',          onNextLoadError);
    if (myOp !== operationId || !isPlaying) return;
    console.warn('Next audio load error, skipping to next:', inFile?.name, e);
    isFading = false;
    // nextIdx を更新してから playTrack で仕切り直す
    nextIdx = randIdx(currentIdx);
    setTimeout(() => { if (myOp === operationId && isPlaying) playTrack(false); }, 300);
  }

  // プリロード済み（同じ nextIdx で loadedmetadata 取得・シーク完了）かどうか確認。
  // readyState >= 1 (HAVE_METADATA) で duration が利用可能な状態を保証する。
  if (preloadedForIdx === nextIdx && inAudio.readyState >= 1) {
    // loadedmetadata 待ちをスキップして即 play() へ
    // プリロードリスナーはすでに自己解除済みのため _preloadMetaCleanup は null のはずだが念のためクリア
    _preloadMetaCleanup = null;
    onNextMeta();
  } else {
    // 未プリロード / nextIdx が変わっていた場合は改めてロードする。
    // 古い onPreloadMeta が inAudio に残っている可能性があるため先に明示除去する。
    // （除去しないと loadedmetadata が onPreloadMeta と onNextMeta の両方に届き
    //   世代ガードで弾かれるだけだが、不要なリスナー残存を避けて意図を明確にする）
    if (_preloadMetaCleanup) { _preloadMetaCleanup(); _preloadMetaCleanup = null; }
    setSlotSrc(inSlot, inFile);
    inAudio.addEventListener('loadedmetadata', onNextMeta);
    inAudio.addEventListener('error',          onNextLoadError);
    inAudio.load();
  }
}

function finishCrossfade(outSlot, inSlot) {
  if (!isPlaying) return;
  isFading = false;

  // クロスフェード完了時点でプリロード関連状態を明示リセットする。
  // 次の playTrack / schedulePreload サイクルが始まる前にクリーンな状態を保証する。
  if (_preloadMetaCleanup) { _preloadMetaCleanup(); _preloadMetaCleanup = null; }
  preloadedForIdx = -1;

  if (outSlot !== undefined) {
    // ★重要★ クロスフェード完了時の outSlot pause は内部処理。
    // markInternalAudioOp なしだと onExternalPause が pauseStartMs を立て、
    // 次の startCrossfade の inAudio.play() で slotEndTime が ~playDuration ぶん
    // ずれ、ループ毎に蓄積。最終的に audio.duration を超えて音が止まる。
    markInternalAudioOp();
    try { audios[outSlot].pause(); } catch (_) {}
    clearSlotSrc(outSlot);
    setSlotGain(outSlot, 0);
  }

  if (inSlot !== undefined) activeSlot = inSlot;
  setSlotGain(activeSlot, 1);

  currentIdx = nextIdx;
  nextIdx    = randIdx(currentIdx);

  highlightFile(currentIdx);
  document.getElementById('nextTitle').textContent = files[nextIdx]?.name ? stripExt(files[nextIdx].name) : '—';

  // 曲名・カウントダウンはtriggerNextSongで既に設定済み
  // ステータスをPLAYINGに戻す（tickでも更新されるが即時反映のため）
  document.getElementById('statusDot').className   = 'status-dot on';
  document.getElementById('statusText').textContent = 'PLAYING';

  // slotEndTime（次のカウント0）まで待ってtriggerNextSong
  // operationId を世代ガードに使うことで、スキップ・連打時に
  // 古い finishCrossfade のタイマーが余分に triggerNextSong を
  // 発火するのを防ぐ。
  //
  // toggleFullPlay 解除→クロスフェード完了後は slotEndTime が既に過去の時刻になっており、
  // そのまま使うと triggerNextSong が 100ms 後に即発火してしまう。
  // slotEndTime の残り時間が playDuration の半分未満のとき（＝期限切れ or 過去）
  // 新しい曲に対してフルスロットをリセットする。
  const leftMs = slotEndTime - Date.now();
  if (leftMs < playDuration * 500) {
    slotEndTime = Date.now() + (playDuration + fadeDuration) * 1000;
    startCountdown(playDuration + fadeDuration, slotEndTime);
  }
  const myFinishOp = operationId;
  clearTimeout(fadeTimer);
  fadeTimer = setTimeout(() => {
    if (myFinishOp !== operationId || !isPlaying || isFading || isFullPlay) return;
    // shouldAdvancePlayback: 自然終了なら advance、外部 pause なら様子見
    if (!shouldAdvancePlayback()) return;
    triggerNextSong();
  }, Math.max(100, slotEndTime - Date.now()));
}

// ════════════════════════════════════════════════════════
//  SKIP (クロスフェードで切り替え)
// ════════════════════════════════════════════════════════
function skipTrack() {
  if (!isPlaying) return;

  // リピート1 中: 新しいランダム曲をリピート対象として頭から再生し直す
  if (isRepeatOne) {
    playRepeatOneTrack(randIdx(currentIdx));
    return;
  }

  // クロスフェード中でも受け付ける。
  // 進行中の xfadeTimer・loadedmetadata 待ちをすべて無効化してから
  // スロット状態を手動でリセットし、新しいクロスフェードを開始する。

  // 入る前に「クロスフェード中だったか」を控える。
  // 通常再生中(false): 予告した nextIdx をそのまま再生してUI表示と一致させる。
  // クロスフェード中(true): すでにフェードイン中の曲を current に確定し、
  //   さらに新しい乱数を引いて「もう一段先」へ進める。
  const wasFading = isFading;

  operationId++;                 // 進行中のすべての非同期コールバックを無効化
  isFullPlay = false;
  isFading   = false;            // クロスフェード中フラグを強制解除
  clearTimeout(fadeTimer);
  clearTimeout(preloadTimer);
  if (_preloadMetaCleanup) { _preloadMetaCleanup(); _preloadMetaCleanup = null; }
  if (_onFullEnded) { audios.forEach(a => a.removeEventListener('ended', _onFullEnded)); _onFullEnded = null; }
  preloadedForIdx = -1;
  // xfadeTimer は startCrossfade の Web Audio ルートでは setTimeout、
  // フォールバックでは setInterval で使われるため両方クリアする。
  clearTimeout(xfadeTimer);
  clearInterval(xfadeTimer);
  clearInterval(tickTimer);
  updateFullBtn();

  // クロスフェード途中でスキップした場合、ゲインが大きい方（主役）を
  // activeSlot に昇格させ、小さい方を止める。
  // ゲインはいじらず現在値のまま startCrossfade に引き継ぐ（急激な音量変化を防ぐ）。
  resolveActiveSlot();

  if (wasFading) {
    // クロスフェード中だった: 進行中だった曲(=旧nextIdx)はもう聴いたとみなして
    // current に確定し、次のランダム曲へ進む。
    if (nextIdx >= 0) currentIdx = nextIdx;
    nextIdx = randIdx(currentIdx);
  }
  // 通常再生中(wasFading=false)は nextIdx を維持して UI 表示通りの曲へ移行する。
  // currentIdx / nextIdx の更新は finishCrossfade に任せる。

  const nextFile = files[nextIdx];
  if (nextFile) setUIPlaying(nextFile.name, true);

  slotEndTime = Date.now() + (fadeDuration + playDuration) * 1000;
  startCountdown(fadeDuration + playDuration, slotEndTime);
  startCrossfade(true);  // operationId は skipTrack 内でインクリメント済み
}

// ════════════════════════════════════════════════════════
//  COUNTDOWN (ノーマルモード) ― 合計時間からカウント
// ════════════════════════════════════════════════════════
// anchorEndTime を渡すと slotEndTime をその値で固定し Date.now() を再サンプルしない。
// toggleFullPlay 解除時など「呼び出し元が既に終了時刻を決定済み」の場合に使う。
function startCountdown(totalSec, anchorEndTime) {
  clearInterval(tickTimer);
  slotEndTime = (anchorEndTime !== undefined) ? anchorEndTime : Date.now() + totalSec * 1000;
  // カウント開始時点の終了時刻を固定して pct 計算の基準にする。
  // triggerNextSong が slotEndTime を上書きした後も "今のサイクルの全体幅" を
  // 保持するため、tick クロージャは startTime を独自に持つ。
  let startTime = Date.now();
  // 一時停止中に実時間が経過しても elapsed が進まないよう、
  // ポーズ開始時刻を記録して再開時に startTime を補正する。
  let pausedAt = null;  // null = 再生中、Date.now() = ポーズ中

  // ── DOM ref キャッシュ ──
  // 80ms 間隔で getElementById が 5回×12.5Hz/秒 = 62回/秒 呼ばれていたのを
  // クロージャに閉じ込めて一度だけ取得する。tick あたりの DOM lookup は 0 回。
  const progressFill = document.getElementById('progressFill');
  const progressBar  = document.getElementById('progressBar');
  const statusDot    = document.getElementById('statusDot');
  const statusText   = document.getElementById('statusText');
  const pillPlay     = document.getElementById('pillPlay');
  const pillFade     = document.getElementById('pillFade');

  // full-mode クラスは tick で毎回 remove していたが、サイクル開始時に一度で十分。
  progressFill.classList.remove('full-mode');

  let lastAriaVal = -1;       // aria-valuenow の重複書込み抑止
  let prevFading  = null;     // phase pill の重複書込み抑止

  function tick() {
    if (isFullPlay) { clearInterval(tickTimer); return; }
    // 一時停止中はバーを更新しない（実時間が経過してもプログレスを進めない）
    if (!isPlaying) {
      // ポーズ開始時刻を記録（初回のみ）
      if (pausedAt === null) pausedAt = Date.now();
      return;
    }
    // 再開直後: ポーズ中に経過した時間を startTime に加算してバーの跳びを防ぐ
    if (pausedAt !== null) {
      startTime += Date.now() - pausedAt;
      pausedAt = null;
    }
    const rem     = Math.max(0, (slotEndTime - Date.now()) / 1000);
    // 経過時間をスロット開始から測り、終了時刻との差分で全体幅を動的に求める。
    // これにより triggerNextSong が slotEndTime をリセットしても
    // プログレスバーが瞬間的に跳ぶ（あるいは 0 に戻る）ことを防ぐ。
    const elapsed  = (Date.now() - startTime) / 1000;
    const spanSec  = elapsed + rem;                    // 現時点で見える全体幅
    const pct      = spanSec > 0 ? (elapsed / spanSec) * 100 : 0;

    progressFill.style.width = pct + '%';

    // スクリーンリーダー向け aria-valuenow は整数で十分（書込頻度を下げる）
    const ariaVal = Math.round(pct);
    if (ariaVal !== lastAriaVal) {
      progressBar.setAttribute('aria-valuenow', ariaVal);
      lastAriaVal = ariaVal;
    }

    // クロスフェード中かどうかで表示を切り替え（状態遷移時のみ DOM 書込み）
    if (isFading !== prevFading) {
      if (isFading) {
        statusDot.className   = 'status-dot xfade';
        statusText.textContent = 'CROSSFADING...';
        pillPlay.classList.remove('active');
        pillFade.classList.add('fading-pill');
      } else {
        pillPlay.classList.add('active');
        pillFade.classList.remove('fading-pill');
      }
      prevFading = isFading;
    }

    if (rem <= 0) clearInterval(tickTimer);
  }
  tick();
  tickTimer = setInterval(tick, 80);
}

// ════════════════════════════════════════════════════════
//  UI HELPERS
// ════════════════════════════════════════════════════════
// addHistory: true=履歴に追加、false=タイトル更新のみ
function setUIPlaying(title, addHistoryFlag = true) {
  const el = document.getElementById('npTitle');
  el.textContent = stripExt(title);
  el.classList.remove('idle');

  if (addHistoryFlag) addToHistory(title);

  // REPEAT 1 中は setUIRepeatOne がステータスを上書きするためここでは触らない
  if (!isFullPlay && !isRepeatOne) {
    document.getElementById('statusDot').className   = 'status-dot on';
    document.getElementById('statusText').textContent = 'PLAYING';
    document.getElementById('pillPlay').classList.add('active');
    document.getElementById('pillFade').classList.remove('fading-pill');
    document.getElementById('pillFull').classList.remove('full-pill');
  }

  // ロック画面/通知パネルにもタイトルを反映
  updateMediaSessionMetadata(title);
  setMediaSessionPlaybackState('playing');
}

function setUIFading() {
  document.getElementById('statusDot').className   = 'status-dot xfade';
  document.getElementById('statusText').textContent = 'CROSSFADING...';
}

function setUIFullPlay() {
  document.getElementById('statusDot').className   = 'status-dot full';
  document.getElementById('statusText').textContent = 'FULL PLAY';
  document.getElementById('pillPlay').classList.remove('active');
  document.getElementById('pillFade').classList.remove('fading-pill');
  document.getElementById('pillFull').classList.add('full-pill');
  document.getElementById('progressFill').classList.add('full-mode');
  document.getElementById('nextTitle').textContent = '— フルで再生中 —';
}

function setUIIdle() {
  const el = document.getElementById('npTitle');
  el.textContent = '— フォルダを選択して再生を開始してください —';
  el.classList.add('idle');

  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('progressFill').classList.remove('full-mode');
  document.getElementById('progressBar').setAttribute('aria-valuenow', '0');
  document.getElementById('nextTitle').textContent     = '—';
  document.getElementById('statusDot').className       = 'status-dot';
  document.getElementById('statusText').textContent    = 'STOPPED';
  document.getElementById('pillPlay').classList.remove('active');
  document.getElementById('pillFade').classList.remove('fading-pill');
  document.getElementById('pillFull').classList.remove('full-pill');

  // 停止時に再生履歴をリセットして非表示に戻す
  playHistory = [];
  document.getElementById('historyList').innerHTML = '';
  document.getElementById('historyWrap').style.display = 'none';

  // 通知パネル / ロック画面の状態をクリア
  setMediaSessionPlaybackState('none');
}

// ════════════════════════════════════════════════════════
//  AUDIO INTERRUPTION AUTO-RESUME
//  電話などで中断された後、自動的に再開する
// ════════════════════════════════════════════════════════
(function setupAutoResume() {
  // 中断直前に再生中だったかどうかを記憶するフラグ。
  // - audio 要素の 'pause' イベント（外部要因による pause）でセットされる
  // - AudioContext の 'statechange'（running 復帰）で参照・クリアされる
  // - visibilitychange（タブ復帰）でも参照・クリアされる
  // 以前は 100ms ポーリングで actx.state を監視していたが、'statechange' イベントで
  // 同じ用途をカバーできるためポーリングは削除した（バッテリ消費を抑制）。
  let wasPlayingBeforeInterrupt = false;

  // 外部 pause が始まった wall-clock 時刻（0=非 pause）。
  // 電話着信などで audio が pause されると fadeTimer が wall-clock 基準で進み続けて
  // 復帰直後にいきなり次曲へ飛ぶバグの原因になるため、pause 期間ぶん slotEndTime を
  // 後ろへずらし、fadeTimer を再スケジュールする。
  let pauseStartMs = 0;

  // ── 揺らぎループの可視/不可視制御 ──
  // 可視中: 65ms で滑らかにティック。
  // 不可視中: 完全停止して CPU ウェイクアップをゼロにする。ゲイン/フィルター/playbackRate は
  // 最後の値が保持されるので音は途切れず鳴り続ける（バックグラウンドで揺らぎが固定されるだけ）。
  const WOBBLE_INTERVAL_VISIBLE = 65;
  function applyWobbleVisibilityRate() {
    if (document.hidden) {
      // 不可視中: ループ完全停止
      if (wobbleLoopId) { clearInterval(wobbleLoopId); wobbleLoopId = null; }
    } else if (wobbleIntensity > 0 && !wobbleLoopId) {
      // 可視復帰: wobble 有効なら再起動
      wobbleLoopId = setInterval(wobbleTick, WOBBLE_INTERVAL_VISIBLE);
    }
  }

  // ── スリープタイマー表示の可視/不可視制御 ──
  // 不可視中は valSleep の DOM 更新が無意味なので 1Hz タイマーを停止する。
  // タイマー満了の本体（sleepTimerId の setTimeout）は wall-clock で進むので別に止めない。
  function applySleepDisplayVisibility() {
    if (document.hidden) {
      if (sleepDisplayTimer) { clearInterval(sleepDisplayTimer); sleepDisplayTimer = null; }
    } else if (sleepEndTime > 0 && !sleepDisplayTimer) {
      // 表示を即座に同期してから 1Hz 再開
      const rem = Math.max(0, sleepEndTime - Date.now());
      const m = Math.floor(rem / 60000);
      const s = Math.floor((rem % 60000) / 1000);
      const v = document.getElementById('valSleep');
      if (v) v.textContent = m + ':' + String(s).padStart(2, '0');
      sleepDisplayTimer = setInterval(() => {
        const r = Math.max(0, sleepEndTime - Date.now());
        const mm = Math.floor(r / 60000);
        const ss = Math.floor((r % 60000) / 1000);
        const vv = document.getElementById('valSleep');
        if (vv) vv.textContent = mm + ':' + String(ss).padStart(2, '0');
        if (r <= 0) { clearInterval(sleepDisplayTimer); sleepDisplayTimer = null; }
      }, 1000);
    }
  }

  // 各オーディオ要素の最終 currentTime（停滞検出用）
  const _lastTime = [0, 0];

  // visibilitychange: 画面オフ/別タブで UI タイマーを止め、復帰時に再開する。
  // ユーザーが MediaSession ポーズで明示的に止めた場合は再開を抑止する。
  document.addEventListener('visibilitychange', () => {
    const vinyl = document.getElementById('vinyl');

    if (document.visibilityState !== 'visible') {
      // ── 画面が隠れた: UI 更新タイマーを止めて電力を節約 ──
      // クロスフェードと fadeTimer は wall-clock 駆動なので止めなくて良い。
      // tickTimer・vinyl アニメ・wobble・スリープ表示は全停止。
      clearInterval(tickTimer);
      if (vinyl) vinyl.style.animationPlayState = 'paused';
      applyWobbleVisibilityRate();
      applySleepDisplayVisibility();
      // 停滞検出用の現在位置をスナップショット
      _lastTime[0] = audios[0].currentTime || 0;
      _lastTime[1] = audios[1].currentTime || 0;
      return;
    }

    // ── 画面が戻った ──
    if (vinyl) vinyl.style.animationPlayState = '';
    applyWobbleVisibilityRate();
    applySleepDisplayVisibility();

    if (!isPlaying) return;

    // UI タイマーを再開して現在位置を即時反映
    if (isFullPlay) {
      startFullCountdown();
    } else if (isRepeatOne) {
      startRepeatCountdown();
    } else {
      const remSec = Math.max(0, (slotEndTime - Date.now()) / 1000);
      startCountdown(remSec, slotEndTime);
    }

    // ユーザーが意図的にポーズした状態なら、自動で鳴らさない
    if (userPaused) return;

    // AudioContext が止まっていたら再開してから audio.play() を試みる
    const resumeIfNeeded = () => {
      if (actx && actx.state === 'suspended') {
        return actx.resume().catch(() => {});
      }
      return Promise.resolve();
    };
    resumeIfNeeded().then(() => {
      audios.forEach(a => {
        if (a.src && a.paused) a.play().catch(() => {});
      });
      // ── 停滞検出: 不可視中に currentTime がほとんど進んでいなければ
      //   バックグラウンドで音が止まっていた可能性 → 仕切り直す ──
      const cur = audios[activeSlot];
      if (cur && cur.src && !isFading) {
        const advanced = (cur.currentTime || 0) - (_lastTime[activeSlot] || 0);
        // 1 秒以上不可視で 0.3 秒以下しか進んでない、かつ duration 終端でもないなら停滞とみなす
        const nearEnd = isFinite(cur.duration) && (cur.duration - cur.currentTime) < 0.5;
        if (advanced < 0.3 && !nearEnd && !cur.paused) {
          // ループ再生中に止まっていた疑い：軽くキックして起こす
          cur.play().catch(() => {});
        }
      }
    });
  });

  // ── Page Lifecycle: タブ凍結→復帰の保険 ──
  // Brave/Chrome は省メモリのため非アクティブタブを freeze することがある。
  // 'resume' イベントはタブが解凍された直後に発火するので、ここで明示的に
  // AudioContext / audio 要素を起こし直す。
  document.addEventListener('resume', () => {
    if (!isPlaying || userPaused) return;
    if (actx && actx.state === 'suspended') {
      actx.resume().catch(() => {});
    }
    audios.forEach(a => {
      if (a.src && a.paused) a.play().catch(() => {});
    });
  });

  // pause イベントで中断を検知（電話着信など外部要因による pause）
  // ユーザーの意図的な STOP とは isPlaying で区別できる
  function onExternalPause(e) {
    // 内部処理（finishCrossfade / resolveActiveSlot / stopAll 等）が呼んだ
    // audio.pause() のイベントは無視する。誤検知させると slotEndTime が
    // クロスフェード毎に約 playDuration ぶん後ろへずれていく重大バグになる。
    if (_internalAudioOp > 0) return;
    if (!isPlaying) return; // ユーザーが止めた場合は何もしない
    if (pauseStartMs === 0) pauseStartMs = Date.now();
    wasPlayingBeforeInterrupt = true;
  }

  function onExternalPlay() {
    // 一時停止期間ぶん slotEndTime を遅らせて fadeTimer を再スケジュール
    if (pauseStartMs > 0 && isPlaying) {
      const pausedMs = Date.now() - pauseStartMs;
      pauseStartMs = 0;
      slotEndTime += pausedMs;

      // 通常再生中（クロスフェードでもフルでもリピート1でもない）のみ再スケジュール対象。
      // クロスフェード中は xfadeTimer が短時間で済むので無視、フルは ended で進む。
      // リピート1は fadeTimer を使わないため、不要なタイマーをセットしない。
      if (!isFading && !isFullPlay && !isRepeatOne) {
        clearTimeout(fadeTimer);
        const opAtResume = operationId;
        const remMs = Math.max(100, slotEndTime - Date.now());
        fadeTimer = setTimeout(() => {
          if (opAtResume !== operationId || !isPlaying || isFading || isFullPlay || isRepeatOne) return;
          if (!shouldAdvancePlayback()) return;
          triggerNextSong();
        }, remMs);
      }
    }
    wasPlayingBeforeInterrupt = false;
  }

  // audios 配列に対してリスナーを設定
  // (audios は initAudioContext より前に定義されているため直接登録)
  audios.forEach(a => {
    a.addEventListener('pause', onExternalPause);
    a.addEventListener('play',  onExternalPlay);
  });

  // AudioContext の statechange リスナーは initAudioContext() 内で
  // actx 生成と同時に登録するため、ここでのポーリング登録は廃止。
  // （旧実装は actx が一度も作られないと setInterval が永続して電池を浪費していた）

  // ── audio.error: 再生中の致命的エラーから自動復旧 ──
  // ファイル破損・ネットワーク中断・デコード失敗等でいきなり止まったときに
  // 次曲へリカバリする。世代 (operationId) ガード付き。
  audios.forEach((a, slot) => {
    a.addEventListener('error', () => {
      if (!isPlaying) return;
      if (slot !== activeSlot && !isFading) return;
      console.warn('Audio runtime error on slot', slot, a.error);
      const opAtError = operationId;
      setTimeout(() => {
        if (opAtError !== operationId || !isPlaying) return;
        // AudioContext を起こしてから仕切り直す
        if (actx && actx.state === 'suspended') actx.resume().catch(() => {});
        playTrack(false);
      }, 400);
    });
    // stalled: 進行が止まったが error ではない（ネットワーク stall 等）。
    // 連発するので debounce + ガード。
    let _stallTimer = null;
    a.addEventListener('stalled', () => {
      if (!isPlaying) return;
      if (slot !== activeSlot && !isFading) return;
      clearTimeout(_stallTimer);
      const opAtStall = operationId;
      _stallTimer = setTimeout(() => {
        if (opAtStall !== operationId || !isPlaying) return;
        // まだ再生されている（pausedでない）なら問題ない場合もあるが、
        // 1.5秒以上 currentTime が動いていないかを軽くチェック
        const t0 = a.currentTime;
        setTimeout(() => {
          if (opAtStall !== operationId || !isPlaying) return;
          if (a.currentTime <= t0 + 0.05 && !a.paused) {
            if (actx && actx.state === 'suspended') actx.resume().catch(() => {});
            a.play().catch(() => {});
          }
        }, 1500);
      }, 1500);
    });
  });
})();

// ════════════════════════════════════════════════════════
//  MUTE (M キー / マスターボリュームラベルクリック)
// ════════════════════════════════════════════════════════
// ミュート前の音量を保持する。0 を保存しないように 0 以下なら 0.8 にフォールバック。
let _preMuteVol = 0.8;

function toggleMute() {
  const slider = document.getElementById('sliderVol');
  const label  = document.getElementById('volLabel');
  if (!slider) return;
  const current = +slider.value;
  if (current > 0) {
    // ミュート ON
    _preMuteVol = current / 100;
    slider.value = 0;
    if (label) { label.classList.add('muted'); label.setAttribute('aria-pressed', 'true'); }
  } else {
    // ミュート解除
    const restore = _preMuteVol > 0 ? _preMuteVol : 0.8;
    slider.value = Math.round(restore * 100);
    if (label) { label.classList.remove('muted'); label.setAttribute('aria-pressed', 'false'); }
  }
  onVolumeChange();
}

// ════════════════════════════════════════════════════════
//  SLEEP TIMER
// ════════════════════════════════════════════════════════
let sleepTimerId       = null;
let sleepDisplayTimer  = null;
let sleepEndTime       = 0;

function setSleepTimer(minutes) {
  clearTimeout(sleepTimerId);
  clearInterval(sleepDisplayTimer);
  sleepTimerId = null;
  sleepDisplayTimer = null;

  document.querySelectorAll('.sleep-btn').forEach(b => {
    b.classList.toggle('active', +b.dataset.min === minutes);
  });

  if (!minutes || minutes <= 0) {
    sleepEndTime = 0;
    const v = document.getElementById('valSleep');
    if (v) v.textContent = '—';
    return;
  }

  sleepEndTime = Date.now() + minutes * 60 * 1000;

  function updateDisplay() {
    const rem = Math.max(0, sleepEndTime - Date.now());
    const m = Math.floor(rem / 60000);
    const s = Math.floor((rem % 60000) / 1000);
    const v = document.getElementById('valSleep');
    if (v) v.textContent = m + ':' + String(s).padStart(2, '0');
    if (rem <= 0) clearInterval(sleepDisplayTimer);
  }
  updateDisplay();
  sleepDisplayTimer = setInterval(updateDisplay, 1000);

  // フェードアウトで自然に止める（クロスフェード秒数を流用）
  sleepTimerId = setTimeout(() => {
    sleepEndTime = 0;
    if (isPlaying) sleepFadeOut();
    document.querySelectorAll('.sleep-btn').forEach(b => {
      b.classList.toggle('active', +b.dataset.min === 0);
    });
    const v = document.getElementById('valSleep');
    if (v) v.textContent = '—';
    clearInterval(sleepDisplayTimer);
  }, minutes * 60 * 1000);
}

// スリープ満了時のソフト停止：fadeDuration かけてマスターをフェードアウトしてから stopAll。
function sleepFadeOut() {
  const dur = Math.max(2, fadeDuration);
  if (actx && masterGain) {
    const now = actx.currentTime;
    masterGain.gain.cancelScheduledValues(now);
    masterGain.gain.setValueAtTime(masterGain.gain.value, now);
    masterGain.gain.linearRampToValueAtTime(0, now + dur);
  }
  // フェード中の状態表示
  const dot  = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  if (dot)  dot.className = 'status-dot xfade';
  if (text) text.textContent = 'SLEEP FADING...';

  setTimeout(() => {
    stopAll();
    // masterGain を復帰させる（stopAll でも復帰するが念のため）
    if (actx && masterGain) {
      masterGain.gain.cancelScheduledValues(actx.currentTime);
      masterGain.gain.setValueAtTime(masterVolume, actx.currentTime);
    }
  }, dur * 1000);
}

// Sleep ボタンのクリックを一括バインド
document.querySelectorAll('.sleep-btn').forEach(b => {
  b.addEventListener('click', () => setSleepTimer(+b.dataset.min));
});

// ボリュームラベル: クリックでミュート
(function bindVolLabel() {
  const label = document.getElementById('volLabel');
  if (label) label.addEventListener('click', toggleMute);
})();

// 検索フィールド
(function bindSearch() {
  const inp = document.getElementById('searchInput');
  if (!inp) return;
  // ── デバウンス ──
  // 大量ファイル時の毎キーストローク全件フィルタを抑制。
  // 120ms はタイピング感を損なわない上限ライン（先頭タイプ後の遅延感が出ない）。
  let _searchDebounce = null;
  inp.addEventListener('input', () => {
    clearTimeout(_searchDebounce);
    _searchDebounce = setTimeout(applySearchFilter, 120);
  });
  // Esc でクリア（こちらは即時反映）
  inp.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      clearTimeout(_searchDebounce);
      inp.value = '';
      applySearchFilter();
      inp.blur();
    }
  });
})();

// ════════════════════════════════════════════════════════
//  KEYBOARD SHORTCUTS
// ════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  // INPUT / TEXTAREA / 検索フィールド入力中はショートカット無効
  const tag = e.target.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  // IME 変換中は無視
  if (e.isComposing || e.keyCode === 229) return;

  // ── 修飾キー付きはブラウザ標準ショートカットに譲る ──
  // 以前は素通しで、Ctrl+R（再読み込み）が KeyR にマッチして toggleRepeatOne() を誤発火、
  // Ctrl+F（検索）が KeyF にマッチして toggleFullPlay() を誤発火していた。
  // Slash は元々 !ctrl && !meta && !alt をケース内で確認しているので統一して早期 return。
  const hasModifier = e.ctrlKey || e.metaKey || e.altKey;

  switch (e.code) {
    case 'Space': {
      // Space をグローバル再生切替として扱うのは「フォーカス無し（body）」または
      // 「PLAY ボタンに既にフォーカス」のときだけ。それ以外（Sleep ボタン、フォルダ、
      // ファイルリスト li, 音量ラベル等）は、その要素自身の Space 起動を尊重する。
      //
      // 以前は blur() + togglePlay() で奪っていたが、これは
      //   ・WCAG 2.1.1: フォーカス中のボタンを Space で起動できる必要
      //   ・ファイルリスト li で「Space → 即 stop」の二重発火バグ
      // という二重の問題を起こしていた。
      //
      // Shift+Space は伝統的に「上スクロール」のキーバインドなので尊重する。
      if (hasModifier || e.shiftKey) return;
      const ae = document.activeElement;
      const btnPlay = document.getElementById('btnPlay');
      const isGlobal = !ae || ae === document.body || ae === btnPlay;
      if (!isGlobal) return;          // フォーカス中の要素に Space を渡す
      e.preventDefault();
      if (!btnPlay.disabled) togglePlay();
      break;
    }
    case 'ArrowRight':
      if (hasModifier) return;
      e.preventDefault();
      if (!document.getElementById('btnSkip').disabled) skipTrack();
      break;
    case 'KeyF':
      if (hasModifier) return;
      if (!document.getElementById('btnFull').disabled) toggleFullPlay();
      break;
    case 'KeyR':
      if (hasModifier) return;
      if (!document.getElementById('btnRepeat').disabled) toggleRepeatOne();
      break;
    case 'KeyM':
      if (hasModifier) return;
      toggleMute();
      break;
    case 'Slash':
      // "/" で検索フォーカス（修飾キー無しのときのみ）
      if (hasModifier) return;
      {
        const inp = document.getElementById('searchInput');
        if (inp && inp.offsetParent !== null) {
          e.preventDefault();
          inp.focus();
          inp.select();
        }
      }
      break;
  }
});

// Space の keyup 側も、keydown と同じ判定で「グローバル扱いするとき」だけ封じる。
// フォーカスが任意のボタン上にあるときは Space → 合成 click を通すことで
// WCAG 2.1.1 (キーボード操作) を満たし、Sleep ボタン等を起動できるようにする。
document.addEventListener('keyup', e => {
  if (e.code !== 'Space') return;
  const tag = e.target.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  const ae = document.activeElement;
  const btnPlay = document.getElementById('btnPlay');
  const isGlobal = !ae || ae === document.body || ae === btnPlay;
  if (isGlobal) e.preventDefault();
});

// ════════════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════════════
// LocalStorageから前回の設定を復元してスライダーに反映
(function loadSavedSettings() {
  const savedPlay   = safeLSGet('jukebox_play');
  const savedFade   = safeLSGet('jukebox_fade');
  const savedVol    = safeLSGet('jukebox_vol');
  const savedWobble = safeLSGet('jukebox_wobble');
  if (savedPlay   !== null) document.getElementById('sliderPlay').value   = savedPlay;
  if (savedFade   !== null) document.getElementById('sliderFade').value   = savedFade;
  if (savedVol    !== null) document.getElementById('sliderVol').value    = savedVol;
  if (savedWobble !== null) document.getElementById('sliderWobble').value = savedWobble;
})();

onSettingChange();
onVolumeChange();
onWobbleChange();
setupMediaSession();   // ロック画面 / 通知パネルの操作を受け付ける
tryRestoreFolder();

// ════════════════════════════════════════════════════════
//  PWA: Service Worker 登録
//  - https:// か localhost のみ登録（file:// は不可）
//  - 新バージョン待機中なら SKIP_WAITING を送って即適用
// ════════════════════════════════════════════════════════
if ('serviceWorker' in navigator &&
    (location.protocol === 'https:' || location.hostname === 'localhost')) {
  navigator.serviceWorker.register('./sw.js')
    .then(reg => {
      reg.addEventListener('updatefound', () => {
        const newSW = reg.installing;
        if (!newSW) return;
        newSW.addEventListener('statechange', () => {
          if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
            // 旧バージョンの SW が動いている = 新バージョン待機中 → 即切替
            newSW.postMessage('SKIP_WAITING');
          }
        });
      });
    })
    .catch(err => console.warn('[L-BOX] SW registration failed:', err));
}
