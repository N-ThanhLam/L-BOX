<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L-BOX</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #000d0f;
  --panel:     #001518;
  --panel2:    #001e22;
  --panel3:    #002830;
  --amber:     #00e5cc;
  --amber-dim: #008a80;
  --amber-lo:  #003d40;
  --neon:      #00ffee;
  --neon-glow: rgba(0,255,238,0.5);
  --cream:     #d0f7f5;
  --dim:       #2a8a88;
  --dim2:      #1a5a5a;
  --green:     #3dffe0;
  --green-glow:rgba(61,255,224,0.4);
  --red:       #ff4455;
}

body {
  background: var(--bg);
  color: var(--cream);
  font-family: 'Courier New', Courier, monospace;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,229,204,0.07) 0%, transparent 70%),
    repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,200,180,0.012) 3px, rgba(0,200,180,0.012) 4px);
}

/* ─── JUKEBOX SHELL ─── */
.jukebox {
  width: 100%;
  max-width: 660px;
  background: var(--panel);
  border: 2px solid var(--amber-dim);
  border-radius: 16px;
  box-shadow:
    0 0 0 1px rgba(0,229,204,0.08),
    0 0 50px rgba(0,229,204,0.18),
    0 0 120px rgba(0,229,204,0.07),
    inset 0 1px 0 rgba(0,230,210,0.06);
  overflow: hidden;
}

/* ─── HEADER ─── */
.header {
  background: var(--panel2);
  border-bottom: 1px solid var(--amber-dim);
  padding: 22px 28px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.header-left { flex: 1; }

.header h1 {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 44px;
  letter-spacing: 18px;
  color: var(--amber);
  text-shadow:
    0 0 8px  rgba(0,255,238,0.8),
    0 0 24px rgba(0,220,200,0.4),
    0 0 60px rgba(0,180,160,0.15);
  line-height: 1;
  margin-left: 2px;
}

.header-sub {
  font-size: 10px;
  letter-spacing: 5px;
  color: var(--dim);
  margin-top: 6px;
  text-transform: uppercase;
}

/* spinning vinyl */
.vinyl {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background:
    radial-gradient(circle at 50% 50%, #002a28 0%, #002a28 12%, transparent 12%),
    repeating-radial-gradient(circle at 50% 50%, #001a18 0px, #001a18 3px, #000d0d 3px, #000d0d 6px);
  border: 3px solid #004a48;
  box-shadow:
    0 0 0 2px #001a18,
    0 0 0 4px var(--amber-dim),
    0 0 20px rgba(0,229,204,0.15);
  position: relative;
  flex-shrink: 0;
  animation: spin 4s linear infinite paused;
}
.vinyl.spinning { animation-play-state: running; }
.vinyl::after {
  content: '';
  position: absolute;
  inset: 50%;
  transform: translate(-50%,-50%);
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--amber);
  box-shadow: 0 0 6px var(--neon-glow);
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ─── VISUALIZER ─── */
.viz-wrap {
  background: var(--bg);
  border-bottom: 1px solid var(--amber-lo);
  padding: 0 0 2px;
  position: relative;
}
canvas#viz {
  display: block;
  width: 100%;
  height: 70px;
  image-rendering: pixelated;
}
.viz-overlay {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(to right, var(--bg) 0%, transparent 5%, transparent 95%, var(--bg) 100%);
  pointer-events: none;
}

/* ─── NOW PLAYING ─── */
.now-playing {
  padding: 18px 28px;
  background: var(--panel2);
  border-bottom: 1px solid var(--amber-lo);
}

.np-label {
  font-size: 9px;
  letter-spacing: 4px;
  color: var(--dim);
  text-transform: uppercase;
  margin-bottom: 6px;
}

.np-title {
  font-size: 18px;
  color: var(--cream);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-height: 26px;
  letter-spacing: 0.5px;
  transition: color 0.3s;
}
.np-title.idle { color: var(--dim); font-style: italic; }

.progress-row {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-top: 10px;
}

.progress-bg {
  flex: 1;
  height: 5px;
  background: var(--amber-lo);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(to right, var(--amber-dim), var(--amber), var(--neon));
  border-radius: 3px;
  width: 0%;
  transition: width 0.1s linear;
  box-shadow: 0 0 6px var(--neon-glow);
}
/* full play mode: green progress */
.progress-fill.full-mode {
  background: linear-gradient(to right, #1a8f50, var(--green), #a0ffcc);
  box-shadow: 0 0 6px var(--green-glow);
}

.countdown-display {
  font-size: 30px;
  color: var(--amber);
  min-width: 70px;
  text-align: right;
  letter-spacing: 2px;
  font-variant-numeric: tabular-nums;
  text-shadow: 0 0 10px var(--neon-glow);
  transition: color 0.3s;
}
.countdown-display.fading { color: var(--neon); }
.countdown-display.full  { color: var(--green); text-shadow: 0 0 10px var(--green-glow); }

.phase-label {
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--dim);
  margin-top: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.phase-pill {
  display: inline-block;
  padding: 1px 7px;
  border-radius: 10px;
  background: var(--amber-lo);
  color: var(--amber-dim);
  font-size: 9px;
  letter-spacing: 2px;
  transition: all 0.3s;
}
.phase-pill.active      { background: rgba(0,229,204,0.15); color: var(--amber); }
.phase-pill.fading-pill { background: rgba(0,255,238,0.15);  color: var(--neon); }
.phase-pill.full-pill   { background: rgba(61,255,224,0.15); color: var(--green); }

/* ─── NEXT TRACK ─── */
.next-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-top: 8px;
}
.next-prefix { font-size: 9px; letter-spacing: 3px; color: var(--dim); flex-shrink: 0; }
.next-name   { font-size: 11px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ─── STATUS BAR ─── */
.status-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 28px;
  background: var(--panel3);
  border-bottom: 1px solid var(--amber-lo);
}

.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--dim2);
  flex-shrink: 0;
  transition: background 0.3s, box-shadow 0.3s;
}
.status-dot.on    { background: var(--green); box-shadow: 0 0 8px var(--green); animation: blink 2s ease-in-out infinite; }
.status-dot.xfade { background: var(--neon);  box-shadow: 0 0 8px var(--neon-glow); animation: blink 0.7s ease-in-out infinite; }
.status-dot.full  { background: var(--green); box-shadow: 0 0 8px var(--green); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

.status-text     { font-size: 10px; letter-spacing: 2px; color: var(--dim); flex: 1; }
.file-count-badge{ font-size: 10px; color: var(--dim2); letter-spacing: 1px; }

/* ─── CONTROLS ─── */
.controls {
  display: grid;
  grid-template-columns: 1fr 1.4fr 1fr;
  grid-template-rows: auto auto;
  gap: 10px;
  padding: 18px 28px;
  border-bottom: 1px solid var(--amber-lo);
}

.btn {
  padding: 13px 8px;
  border: 1px solid var(--amber-lo);
  background: transparent;
  color: var(--amber-dim);
  font-family: 'Courier New', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 6px;
  transition: all 0.15s;
  outline: none;
  white-space: nowrap;
}
.btn:hover:not(:disabled) {
  border-color: var(--amber);
  color: var(--amber);
  background: rgba(0,229,204,0.07);
  box-shadow: 0 0 14px rgba(0,229,204,0.2);
}
.btn:active:not(:disabled) { transform: scale(0.97); }

.btn.primary {
  border-color: var(--amber);
  color: var(--bg);
  background: var(--amber);
  font-weight: bold;
  box-shadow: 0 0 18px rgba(0,229,204,0.4);
  font-size: 13px;
  letter-spacing: 3px;
}
.btn.primary:hover:not(:disabled) {
  background: var(--neon);
  border-color: var(--neon);
  box-shadow: 0 0 28px var(--neon-glow);
  color: var(--bg);
}
.btn.primary.stop-mode {
  background: transparent;
  color: var(--red);
  border-color: var(--red);
  box-shadow: 0 0 14px rgba(255,68,85,0.2);
}
.btn.primary.stop-mode:hover:not(:disabled) {
  background: rgba(255,68,85,0.1);
  box-shadow: 0 0 22px rgba(255,68,85,0.3);
}

/* Full Play button */
.btn.full-btn {
  grid-column: 1 / -1;
  font-size: 11px;
  letter-spacing: 2px;
  padding: 11px 8px;
}

/* Restore button */
.btn.restore-btn {
  grid-column: 1 / -1;
  font-size: 11px;
  letter-spacing: 2px;
  padding: 11px 8px;
  border-color: var(--amber);
  color: var(--amber);
  background: rgba(0,229,204,0.08);
  box-shadow: 0 0 12px rgba(0,229,204,0.15);
}
.btn.restore-btn:hover:not(:disabled) {
  background: rgba(0,229,204,0.18);
  box-shadow: 0 0 22px rgba(0,229,204,0.3);
}
.btn.full-btn.full-active {
  border-color: var(--green);
  color: var(--green);
  background: rgba(61,255,143,0.06);
  box-shadow: 0 0 18px rgba(61,255,143,0.2);
}
.btn.full-btn.full-active:hover:not(:disabled) {
  background: rgba(61,255,143,0.12);
  box-shadow: 0 0 28px rgba(61,255,143,0.35);
}

.btn:disabled { opacity: 0.25; cursor: not-allowed; }

/* ─── RESTORE BANNER ─── */
#restoreBanner {
  padding: 14px 28px;
  background: rgba(0,229,204,0.10);
  border-bottom: 2px solid var(--amber);
  border-top: 2px solid var(--amber);
  display: flex;
  align-items: center;
  gap: 14px;
  animation: bannerPulse 2.5s ease-in-out infinite;
}
@keyframes bannerPulse {
  0%,100% { box-shadow: inset 0 0 0 0 rgba(0,229,204,0.0); }
  50%      { box-shadow: inset 0 0 24px 0 rgba(0,229,204,0.12); }
}
#restoreIcon {
  font-size: 22px;
  flex-shrink: 0;
  filter: drop-shadow(0 0 6px rgba(0,229,204,0.6));
}
#restoreTextGroup { flex: 1; }
#restoreTitle {
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--amber);
  text-transform: uppercase;
  margin-bottom: 2px;
  text-shadow: 0 0 8px rgba(0,229,204,0.4);
}
#restoreInfo {
  font-size: 10px;
  color: var(--amber-dim);
  letter-spacing: 1px;
}
#restoreBtn {
  padding: 10px 18px;
  border: 2px solid var(--amber);
  background: var(--amber);
  color: var(--bg);
  font-family: 'Courier New', monospace;
  font-size: 12px;
  font-weight: bold;
  letter-spacing: 2px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
  box-shadow: 0 0 18px rgba(0,229,204,0.35);
  white-space: nowrap;
}
#restoreBtn:hover {
  background: var(--neon);
  border-color: var(--neon);
  box-shadow: 0 0 28px var(--neon-glow);
}
#restoreBtn:active { transform: scale(0.97); }

/* ─── SETTINGS ─── */
.settings {
  padding: 18px 28px;
  border-bottom: 1px solid var(--amber-lo);
}

.settings-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.settings-title {
  font-size: 9px;
  letter-spacing: 4px;
  color: var(--dim);
  text-transform: uppercase;
}
.total-badge {
  font-size: 10px;
  color: var(--amber-dim);
  letter-spacing: 1px;
}

.setting-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}
.setting-row:last-child { margin-bottom: 0; }

.setting-label {
  font-size: 10px;
  color: var(--cream);
  letter-spacing: 1px;
  width: 130px;
  flex-shrink: 0;
}

input[type=range] {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 3px;
  background: var(--amber-lo);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  background: var(--amber);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--neon-glow);
  cursor: pointer;
  transition: transform 0.1s;
}
input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
input[type=range]::-moz-range-thumb {
  width: 14px;
  height: 14px;
  background: var(--amber);
  border: none;
  border-radius: 50%;
  box-shadow: 0 0 8px var(--neon-glow);
  cursor: pointer;
}
/* volume slider thumb = green */
#sliderVol::-webkit-slider-thumb { background: var(--green); box-shadow: 0 0 8px var(--green-glow); }
#sliderVol::-moz-range-thumb     { background: var(--green); box-shadow: 0 0 8px var(--green-glow); }

/* wobble slider thumb = warm amber/cream */
#sliderWobble::-webkit-slider-thumb { background: #ffe0a0; box-shadow: 0 0 10px rgba(255,210,100,0.7); }
#sliderWobble::-moz-range-thumb     { background: #ffe0a0; box-shadow: 0 0 10px rgba(255,210,100,0.7); }
#sliderWobble { background: linear-gradient(to right, var(--amber-lo), rgba(255,210,100,0.25)); }

.wobble-val-wrap {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  min-width: 64px;
}
.wobble-mode {
  font-size: 9px;
  letter-spacing: 2px;
  color: rgba(255,210,100,0.6);
  margin-top: 2px;
  text-transform: uppercase;
  white-space: nowrap;
}
.setting-val.wobble-val { color: #ffe0a0; }

.setting-val {
  font-size: 13px;
  color: var(--amber);
  min-width: 36px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}
.setting-val.vol-val { color: var(--green); }

/* ─── HISTORY ─── */
.history-wrap {
  padding: 10px 28px 6px;
  border-bottom: 1px solid var(--amber-lo);
  display: none;
}
.history-label {
  font-size: 9px;
  letter-spacing: 4px;
  color: var(--dim2);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.histlist {
  list-style: none;
}
.histlist li {
  font-size: 10px;
  color: var(--dim2);
  padding: 1px 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: 0.5px;
}
.histlist li:first-child { color: var(--dim); }
.histlist li::before {
  content: '⏮ ';
  opacity: 0.4;
  font-size: 8px;
}

/* ─── FILE LIST ─── */
.filelist-wrap {
  padding: 12px 28px 16px;
  max-height: 150px;
  overflow-y: auto;
}
.filelist-wrap::-webkit-scrollbar { width: 3px; }
.filelist-wrap::-webkit-scrollbar-track { background: transparent; }
.filelist-wrap::-webkit-scrollbar-thumb { background: var(--amber-lo); border-radius: 2px; }

.filelist {
  list-style: none;
}
.filelist li {
  font-size: 10px;
  color: var(--dim2);
  padding: 2px 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: 0.5px;
  transition: color 0.2s, background 0.15s;
  cursor: pointer;
  border-radius: 3px;
}
.filelist li:hover {
  color: var(--amber-dim);
  background: rgba(0,229,204,0.05);
}
.filelist li.active {
  color: var(--amber);
  text-shadow: 0 0 6px rgba(0,229,204,0.4);
}

/* ─── FOOTER ─── */
.footer {
  padding: 10px 28px;
  background: var(--panel2);
  border-top: 1px solid var(--amber-lo);
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 9px;
  color: var(--dim2);
  letter-spacing: 2px;
}
.kbd-hint { letter-spacing: 1px; opacity: 0.6; }

/* hidden input */
#folderInput { display: none; }

/* ─── MOBILE RESPONSIVE ─── */
@media (max-width: 520px) {
  body { padding: 8px; }

  .header { padding: 14px 16px 12px; gap: 10px; }
  .header h1 { font-size: 28px; letter-spacing: 8px; }
  .header-sub { font-size: 9px; letter-spacing: 3px; }
  .vinyl { width: 52px; height: 52px; }

  .now-playing { padding: 12px 16px; }
  .np-title { font-size: 15px; }
  .countdown-display { font-size: 22px; min-width: 54px; }

  .phase-label { font-size: 8px; gap: 4px; flex-wrap: wrap; }
  .phase-pill { font-size: 8px; padding: 1px 5px; }

  .status-bar { padding: 6px 16px; }

  .controls {
    grid-template-columns: 1fr 1fr;
    padding: 12px 16px;
    gap: 8px;
  }
  .controls .btn:nth-child(2) { grid-column: 1 / -1; }
  .btn { padding: 12px 6px; font-size: 10px; letter-spacing: 1px; }
  .btn.primary { font-size: 12px; }
  .btn.full-btn { grid-column: 1 / -1; }

  #restoreBanner { padding: 10px 16px; flex-wrap: wrap; gap: 8px; }
  #restoreBtn { padding: 8px 12px; font-size: 11px; }

  .settings { padding: 12px 16px; }
  .setting-row { gap: 8px; }
  .setting-label { width: 86px; font-size: 9px; }
  .setting-val { font-size: 11px; min-width: 28px; }
  .wobble-val-wrap { min-width: 48px; }

  .history-wrap { padding: 8px 16px 4px; }
  .filelist-wrap { padding: 8px 16px 12px; }

  .footer {
    padding: 8px 16px;
    font-size: 8px;
    flex-direction: column;
    gap: 2px;
    align-items: flex-start;
  }
  .kbd-hint { display: none; }
}
</style>
</head>
<body>

<div class="jukebox">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <h1>L-BOX</h1>
      <div class="header-sub">Random Music Player</div>
    </div>
    <div class="vinyl" id="vinyl"></div>
  </div>

  <!-- VISUALIZER -->
  <div class="viz-wrap">
    <canvas id="viz"></canvas>
    <div class="viz-overlay"></div>
  </div>

  <!-- NOW PLAYING -->
  <div class="now-playing">
    <div class="np-label">▶ NOW PLAYING</div>
    <div class="np-title idle" id="npTitle">— フォルダを選択して再生を開始してください —</div>

    <div class="progress-row">
      <div class="progress-bg">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="countdown-display" id="countdown">--.-</div>
    </div>

    <div class="phase-label">
      <span class="phase-pill" id="pillPlay">PLAYING</span>
      <span>→</span>
      <span class="phase-pill" id="pillFade">CROSSFADE</span>
      <span>→</span>
      <span class="phase-pill" id="pillFull">FULL PLAY</span>
    </div>

    <div class="next-row">
      <span class="next-prefix">NEXT ▶</span>
      <span class="next-name" id="nextTitle">—</span>
    </div>
  </div>

  <!-- STATUS -->
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <div class="status-text" id="statusText">STOPPED</div>
    <div class="file-count-badge" id="fileBadge">0 files</div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button class="btn" id="btnFolder">📁 フォルダ選択</button>
    <button class="btn primary" id="btnPlay" disabled onclick="togglePlay()">▶ PLAY</button>
    <button class="btn" id="btnSkip" disabled onclick="skipTrack()">⏭ スキップ</button>
    <button class="btn full-btn" id="btnFull" disabled onclick="toggleFullPlay()">♾ フルで聴く</button>
  </div>

  <!-- RESTORE BANNER -->
  <div id="restoreBanner" style="display:none">
    <span id="restoreIcon">📂</span>
    <div id="restoreTextGroup">
      <div id="restoreTitle">▶ 前回のフォルダ</div>
      <div id="restoreInfo"></div>
    </div>
    <button id="restoreBtn">↩ ワンクリックで復元</button>
  </div>

  <!-- SETTINGS -->
  <div class="settings">
    <div class="settings-header">
      <div class="settings-title">⚙ SETTINGS</div>
      <div class="total-badge">合計 1枠 = <span id="totalBadge">20s</span></div>
    </div>
    <div class="setting-row">
      <div class="setting-label">再生時間 (solo)</div>
      <input type="range" id="sliderPlay" min="5" max="120" value="12" oninput="onSettingChange()">
      <div class="setting-val" id="valPlay">12s</div>
    </div>
    <div class="setting-row">
      <div class="setting-label">クロスフェード</div>

<script>
// ════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════
let files        = [];
let currentIdx   = -1;
let nextIdx      = -1;
let isPlaying    = false;
let isFading     = false;
let isFullPlay   = false;      // フルで聴くモード
let activeSlot   = 0;

let playDuration = 12;         // solo play seconds (12 + 8 = 20)
let fadeDuration = 8;          // crossfade seconds
let masterVolume = 0.8;        // 0.0 – 1.0

let slotEndTime  = 0;
let fadeTimer    = null;
let tickTimer    = null;
let xfadeTimer   = null;

// ── 操作世代番号 ──
// playTrack / startCrossfade の呼び出しごとにインクリメントし、
// 非同期コールバック（loadedmetadata・ended・setInterval）の冒頭で
// 自分の世代と現在の operationId が一致するか確認する。
// 不一致なら古い操作のコールバックなので即 return する。
let operationId  = 0;

// ── フルモード ended リスナー参照 ──
// toggleFullPlay が audio.addEventListener('ended', onFullEnded) で登録した
// 関数の参照を保持する。stopAll / playTrack の冒頭で removeEventListener に
// 渡すことで、連打時にリスナーが Audio 要素に蓄積するのを防ぐ。
let _onFullEnded = null;

let playHistory  = [];         // 再生履歴 (最大5件)

// ── 次曲プリロード ──
let preloadTimer        = null;    // 次曲を先行ロードするタイマー
let preloadedForIdx     = -1;      // プリロード完了済みの nextIdx（-1=未プリロード）
// schedulePreload が登録した onPreloadMeta の解除関数。startCrossfade が
// プリロード不使用で再ロードする際に明示的に除去することで、古いリスナーと
// 新しい onNextMeta が loadedmetadata を二重処理するのを防ぐ。
let _preloadMetaCleanup = null;

// ── 揺らぎエンジン ──
let wobbleIntensity = 0;       // 0.0 – 1.0
let breathGainA = null, breathGainB = null;
let lofiFilterA = null, lofiFilterB = null;
let wobblePannerA = null, wobblePannerB = null;
let noiseSource = null, noiseGainNode = null;
let wobbleLoopId = null;

// Brownian motion state
let _wow = 0, _wowV = 0;
let _breathPh = [0, Math.PI * 0.73];
let _panPh    = [0, Math.PI * 1.37];
let _filtPh   = 0;

// ── 拡張子を除いた表示名 ──
function stripExt(filename) {
  return filename.replace(/\.[^.]+$/, '');
}

// ════════════════════════════════════════════════════════
//  AUDIO ELEMENTS
// ════════════════════════════════════════════════════════
const audioA = new Audio();
const audioB = new Audio();
const audios = [audioA, audioB];
audioA.preload = audioB.preload = 'none';

// playbackRate 変更時にブラウザのピッチ補正（Preserve Pitch）を無効化する。
// 補正が有効だと「テープの回転ムラ」効果が打ち消されて平坦な変速になってしまう。
// 標準プロパティ + ベンダープレフィックス（Firefox旧・Safari旧）を両方設定する。
function disablePitchPreservation(audio) {
  audio.preservesPitch       = false;   // 標準（Chrome 86+, Firefox 99+, Safari 16+）
  audio.mozPreservesPitch    = false;   // Firefox 旧バージョン
  audio.webkitPreservesPitch = false;   // Safari 旧バージョン
}
audios.forEach(disablePitchPreservation);

// 各スロットが現在保持しているオブジェクトURL（メモリリーク防止用）
const slotObjectURL = [null, null];

/**
 * 指定スロットの audio.src に ObjectURL をセットし、
 * 以前のURLを revokeObjectURL で解放する。
 */
function setSlotSrc(slot, file) {
  // 古いURLを解放
  if (slotObjectURL[slot]) {
    URL.revokeObjectURL(slotObjectURL[slot]);
    slotObjectURL[slot] = null;
  }
  const url = URL.createObjectURL(file);
  slotObjectURL[slot] = url;
  audios[slot].src = url;
  // src の再セット後にピッチ補正が再有効化されるブラウザがあるため毎回適用する
  disablePitchPreservation(audios[slot]);
}

/**
 * 指定スロットの audio.src をクリアし、ObjectURLも解放する。
 */
function clearSlotSrc(slot) {
  if (slotObjectURL[slot]) {
    URL.revokeObjectURL(slotObjectURL[slot]);
    slotObjectURL[slot] = null;
  }
  try { audios[slot].src = ''; } catch(_) {}
}

// ════════════════════════════════════════════════════════
//  WEB AUDIO API
// ════════════════════════════════════════════════════════
let actx       = null;
let analyser   = null;
let gainA      = null;
let gainB      = null;
let masterGain = null;

function initAudioContext() {
  // 生成のみ行う。resume は resumeAudioContext() に完全に委ねる。
  // ここで actx.resume() を fire-and-forget すると resumeAudioContext() での
  // await resume() と二重呼び出し競合が起きるため意図的に行わない。
  if (actx) return;
  try {
    actx = new (window.AudioContext || window.webkitAudioContext)();

    const srcA = actx.createMediaElementSource(audioA);
    const srcB = actx.createMediaElementSource(audioB);

    gainA = actx.createGain(); gainA.gain.value = 1;
    gainB = actx.createGain(); gainB.gain.value = 0;

    analyser = actx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.82;

    masterGain = actx.createGain();
    masterGain.gain.value = masterVolume;

    // WebAudio がゲイン制御を引き継ぐので element.volume を 1.0 にリセット
    // （boot 時に fallback で 0 にセットされていると次の曲が無音になるバグを防ぐ）
    audioA.volume = 1.0;
    audioB.volume = 1.0;

    // ── 揺らぎノード (slot A) ──
    breathGainA = actx.createGain(); breathGainA.gain.value = 1;
    lofiFilterA = actx.createBiquadFilter();
    lofiFilterA.type = 'lowpass'; lofiFilterA.frequency.value = 20000; lofiFilterA.Q.value = 0.5;
    wobblePannerA = actx.createStereoPanner(); wobblePannerA.pan.value = 0;

    // ── 揺らぎノード (slot B) ──
    breathGainB = actx.createGain(); breathGainB.gain.value = 1;
    lofiFilterB = actx.createBiquadFilter();
    lofiFilterB.type = 'lowpass'; lofiFilterB.frequency.value = 20000; lofiFilterB.Q.value = 0.5;
    wobblePannerB = actx.createStereoPanner(); wobblePannerB.pan.value = 0;

    // ── ピンクノイズ ──
    noiseGainNode = actx.createGain(); noiseGainNode.gain.value = 0;
    try {
      const nBuf = actx.createBuffer(1, actx.sampleRate * 3, actx.sampleRate);
      const nd = nBuf.getChannelData(0);
      let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
      for (let i=0;i<nd.length;i++) {
        const wh = Math.random()*2-1;
        b0=0.99886*b0+wh*0.0555179; b1=0.99332*b1+wh*0.0750759;
        b2=0.96900*b2+wh*0.1538520; b3=0.86650*b3+wh*0.3104856;
        b4=0.55000*b4+wh*0.5329522; b5=-0.7616*b5-wh*0.0168980;
        nd[i]=(b0+b1+b2+b3+b4+b5+b6+wh*0.5362)*0.11; b6=wh*0.115926;
      }
      noiseSource = actx.createBufferSource();
      noiseSource.buffer = nBuf; noiseSource.loop = true;
      noiseSource.connect(noiseGainNode);
      noiseGainNode.connect(masterGain);
      noiseSource.start();
    } catch(e) { console.warn('Noise gen failed:', e); }

    // ── グラフ接続 ──
    srcA.connect(gainA); gainA.connect(breathGainA); breathGainA.connect(lofiFilterA); lofiFilterA.connect(wobblePannerA); wobblePannerA.connect(analyser);
    srcB.connect(gainB); gainB.connect(breathGainB); breathGainB.connect(lofiFilterB); lofiFilterB.connect(wobblePannerB); wobblePannerB.connect(analyser);
    analyser.connect(masterGain);
    masterGain.connect(actx.destination);
  } catch(e) {
    console.warn('AudioContext unavailable:', e);
  }
}

/**
 * ユーザージェスチャーの文脈（クリックイベント等）で呼ぶことで、
 * ブラウザの自動再生ポリシーに準拠しながら AudioContext を確実に起動する。
 *
 * ① actx が未生成なら initAudioContext() で生成する
 * ② 生成済みでも suspended 状態なら resume() を await で待つ
 *    ─ initAudioContext() は resume を行わないため二重呼び出し競合は発生しない
 * ③ resume 後も suspended のまま（ポリシー拒否）なら警告をログに残す
 * ④ 常に Promise<void> を返すので await で安全に待てる
 */
async function resumeAudioContext() {
  initAudioContext();           // 未生成なら生成（resume は行わない）
  if (!actx) return;
  if (actx.state !== 'suspended') return;  // 既に running / closed なら不要
  try {
    await actx.resume();
  } catch(e) {
    console.warn('AudioContext resume failed:', e);
  }
  // resume 完了後も suspended のまま = ブラウザポリシーによる拒否（iOS Safari 等）
  if (actx.state === 'suspended') {
    console.warn('AudioContext はユーザー操作後も suspended のままです。ブラウザのポリシーを確認してください。');
  }
}

/**
 * クロスフェード割り込み時に「今どちらが主役か」をゲインで判定し
 * activeSlot を確定する。小さい方のスロットは pause + clearSlotSrc する。
 * ゲイン値はそのまま保持して startCrossfade の xfadeTimer に引き継ぐ。
 */
function resolveActiveSlot() {
  const inSlot  = 1 - activeSlot;
  const getGain = s => (actx && (s === 0 ? gainA : gainB))
    ? (s === 0 ? gainA.gain.value : gainB.gain.value)
    : audios[s].volume;

  const inGain  = getGain(inSlot);
  const outGain = getGain(activeSlot);

  if (inGain > outGain) {
    // フェードインが進んでいる → inSlot を activeSlot に昇格
    try { audios[activeSlot].pause(); } catch (_) {}
    clearSlotSrc(activeSlot);
    setSlotGain(activeSlot, 0);
    activeSlot = inSlot;
  } else {
    // outSlot がまだ主役 → inSlot だけ止める
    try { audios[inSlot].pause(); } catch (_) {}
    clearSlotSrc(inSlot);
    setSlotGain(inSlot, 0);
  }
  // activeSlot のゲインはそのまま保持（急激な音量変化を避ける）
}

function setSlotGain(slot, value) {
  const v = Math.max(0, Math.min(1, value));
  if (actx && gainA) {
    (slot === 0 ? gainA : gainB).gain.value = v;
  } else {
    audios[slot].volume = v * masterVolume;
  }
}

function applyMasterVolume() {
  if (actx && masterGain) {
    masterGain.gain.value = masterVolume;
  } else {
    // fallback: re-apply to both slots
    const slotVols = [gainA ? gainA.gain.value : (activeSlot === 0 ? 1 : 0),
                      gainB ? gainB.gain.value : (activeSlot === 1 ? 1 : 0)];
    audios.forEach((a, i) => { a.volume = slotVols[i] * masterVolume; });
  }
}

// ════════════════════════════════════════════════════════
//  CANVAS VISUALIZER
// ════════════════════════════════════════════════════════
const canvas = document.getElementById('viz');
const ctx2d  = canvas.getContext('2d');

function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  const dpr  = window.devicePixelRatio || 1;
  canvas.width  = Math.round(rect.width  * dpr);
  canvas.height = Math.round(rect.height * dpr);
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

let freqData = null;

(function vizLoop() {
  requestAnimationFrame(vizLoop);
  const W = canvas.width, H = canvas.height;
  ctx2d.clearRect(0, 0, W, H);

  if (analyser && isPlaying) {
    if (!freqData) freqData = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(freqData);
    const bins = freqData.length;
    const bw   = Math.max(1, Math.floor(W / bins));
    const gap  = Math.max(0, Math.floor(bw * 0.15));

    for (let i = 0; i < bins; i++) {
      const v  = freqData[i] / 255;
      const bh = Math.max(2, v * H);
      const x  = Math.floor(i * (W / bins));
      const g  = ctx2d.createLinearGradient(0, H, 0, H - bh);
      if (isFullPlay) {
        g.addColorStop(0,   'rgba(20,120,60,0.9)');
        g.addColorStop(0.5, 'rgba(61,255,143,0.95)');
        g.addColorStop(1,   'rgba(160,255,200,1)');
      } else {
        g.addColorStop(0,   'rgba(0,100,120,0.9)');
        g.addColorStop(0.5, 'rgba(0,229,204,0.95)');
        g.addColorStop(1,   'rgba(0,255,238,1)');
      }
      ctx2d.fillStyle = g;
      ctx2d.fillRect(x + gap/2, H - bh, bw - gap, bh);
      if (v > 0.05) {
        ctx2d.fillStyle = isFullPlay ? 'rgba(180,255,240,0.6)' : 'rgba(120,255,245,0.6)';
        ctx2d.fillRect(x + gap/2, H - bh - 2, bw - gap, 2);
      }
    }
  } else {
    const t = Date.now() / 1000;
    const n = 40;
    const bw = W / n;
    for (let i = 0; i < n; i++) {
      const wave  = (Math.sin(t * 0.6 + i * 0.42) * 0.5 + 0.5);
      const bh    = wave * 12 + 2;
      const alpha = wave * 0.15 + 0.04;
      ctx2d.fillStyle = `rgba(0,229,204,${alpha})`;
      ctx2d.fillRect(i * bw + 1, H - bh, bw - 2, bh);
    }
  }
})();

// ════════════════════════════════════════════════════════
//  INDEXEDDB — フォルダハンドル永続化
// ════════════════════════════════════════════════════════
const IDB_NAME = 'jukeboxDB', IDB_STORE = 'kv';
const idbOpen = () => new Promise((res, rej) => {
  const r = indexedDB.open(IDB_NAME, 1);
  r.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE);
  r.onsuccess = e => res(e.target.result);
  r.onerror   = e => rej(e.target.error);
});
const idbGet = async key => {
  try {
    const db = await idbOpen();
    return await new Promise((res, rej) => {
      const req = db.transaction(IDB_STORE).objectStore(IDB_STORE).get(key);
      req.onsuccess = e => res(e.target.result ?? null);
      req.onerror   = e => rej(e.target.error);
    });
  } catch(e) { return null; }
};
const idbSet = async (key, val) => {
  try {
    const db = await idbOpen();
    await new Promise((res, rej) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).put(val, key);
      tx.oncomplete = () => res();
      tx.onerror    = e => rej(e.target.error);
    });
  } catch(e) {}
};

// ════════════════════════════════════════════════════════
//  FILE SELECTION
// ════════════════════════════════════════════════════════

// フォルダボタン: onclick 属性なし、JS で完全管理
document.getElementById('btnFolder').addEventListener('click', () => selectFolder());

async function selectFolder() {
  if (window.showDirectoryPicker) {
    try {
      const handle = await window.showDirectoryPicker({ mode: 'read' });
      await idbSet('folderHandle', handle);
      localStorage.setItem('lastFolderName', handle.name);
      await loadFilesFromHandle(handle);
      updateFolderBtn(handle.name);
      hideBanner();
    } catch(e) {
      if (e.name !== 'AbortError') console.warn('Folder picker error:', e);
    }
  } else {
    document.getElementById('folderInput').click();
  }
}

// fallback: <input webkitdirectory>
document.getElementById('folderInput').addEventListener('change', function(e) {
  const exts = /\.(mp3|wav|ogg|flac|aac|m4a|opus|weba|wma)$/i;
  files = Array.from(e.target.files)
    .filter(f => exts.test(f.name))
    .sort((a, b) => a.name.localeCompare(b.name, 'ja'));
  renderFileList();
  document.getElementById('fileBadge').textContent = files.length + ' files';
  document.getElementById('btnPlay').disabled = files.length === 0;
  if (isPlaying) stopAll();
  // フォルダ名をLocalStorageに保存してボタンを更新
  if (e.target.files.length > 0) {
    const folderName = e.target.files[0].webkitRelativePath.split('/')[0] || 'フォルダ';
    localStorage.setItem('lastFolderName', folderName);
    updateFolderBtn(folderName);
    updateRestoreBtn(folderName);
  }
});

async function loadFilesFromHandle(handle) {
  const exts = /\.(mp3|wav|ogg|flac|aac|m4a|opus|weba|wma)$/i;
  const arr  = [];
  for await (const entry of handle.values()) {
    if (entry.kind === 'file' && exts.test(entry.name)) {
      arr.push(await entry.getFile());
    }
  }
  arr.sort((a, b) => a.name.localeCompare(b.name, 'ja'));
  files = arr;
  renderFileList();
  document.getElementById('fileBadge').textContent = files.length + ' files';
  document.getElementById('btnPlay').disabled = files.length === 0;
  if (isPlaying) stopAll();
}

function updateFolderBtn(name) {
  const short = name.length > 10 ? name.slice(0, 10) + '…' : name;
  document.getElementById('btnFolder').textContent = `📂 ${short}`;
}

function hideBanner() {
  document.getElementById('restoreBanner').style.display = 'none';
}

function showBanner(folderName, onRestoreClick) {
  const short = folderName.length > 28 ? folderName.slice(0, 28) + '…' : folderName;
  document.getElementById('restoreInfo').textContent = `「${short}」を検出しました`;
  document.getElementById('restoreBanner').style.display = 'flex';
  // ボタンを複製してリスナーをリセット
  const oldBtn = document.getElementById('restoreBtn');
  const newBtn = oldBtn.cloneNode(true);
  oldBtn.parentNode.replaceChild(newBtn, oldBtn);
  newBtn.addEventListener('click', onRestoreClick);
}

async function tryRestoreFolder() {
  const savedName = localStorage.getItem('lastFolderName');
  updateRestoreBtn(savedName);

  if (!window.showDirectoryPicker) return;
  try {
    const handle = await idbGet('folderHandle');
    if (!handle) return;

    let perm;
    try { perm = await handle.queryPermission({ mode: 'read' }); }
    catch(e) { perm = 'prompt'; }

    if (perm === 'granted') {
      try {
        await loadFilesFromHandle(handle);
        updateFolderBtn(handle.name);
        hideBanner();
      } catch(e) {
        showBanner(savedName || handle.name || 'フォルダ', () => restoreWithPermission(handle));
      }
    } else {
      showBanner(savedName || handle.name || 'フォルダ', () => restoreWithPermission(handle));
    }
  } catch(e) {
    console.log('Folder restore error:', e);
  }
}

function updateRestoreBtn(name) {
  const btn = document.getElementById('btnRestore');
  if (!btn) return;
  if (name) {
    const short = name.length > 16 ? name.slice(0, 16) + '…' : name;
    btn.textContent = `↩ 前回:「${short}」を再読み込み`;
    btn.style.opacity = '1';
  } else {
    btn.textContent = '↩ 前回のフォルダを再読み込み';
    btn.style.opacity = '0.45';
  }
}

// 「前回のフォルダを再読み込み」ボタン押下
async function restoreFolder() {
  if (window.showDirectoryPicker) {
    try {
      const handle = await idbGet('folderHandle');
      if (handle) {
        await restoreWithPermission(handle);
        return;
      }
    } catch(e) {}
  }
  // IDB未対応 or ハンドルなし → フォルダ選択ダイアログを開く
  selectFolder();
}

async function restoreWithPermission(handle) {
  try {
    let perm;
    try { perm = await handle.queryPermission({ mode: 'read' }); }
    catch(e) { perm = 'prompt'; }

    if (perm !== 'granted') {
      perm = await handle.requestPermission({ mode: 'read' });
    }
    if (perm === 'granted') {
      await loadFilesFromHandle(handle);
      updateFolderBtn(handle.name);
      localStorage.setItem('lastFolderName', handle.name);
    } else {
      alert('フォルダへのアクセスが拒否されました。「フォルダ選択」ボタンから再選択してください。');
    }
  } catch(e) {
    console.warn('Permission request failed:', e);
    alert('フォルダの復元に失敗しました。「フォルダ選択」ボタンから再選択してください。');
  }
  hideBanner();
}

function renderFileList() {
  const ul = document.getElementById('fileList');
  ul.innerHTML = '';
  files.forEach((f, i) => {
    const li = document.createElement('li');
    li.id = 'fi-' + i;
    li.textContent = stripExt(f.name);
    li.title = f.name;
    li.addEventListener('click', () => playSpecificTrack(i));
    ul.appendChild(li);
  });
}

function highlightFile(idx) {
  document.querySelectorAll('.filelist li').forEach(l => l.classList.remove('active'));
  const li = document.getElementById('fi-' + idx);
  if (li) { li.classList.add('active'); }
}

// ════════════════════════════════════════════════════════
//  PLAY SPECIFIC TRACK (曲一覧クリック — クロスフェードで切り替え)
// ════════════════════════════════════════════════════════
async function playSpecificTrack(idx) {
  if (files.length === 0 || idx < 0 || idx >= files.length) return;

  // まだ再生していない場合は通常起動
  if (!isPlaying) {
    await resumeAudioContext();  // クリック文脈で確実に resume
    isPlaying = true;
    activeSlot = 0;
    document.getElementById('btnPlay').textContent = '⏹ STOP';
    document.getElementById('btnPlay').classList.add('stop-mode');
    document.getElementById('btnSkip').disabled = false;
    document.getElementById('btnFull').disabled = false;

    isFading   = false;
    isFullPlay = false;
    operationId++;               // 古い非同期処理を無効化
    clearTimeout(fadeTimer);
    clearInterval(xfadeTimer);
    clearInterval(tickTimer);
    updateFullBtn();

    audios.forEach((a, i) => { try { a.pause(); } catch (_) {} clearSlotSrc(i); });
    activeSlot = 0;
    setSlotGain(0, 1);
    setSlotGain(1, 0);

    nextIdx = idx;
    playTrack(false);
    return;
  }

  // 再生中 → クロスフェードで指定曲へ切り替え
  // skipTrack と同様に、クロスフェード中でも受け付けて即座にリセットする。

  operationId++;                 // 進行中のすべての非同期コールバックを無効化
  isFullPlay = false;
  isFading   = false;            // クロスフェード中フラグを強制解除
  clearTimeout(fadeTimer);
  clearTimeout(preloadTimer);
  if (_preloadMetaCleanup) { _preloadMetaCleanup(); _preloadMetaCleanup = null; }
  if (_onFullEnded) { audios.forEach(a => a.removeEventListener('ended', _onFullEnded)); _onFullEnded = null; }
  preloadedForIdx = -1;
  clearInterval(xfadeTimer);
  clearInterval(tickTimer);
  updateFullBtn();

  // クロスフェード途中の場合、ゲインが大きい方を activeSlot に昇格させ小さい方を止める。
  // ゲインはいじらず現在値のまま startCrossfade に引き継ぐ（急激な音量変化を防ぐ）。
  resolveActiveSlot();
  if (nextIdx >= 0) currentIdx = nextIdx;

  nextIdx = idx;

  const nextFile = files[nextIdx];
  if (nextFile) setUIPlaying(nextFile.name, true);

  slotEndTime = Date.now() + (fadeDuration + playDuration) * 1000;
  startCountdown(fadeDuration + playDuration, slotEndTime);
  startCrossfade(true);  // operationId はインクリメント済み
}


// ════════════════════════════════════════════════════════
//  揺らぎエンジン
// ════════════════════════════════════════════════════════
function getWobbleMode(v) {
  if (v === 0)  return '— OFF —';
  if (v <= 20)  return '▸ かすか';
  if (v <= 50)  return '▸ ゆらぎ';
  if (v <= 66)  return '▸ CASSETTE';
  if (v <= 80)  return '▸ うねり';
  return '▸ おおきく';
}

function onWobbleChange() {
  const raw = +document.getElementById('sliderWobble').value;
  wobbleIntensity = raw / 100;
  document.getElementById('valWobble').textContent = raw;
  document.getElementById('wobbleMode').textContent = getWobbleMode(raw);
  localStorage.setItem('jukebox_wobble', raw);

  if (wobbleIntensity === 0) resetWobbleNodes();
  if (wobbleIntensity > 0 && !wobbleLoopId) startWobbleLoop();
  if (wobbleIntensity === 0 && wobbleLoopId) {
    clearInterval(wobbleLoopId); wobbleLoopId = null;
  }
}

function resetWobbleNodes() {
  audios.forEach(a => { try { a.playbackRate = 1; } catch(_) {} });
  const t = actx ? actx.currentTime : 0;
  if (breathGainA)  breathGainA.gain.setTargetAtTime(1, t, 0.3);
  if (breathGainB)  breathGainB.gain.setTargetAtTime(1, t, 0.3);
  if (lofiFilterA)  lofiFilterA.frequency.setTargetAtTime(20000, t, 0.5);
  if (lofiFilterB)  lofiFilterB.frequency.setTargetAtTime(20000, t, 0.5);
  if (wobblePannerA) wobblePannerA.pan.setTargetAtTime(0, t, 0.3);
  if (wobblePannerB) wobblePannerB.pan.setTargetAtTime(0, t, 0.3);
  if (noiseGainNode) noiseGainNode.gain.setTargetAtTime(0, t, 0.3);
}

function startWobbleLoop() {
  if (wobbleLoopId) return;
  wobbleLoopId = setInterval(wobbleTick, 65);
}

function wobbleTick() {
  if (!actx || wobbleIntensity === 0 || !isPlaying) return;
  const w   = wobbleIntensity;   // 0.01 – 1.0
  const t   = actx.currentTime;
  const now = Date.now();

  // ── Wow / Flutter（ピッチ揺れ）──
  // w=0.01 でほぼ気づかない、w=1.0 で明らかにわかる。
  // Brownian motion: ランダムウォーク＋緩やかなダンプ
  _wowV += (Math.random() - 0.5) * 0.0006 * w;
  _wowV *= 0.94;
  _wow  += _wowV;
  const wowRange = 0.003 + w * 0.030;          // w=1→±3.3%
  _wow = Math.max(-wowRange, Math.min(wowRange, _wow));
  // Flutter: テープの高周波揺れ
  const flutter = (Math.sin(now * 0.11) * 0.0025
                 + Math.sin(now * 0.067) * 0.0015
                 + (Math.random() - 0.5) * 0.001) * w;
  const rate = Math.max(0.92, Math.min(1.08, 1 + _wow + flutter));
  audios.forEach(a => { try { if (!a.paused) a.playbackRate = rate; } catch(_) {} });

  // ── 呼吸感（Breathing gain）──
  // ゆったりした周期でやさしく波打つ。不快にならない下限を自動設定。
  _breathPh[0] += 0.006 + Math.random() * 0.002;
  _breathPh[1] += 0.005 + Math.random() * 0.002;
  const breathDepth = w * 0.30;                // w=1→最大 -30%
  const b0 = 1 - (Math.sin(_breathPh[0]) * 0.5 + 0.5) * breathDepth;
  const b1 = 1 - (Math.sin(_breathPh[1]) * 0.5 + 0.5) * breathDepth;
  const breathFloor = 1 - breathDepth;         // 深くなるほど下限も下がる
  if (breathGainA) breathGainA.gain.setTargetAtTime(Math.max(breathFloor, b0), t, 0.25);
  if (breathGainB) breathGainB.gain.setTargetAtTime(Math.max(breathFloor, b1), t, 0.25);

  // ── フィルター揺らぎ（こもり感）──
  // w=0.01 はほぼ素通し、w=1 でしっかりこもりながらゆらぐ。
  _filtPh += 0.004 + Math.random() * 0.002;
  const fBase  = 20000 - w * 14000;           // w=1→6000Hz
  const fSwing = Math.sin(_filtPh) * 3500 * w;
  const fTarget = Math.max(1000, fBase + fSwing);
  if (lofiFilterA) lofiFilterA.frequency.setTargetAtTime(fTarget,        t, 0.4);
  if (lofiFilterB) lofiFilterB.frequency.setTargetAtTime(fTarget * 0.96, t, 0.4);

  // ── 空間的揺れ（Stereo pan drift）──
  // w=0.01 はほぼ中央、w=1 で ±0.55 まで静かに漂う。
  _panPh[0] += 0.005 + Math.random() * 0.002;
  _panPh[1] += 0.004 + Math.random() * 0.002;
  const p0 = Math.sin(_panPh[0]) * w * 0.55;
  const p1 = Math.sin(_panPh[1]) * w * 0.55;
  if (wobblePannerA) wobblePannerA.pan.setTargetAtTime(p0, t, 0.35);
  if (wobblePannerB) wobblePannerB.pan.setTargetAtTime(p1, t, 0.35);

  // ── テープヒスノイズ ──
  // w=0.01 は無音同然、w=1 でうっすら感じる程度。
  const nBase  = w * 0.028;
  const nDrift = (Math.sin(_filtPh * 0.6) * 0.5 + 0.5) * 0.012 * w;
  if (noiseGainNode) noiseGainNode.gain.setTargetAtTime(nBase + nDrift, t, 0.3);
}

function onSettingChange() {
  playDuration = +document.getElementById('sliderPlay').value;
  fadeDuration = +document.getElementById('sliderFade').value;
  document.getElementById('valPlay').textContent    = playDuration + 's';
  document.getElementById('valFade').textContent    = fadeDuration + 's';
  document.getElementById('totalBadge').textContent = (playDuration + fadeDuration) + 's';
  // 設定をLocalStorageに永続化

}

  document.getElementById('valVol').textContent = Math.round(masterVolume * 100) + '%';
  applyMasterVolume();

// ════════════════════════════════════════════════════════
//  HISTORY
// ════════════════════════════════════════════════════════
function addToHistory(name) {
  if (!name || playHistory[0] === name) return;
  playHistory.unshift(name);
  if (playHistory.length > 5) playHistory.pop();
  renderHistory();
}

function renderHistory() {
  const ul   = document.getElementById('historyList');
  const wrap = document.getElementById('historyWrap');
  ul.innerHTML = '';
  playHistory.forEach(name => {
    const li = document.createElement('li');
    li.textContent = stripExt(name);
    ul.appendChild(li);
  });
  wrap.style.display = playHistory.length > 0 ? 'block' : 'none';
}

// ════════════════════════════════════════════════════════
//  RANDOM HELPERS
// ════════════════════════════════════════════════════════
function randIdx(exclude = -1) {
  const len = files.length;
  if (len === 0) return -1;          // ファイルなし（呼び元で防ぐが念のため）
  if (len === 1) return 0;           // 1曲しかないので exclude を無視して返す
  if (exclude < 0 || exclude >= len) // exclude が無効値なら単純ランダム
    return Math.floor(Math.random() * len);

  // exclude を避けて選ぶ：候補配列から直接ランダム選択（ループ試行なし）
  const idx = Math.floor(Math.random() * (len - 1));
  return idx < exclude ? idx : idx + 1;
}

// ════════════════════════════════════════════════════════
//  MEDIA SESSION API（ロック画面・通知センターの再生制御）
// ════════════════════════════════════════════════════════
(function setupMediaSession() {
  if (!('mediaSession' in navigator)) return;

  navigator.mediaSession.setActionHandler('play', () => {
    if (!isPlaying && !document.getElementById('btnPlay').disabled) togglePlay();
  });
  navigator.mediaSession.setActionHandler('pause', () => {
    if (isPlaying) stopAll();
  });
  navigator.mediaSession.setActionHandler('stop', () => {
    if (isPlaying) stopAll();
  });
  navigator.mediaSession.setActionHandler('nexttrack', () => {
    if (isPlaying && !document.getElementById('btnSkip').disabled) skipTrack();
  });
  // previoustrack は未対応なので null で明示的に無効化
  try { navigator.mediaSession.setActionHandler('previoustrack', null); } catch(_) {}
})();

function updateMediaSessionPlaying(title) {
  if (!('mediaSession' in navigator)) return;
  navigator.mediaSession.playbackState = 'playing';
  navigator.mediaSession.metadata = new MediaMetadata({
    title: title ? stripExt(title) : 'L-BOX',
    artist: 'Random Jukebox',
    album: 'L-BOX'
  });
}

function updateMediaSessionPaused() {
  if (!('mediaSession' in navigator)) return;
  navigator.mediaSession.playbackState = 'paused';
}

function updateMediaSessionNone() {
  if (!('mediaSession' in navigator)) return;
  navigator.mediaSession.playbackState = 'none';
  navigator.mediaSession.metadata = null;
}

// ════════════════════════════════════════════════════════
//  PLAY / STOP
// ════════════════════════════════════════════════════════
async function togglePlay() {
  if (isPlaying) { stopAll(); return; }
  await resumeAudioContext();   // ジェスチャー文脈で確実に resume してから再生
  isPlaying  = true;
  activeSlot = 0;
  setSlotGain(0, 1);
  setSlotGain(1, 0);
  document.getElementById('btnPlay').textContent = '⏹ STOP';
  document.getElementById('btnPlay').classList.add('stop-mode');
  document.getElementById('btnSkip').disabled = false;
  document.getElementById('btnFull').disabled = false;
  playTrack(true);
}

function stopAll() {
  isPlaying  = false;
  isFading   = false;
  isFullPlay = false;
  operationId++;                 // 進行中のすべての非同期コールバックを無効化
  clearTimeout(fadeTimer);
  clearTimeout(preloadTimer);    // プリロードタイマーも止める
  if (_preloadMetaCleanup) { _preloadMetaCleanup(); _preloadMetaCleanup = null; }  // preload リスナーを除去
  preloadedForIdx = -1;
  clearInterval(tickTimer);
  clearInterval(xfadeTimer);

  // toggleFullPlay が残した ended リスナーを両スロットから一掃する。
  // operationId のインクリメントだけではリスナー自体は Audio 要素に残り続けるため
  // 明示的に removeEventListener する必要がある。
  if (_onFullEnded) {
    audios.forEach(a => a.removeEventListener('ended', _onFullEnded));
    _onFullEnded = null;
  }

  // Web Audio ゲインを即座に 0 にする。
  // setSlotGain() の代入は AudioContext 経由のため十分速いが、
  // masterGain ごと即時消音することでクロスフェード残響や
  // フォールバック（element.volume）の取りこぼしを確実に防ぐ。
  if (actx && masterGain) {
    masterGain.gain.cancelScheduledValues(actx.currentTime);
    masterGain.gain.setValueAtTime(0, actx.currentTime);
  }
  if (actx && gainA) {
    gainA.gain.cancelScheduledValues(actx.currentTime);
    gainA.gain.setValueAtTime(0, actx.currentTime);
  }
  if (actx && gainB) {
    gainB.gain.cancelScheduledValues(actx.currentTime);
    gainB.gain.setValueAtTime(0, actx.currentTime);
  }

  // pause() の失敗（エラー状態の audio 要素、play/pause 競合など）が
  // clearSlotSrc の呼び出しをスキップさせないよう try-catch で分離する。
  // forEach はコールバック内の例外を呼び出し元に伝播させるため、
  // pause() が slot 0 で投げると slot 1 を含む後続処理が止まる。
  audios.forEach((a, i) => {
    try { a.pause(); } catch (_) {}
    a.volume = 0;   // WebAudio 未使用フォールバック用も即時消音
    clearSlotSrc(i);
    setSlotGain(i, 0);  // 停止中は両スロット完全消音（次回 togglePlay で再設定）
  });

  // 停止後に masterGain を再生音量へ戻す（次回 PLAY に備える）
  if (actx && masterGain) {
    masterGain.gain.setValueAtTime(masterVolume, actx.currentTime);
  }

  // ピンクノイズを明示的に消音する。
  // wobbleIntensity > 0 のとき wobbleTick() がノイズゲインを上げ続けているため、
  // stopAll() だけでは「サー」というヒス音が鳴り続いてしまう盲点を塞ぐ。
  if (noiseGainNode && actx) {
    noiseGainNode.gain.setTargetAtTime(0, actx.currentTime, 0.2);
  }

  currentIdx = nextIdx = -1;

  const btnPlay = document.getElementById('btnPlay');
  btnPlay.textContent = '▶ PLAY';
  btnPlay.classList.remove('stop-mode');
  document.getElementById('btnSkip').disabled = true;
  document.getElementById('btnFull').disabled = true;
  updateFullBtn();

  setUIIdle();
  document.getElementById('vinyl').classList.remove('spinning');
  updateMediaSessionNone();
}

// ════════════════════════════════════════════════════════
//  FULL PLAY MODE
// ════════════════════════════════════════════════════════
function toggleFullPlay() {
  if (!isPlaying) return;

  if (isFullPlay) {
    // フルモード解除 → ノーマルへ戻す
    isFullPlay = false;
    updateFullBtn();
    clearInterval(tickTimer);

    // フルモード中に登録した ended リスナーをここで確実に除去する。
    if (_onFullEnded) {
      audios.forEach(a => a.removeEventListener('ended', _onFullEnded));
      _onFullEnded = null;
    }

    // operationId をインクリメントして古い fadeTimer 等を無効化する。
    // フルモード解除後にスキップ等が割り込んでも古いタイマーが
    // startCrossfade を余分に発火しないようにする。
    const myOp  = ++operationId;

    const audio   = audios[activeSlot];
    const snapNow = Date.now();
    const rem     = isFinite(audio.duration) ? Math.max(0, audio.duration - audio.currentTime) : 0;
    const endTime = snapNow + rem * 1000;

    // slotEndTime を更新しておく。finishCrossfade の fadeTimer が
    // slotEndTime - Date.now() を参照するためここで合わせる。
    slotEndTime = endTime;

    if (rem > fadeDuration + 1) {
      startCountdown(rem, endTime);
      clearTimeout(fadeTimer);
      fadeTimer = setTimeout(() => {
        if (myOp !== operationId || !isPlaying || isFading || isFullPlay) return;
        startCrossfade(true);  // operationId はインクリメント済み
      }, Math.max(100, endTime - fadeDuration * 1000 - Date.now()));
    } else {
      // すでにフェード圏内
      startCrossfade(true);
    }

    setUIPlaying(files[currentIdx]?.name ?? '', false);
    // NEXTタイトルを復元
    document.getElementById('nextTitle').textContent = files[nextIdx]?.name ? stripExt(files[nextIdx].name) : '—';
  } else {
    // フルモード開始
    isFullPlay = true;
    isFading   = false;
    operationId++;               // 古い onMeta / fadeTimer 等を無効化
    clearTimeout(fadeTimer);
    clearTimeout(preloadTimer);
    if (_preloadMetaCleanup) { _preloadMetaCleanup(); _preloadMetaCleanup = null; }
    preloadedForIdx = -1;
    clearInterval(xfadeTimer);
    clearInterval(tickTimer);
    updateFullBtn();

    // クロスフェード中（isFading だった）にフルを押した場合、
    // ゲインが大きい方を activeSlot に確定して不要なスロットを止める。
    const preSlot = activeSlot;
    resolveActiveSlot();
    // resolveActiveSlot が inSlot を昇格させた場合、currentIdx は旧スロットのまま。
    // onFullEnded → playTrack(false) が再生済み曲を currentIdx として使い
    // 同じ曲を再ロードするバグを防ぐため、currentIdx と nextIdx を正しく更新する。
    if (activeSlot !== preSlot) {
      currentIdx = nextIdx;
      nextIdx    = randIdx(currentIdx);
    }
    // フルモードは activeSlot を最終音量 1 で再生するため確実に戻す。
    setSlotGain(activeSlot, 1);

    const audio = audios[activeSlot];
    const myOp  = operationId;

    // 前回フルモードのリスナーが残っていれば先に除去してから登録する。
    if (_onFullEnded) {
      audios.forEach(a => a.removeEventListener('ended', _onFullEnded));
      _onFullEnded = null;
    }

    // 曲が終わったら自動でノーマルへ戻り次の曲へ
    function onFullEnded() {
      audio.removeEventListener('ended', onFullEnded);
      _onFullEnded = null;
      if (myOp !== operationId || !isPlaying || !isFullPlay) return;
      isFullPlay = false;
      updateFullBtn();
      playTrack(false);
    }
    _onFullEnded = onFullEnded;
    audio.addEventListener('ended', onFullEnded);

    startFullCountdown();
    // 現在曲名を確実に表示（クロスフェード途中でフルを押した場合にも対応）
    const currentFile = files[currentIdx];
    if (currentFile) {
      const el = document.getElementById('npTitle');
      el.textContent = stripExt(currentFile.name);
      el.classList.remove('idle');
    }
    setUIFullPlay();
  }
}

function updateFullBtn() {
  const btn = document.getElementById('btnFull');
  if (!btn) return;
  if (isFullPlay) {
    btn.textContent = '⏱ ノーマルへ戻す';
    btn.classList.add('full-active');
  } else {
    btn.textContent = '♾ フルで聴く';
    btn.classList.remove('full-active');
  }
}

function startFullCountdown() {
  clearInterval(tickTimer);
  const audio = audios[activeSlot];

  tickTimer = setInterval(() => {
    if (!isFullPlay) { clearInterval(tickTimer); return; }
    const rem   = isFinite(audio.duration) ? Math.max(0, audio.duration - audio.currentTime) : 0;
    const total = isFinite(audio.duration) ? audio.duration : 1;
    const pct   = total > 0 ? ((total - rem) / total) * 100 : 0;

    document.getElementById('countdown').textContent = rem.toFixed(1);
    document.getElementById('progressFill').style.width = pct + '%';

    if (rem <= 0) clearInterval(tickTimer);
  }, 80);
}

// ════════════════════════════════════════════════════════
//  CORE: PLAY A TRACK IN THE ACTIVE SLOT
// ════════════════════════════════════════════════════════
function playTrack(first = false) {
  if (!isPlaying) return;
  isFading   = false;
  isFullPlay = false;
  updateFullBtn();
  clearTimeout(fadeTimer);
  clearInterval(xfadeTimer);

  // この呼び出しの世代番号を確定（以降の非同期処理はこれで自分を識別する）
  const myOp = ++operationId;

  // toggleFullPlay が登録した ended リスナーが残っていれば除去する。
  // playTrack は isFullPlay = false をセット済みなので、もし onFullEnded が
  // 発火しても guard で弾かれるが、リスナー自体を残さないほうが安全。
  if (_onFullEnded) {
    audios.forEach(a => a.removeEventListener('ended', _onFullEnded));
    _onFullEnded = null;
  }

  currentIdx = first ? randIdx() : (nextIdx >= 0 ? nextIdx : randIdx());
  nextIdx    = randIdx(currentIdx);

  const slot  = activeSlot;
  const audio = audios[slot];
  const file  = files[currentIdx];

  setSlotGain(slot, 0);   // フェードイン開始点
  highlightFile(currentIdx);
  document.getElementById('nextTitle').textContent = files[nextIdx]?.name ? stripExt(files[nextIdx].name) : '—';

  setSlotSrc(slot, file);

  function onMeta() {
    audio.removeEventListener('loadedmetadata', onMeta);
    audio.removeEventListener('error',          onLoadError);
    audio.removeEventListener('ended', onEnded);   // 先に両方を解除してから判定
    // 世代が変わっていたら（スキップ・停止等）この処理は無効
    if (myOp !== operationId || !isPlaying) return;

    const dur   = audio.duration;
    const total = playDuration + fadeDuration;
    if (isFinite(dur) && dur > total + 2) {
      audio.currentTime = Math.random() * (dur - total - 1);
    } else if (isFinite(dur) && dur > 4) {
      audio.currentTime = Math.random() * (dur * 0.4);
    }

    audio.play().then(() => {
      if (myOp !== operationId || !isPlaying) return; // play()完了時に再チェック
      document.getElementById('vinyl').classList.add('spinning');
      setUIPlaying(file.name, true);

      // ── フェードイン（クロスフェード秒数に合わせる）──
      const fiSec   = fadeDuration;
      const fiSteps = Math.max(1, Math.round(fiSec * 20));
      let fi = 0;
      const fiTimer = setInterval(() => {
        if (myOp !== operationId || !isPlaying) { clearInterval(fiTimer); return; }
        fi++;
        setSlotGain(slot, Math.min(fi / fiSteps, 1));
        if (fi >= fiSteps) clearInterval(fiTimer);
      }, 50);

      startCountdown(playDuration + fadeDuration);  // 合計時間でカウント

      // カウントダウンが0になるタイミングにtriggerNextSong
      fadeTimer = setTimeout(() => {
        if (myOp !== operationId || !isPlaying || isFading || isFullPlay) return;
        triggerNextSong();
      }, (playDuration + fadeDuration) * 1000);

      // ended イベントはここで再登録（世代ガード付き）
      audio.addEventListener('ended', onEnded);

      // ── 次曲プリロード ──
      // playDuration の 50% 経過時点で inSlot を先行ロードしておく。
      // これにより startCrossfade 発火時に loadedmetadata 待ちが不要になり、
      // fadeDuration が短い / ファイルが大きい / ディスクが低速な環境でも
      // クロスフェードが途切れずに始まる。
      clearTimeout(preloadTimer);
      // 前サイクルで残ったプリロードリスナーをクリアしてから新しいタイマーを設定する
      if (_preloadMetaCleanup) { _preloadMetaCleanup(); _preloadMetaCleanup = null; }
      preloadedForIdx = -1;
      preloadTimer = setTimeout(() => {
        if (myOp !== operationId || !isPlaying || isFading) return;
        schedulePreload(nextIdx, myOp, 1 - slot);
      }, Math.max(0, playDuration * 0.5 * 1000));

    }).catch(err => {
      if (myOp !== operationId || !isPlaying) return;
      console.warn('Play failed:', err);
      setTimeout(() => { if (myOp === operationId && isPlaying) playTrack(false); }, 500);
    });
  }

  function onEnded() {
    audio.removeEventListener('ended', onEnded);
    if (myOp !== operationId || !isPlaying || isFading || isFullPlay) return;
    clearTimeout(fadeTimer);
    triggerNextSong();
  }

  // ── ロードエラー時の自動スキップ ──
  // MediaError（デコード失敗・ファイル破損など）で loadedmetadata が
  // 永遠に来ないケースをカバーする。世代ガード付きで次曲へ自動スキップ。
  function onLoadError(e) {
    audio.removeEventListener('loadedmetadata', onMeta);
    audio.removeEventListener('error',          onLoadError);
    audio.removeEventListener('ended',          onEnded);
    if (myOp !== operationId || !isPlaying) return;
    console.warn('Audio load error, skipping track:', file?.name, e);
    setTimeout(() => { if (myOp === operationId && isPlaying) playTrack(false); }, 300);
  }

  audio.addEventListener('loadedmetadata', onMeta);
  audio.addEventListener('error',          onLoadError);
  audio.load();
}

// ════════════════════════════════════════════════════════
//  PRELOAD — 再生中に次曲を先行ロード
//  playTrack の中盤でタイマー起動し、クロスフェード開始前に
//  inSlot の src セット・load・シーク位置決定まで済ませておく。
//  startCrossfade がプリロード済みを検知した場合は loadedmetadata
//  待ちをスキップして即 play() へ移行することでプツン切れを防ぐ。
// ════════════════════════════════════════════════════════
function schedulePreload(targetIdx, myOp, inSlot) {
  // 前回の schedulePreload が登録した onPreloadMeta が残っていれば先に除去する。
  // 連続スキップや設定変更で schedulePreload が再呼び出しされた場合に
  // 古いリスナーが loadedmetadata を誤処理するのを防ぐ。
  if (_preloadMetaCleanup) { _preloadMetaCleanup(); _preloadMetaCleanup = null; }

  if (isFading || targetIdx < 0 || !files[targetIdx]) return;

  const inAudio = audios[inSlot];
  const inFile  = files[targetIdx];

  setSlotGain(inSlot, 0);     // 無音で準備
  setSlotSrc(inSlot, inFile);

  function onPreloadMeta() {
    inAudio.removeEventListener('loadedmetadata', onPreloadMeta);
    inAudio.removeEventListener('error',          onPreloadError);
    _preloadMetaCleanup = null;
    if (myOp !== operationId || !isPlaying || isFading) return;

    const dur   = inAudio.duration;
    const total = playDuration + fadeDuration;
    if (isFinite(dur) && dur > total + 2) {
      inAudio.currentTime = Math.random() * (dur - total - 1);
    } else if (isFinite(dur) && dur > 4) {
      inAudio.currentTime = Math.random() * (dur * 0.4);
    }

    preloadedForIdx = targetIdx;
  }

  // プリロード中にファイルが読めなかった場合はリスナーを解除してリセットするだけ。
  // startCrossfade は preloadedForIdx !== nextIdx を検知して自力でロードし直す。
  function onPreloadError() {
    inAudio.removeEventListener('loadedmetadata', onPreloadMeta);
    inAudio.removeEventListener('error',          onPreloadError);
    _preloadMetaCleanup = null;
    preloadedForIdx = -1;
    console.warn('Preload error, will reload on crossfade:', inFile?.name);
  }

  _preloadMetaCleanup = () => {
    inAudio.removeEventListener('loadedmetadata', onPreloadMeta);
    inAudio.removeEventListener('error',          onPreloadError);
  };
  inAudio.addEventListener('loadedmetadata', onPreloadMeta);
  inAudio.addEventListener('error',          onPreloadError);
  inAudio.load();
}

// ════════════════════════════════════════════════════════
//  TRIGGER NEXT SONG ― カウント0と同時に呼ばれる司令塔
//  ① 曲名を次の曲に切り替え（履歴追加）
//  ② 新しい20秒カウントダウンをスタート
//  ③ クロスフェードを開始
// ════════════════════════════════════════════════════════
function triggerNextSong() {
  if (!isPlaying || isFading || isFullPlay) return;

  // ① NOW PLAYINGを次の曲名に切り替え（カウント0の瞬間）
  const nextFile = files[nextIdx];
  if (nextFile) setUIPlaying(nextFile.name, true);

  // ② operationId をここでインクリメントし startCrossfade に伝える。
  //    startCrossfade 内で二重インクリメントされるのを防ぐ。
  operationId++;
  slotEndTime = Date.now() + (playDuration + fadeDuration) * 1000;
  startCountdown(playDuration + fadeDuration, slotEndTime);

  // ③ クロスフェード開始（operationId はインクリメント済み）
  startCrossfade(true);
}

// ════════════════════════════════════════════════════════
//  CROSSFADE
// ════════════════════════════════════════════════════════
function startCrossfade(alreadyBumped = false) {
  if (!isPlaying || isFading) return;
  isFading = true;
  clearTimeout(fadeTimer);
  clearTimeout(preloadTimer);  // 進行中のプリロードタイマーを止める

  // この呼び出しの世代番号を確定
  // skipTrack 等が呼び出し前に operationId をインクリメント済みの場合は
  // 二重インクリメントを避けるため現在値をそのまま使う。
  const myOp = alreadyBumped ? operationId : ++operationId;

  const outSlot = activeSlot;
  const inSlot  = 1 - activeSlot;
  const inAudio = audios[inSlot];
  const inFile  = files[nextIdx];

  if (!inFile) {
    // ファイルが見つからない場合もスロット情報を渡して
    // activeSlot と currentIdx が正しく更新されるようにする。
    isFading = false;
    finishCrossfade(outSlot, inSlot);
    return;
  }

  setSlotGain(inSlot, 0);

  function onNextMeta() {
    inAudio.removeEventListener('loadedmetadata', onNextMeta);
    inAudio.removeEventListener('error',          onNextLoadError);
    // バグ②: isFullPlay もガードする。
    // ロード待ち中にユーザーがフルモードをONにした場合、
    // クロスフェードをここで止めて何もしない。
    if (myOp !== operationId || !isPlaying || isFullPlay) return;

    // プリロード時にシーク済みでなければここで決定する
    // （nextIdx が skip 等で変わっていた場合もここで再シークされる）
    if (preloadedForIdx !== nextIdx) {
      const dur   = inAudio.duration;
      const total = playDuration + fadeDuration;
      if (isFinite(dur) && dur > total + 2) {
        inAudio.currentTime = Math.random() * (dur - total - 1);
      } else if (isFinite(dur) && dur > 4) {
        inAudio.currentTime = Math.random() * (dur * 0.4);
      }
    }

    inAudio.play().then(() => {
      if (myOp !== operationId || !isPlaying || isFullPlay) return; // play()完了時に再チェック
      setUIFading();

      const totalSteps = fadeDuration * 20;
      let step = 0;
      clearInterval(xfadeTimer);

      const startOutGain = (actx && gainA)
        ? (outSlot === 0 ? gainA.gain.value : gainB.gain.value)
        : 1;

      xfadeTimer = setInterval(() => {
        if (myOp !== operationId || !isPlaying) { clearInterval(xfadeTimer); return; }
        step++;
        const t = Math.min(step / totalSteps, 1);
        setSlotGain(outSlot, startOutGain * (1 - t));
        setSlotGain(inSlot,  t);

        if (t >= 1) {
          clearInterval(xfadeTimer);
          if (myOp === operationId) finishCrossfade(outSlot, inSlot);
        }
      }, 50);

    }).catch(err => {
      // バグ③: play() 失敗時に finishCrossfade でスロットを切り替えると
      // inAudio が無音のまま activeSlot になってしまう。
      // isFading を解除して playTrack で仕切り直す。
      if (myOp !== operationId || !isPlaying) return;
      console.warn('Next play failed:', err);
      isFading = false;
      setSlotGain(outSlot, 1);   // outSlot を音量MAX に戻す
      setSlotGain(inSlot,  0);
      setTimeout(() => { if (myOp === operationId && isPlaying) playTrack(false); }, 300);
    });
  }

  // ── クロスフェード先のロードエラー時の回復 ──
  // 次曲ファイルが破損している等で loadedmetadata が来ない場合に
  // finishCrossfade でスロット切替だけ済ませ、その後 playTrack が
  // 新たな曲を選びなおす（finishCrossfade 内の fadeTimer で自然につながる）。
  function onNextLoadError(e) {
    inAudio.removeEventListener('loadedmetadata', onNextMeta);
    inAudio.removeEventListener('error',          onNextLoadError);
    if (myOp !== operationId || !isPlaying) return;
    console.warn('Next audio load error, skipping to next:', inFile?.name, e);
    isFading = false;
    // nextIdx を更新してから playTrack で仕切り直す
    nextIdx = randIdx(currentIdx);
    setTimeout(() => { if (myOp === operationId && isPlaying) playTrack(false); }, 300);
  }

  // プリロード済み（同じ nextIdx で loadedmetadata 取得・シーク完了）かどうか確認。
  // readyState >= 1 (HAVE_METADATA) で duration が利用可能な状態を保証する。
  if (preloadedForIdx === nextIdx && inAudio.readyState >= 1) {
    // loadedmetadata 待ちをスキップして即 play() へ
    // プリロードリスナーはすでに自己解除済みのため _preloadMetaCleanup は null のはずだが念のためクリア
    _preloadMetaCleanup = null;
    onNextMeta();
  } else {
    // 未プリロード / nextIdx が変わっていた場合は改めてロードする。
    // 古い onPreloadMeta が inAudio に残っている可能性があるため先に明示除去する。
    // （除去しないと loadedmetadata が onPreloadMeta と onNextMeta の両方に届き
    //   世代ガードで弾かれるだけだが、不要なリスナー残存を避けて意図を明確にする）
    if (_preloadMetaCleanup) { _preloadMetaCleanup(); _preloadMetaCleanup = null; }
    setSlotSrc(inSlot, inFile);
    inAudio.addEventListener('loadedmetadata', onNextMeta);
    inAudio.addEventListener('error',          onNextLoadError);
    inAudio.load();
  }
}

function finishCrossfade(outSlot, inSlot) {
  if (!isPlaying) return;
  isFading = false;

  // クロスフェード完了時点でプリロード関連状態を明示リセットする。
  // 次の playTrack / schedulePreload サイクルが始まる前にクリーンな状態を保証する。
  if (_preloadMetaCleanup) { _preloadMetaCleanup(); _preloadMetaCleanup = null; }
  preloadedForIdx = -1;

  if (outSlot !== undefined) {
    try { audios[outSlot].pause(); } catch (_) {}
    clearSlotSrc(outSlot);
    setSlotGain(outSlot, 0);
  }

  if (inSlot !== undefined) activeSlot = inSlot;
  setSlotGain(activeSlot, 1);

  currentIdx = nextIdx;
  nextIdx    = randIdx(currentIdx);

  highlightFile(currentIdx);
  document.getElementById('nextTitle').textContent = files[nextIdx]?.name ? stripExt(files[nextIdx].name) : '—';

  // 曲名・カウントダウンはtriggerNextSongで既に設定済み
  // ステータスをPLAYINGに戻す（tickでも更新されるが即時反映のため）
  document.getElementById('statusDot').className   = 'status-dot on';
  document.getElementById('statusText').textContent = 'PLAYING';

  // slotEndTime（次のカウント0）まで待ってtriggerNextSong
  // operationId を世代ガードに使うことで、スキップ・連打時に
  // 古い finishCrossfade のタイマーが余分に triggerNextSong を
  // 発火するのを防ぐ。
  //
  // toggleFullPlay 解除→クロスフェード完了後は slotEndTime が既に過去の時刻になっており、
  // そのまま使うと triggerNextSong が 100ms 後に即発火してしまう。
  // slotEndTime の残り時間が playDuration の半分未満のとき（＝期限切れ or 過去）
  // 新しい曲に対してフルスロットをリセットする。
  const leftMs = slotEndTime - Date.now();
  if (leftMs < playDuration * 500) {
    slotEndTime = Date.now() + (playDuration + fadeDuration) * 1000;
    startCountdown(playDuration + fadeDuration, slotEndTime);
  }
  const myFinishOp = operationId;
  clearTimeout(fadeTimer);
  fadeTimer = setTimeout(() => {
    if (myFinishOp !== operationId || !isPlaying || isFading || isFullPlay) return;
    triggerNextSong();
  }, Math.max(100, slotEndTime - Date.now()));
}

// ════════════════════════════════════════════════════════
//  SKIP (クロスフェードで切り替え)
// ════════════════════════════════════════════════════════
function skipTrack() {
  if (!isPlaying) return;

  // クロスフェード中でも受け付ける。
  // 進行中の xfadeTimer・loadedmetadata 待ちをすべて無効化してから
  // スロット状態を手動でリセットし、新しいクロスフェードを開始する。

  operationId++;                 // 進行中のすべての非同期コールバックを無効化
  isFullPlay = false;
  isFading   = false;            // クロスフェード中フラグを強制解除
  clearTimeout(fadeTimer);
  clearTimeout(preloadTimer);
  if (_preloadMetaCleanup) { _preloadMetaCleanup(); _preloadMetaCleanup = null; }
  if (_onFullEnded) { audios.forEach(a => a.removeEventListener('ended', _onFullEnded)); _onFullEnded = null; }
  preloadedForIdx = -1;
  clearInterval(xfadeTimer);
  clearInterval(tickTimer);
  updateFullBtn();

  // クロスフェード途中でスキップした場合、ゲインが大きい方（主役）を
  // activeSlot に昇格させ、小さい方を止める。
  // ゲインはいじらず現在値のまま startCrossfade に引き継ぐ（急激な音量変化を防ぐ）。
  resolveActiveSlot();
  if (nextIdx >= 0) currentIdx = nextIdx;

  nextIdx = randIdx(currentIdx);

  const nextFile = files[nextIdx];
  if (nextFile) setUIPlaying(nextFile.name, true);

  slotEndTime = Date.now() + (fadeDuration + playDuration) * 1000;
  startCountdown(fadeDuration + playDuration, slotEndTime);
  startCrossfade(true);  // operationId は skipTrack 内でインクリメント済み
}

// ════════════════════════════════════════════════════════
//  COUNTDOWN (ノーマルモード) ― 合計時間からカウント
// ════════════════════════════════════════════════════════
// anchorEndTime を渡すと slotEndTime をその値で固定し Date.now() を再サンプルしない。
// toggleFullPlay 解除時など「呼び出し元が既に終了時刻を決定済み」の場合に使う。
function startCountdown(totalSec, anchorEndTime) {
  clearInterval(tickTimer);
  slotEndTime = (anchorEndTime !== undefined) ? anchorEndTime : Date.now() + totalSec * 1000;
  // カウント開始時点の終了時刻を固定して pct 計算の基準にする。
  // triggerNextSong が slotEndTime を上書きした後も "今のサイクルの全体幅" を
  // 保持するため、tick クロージャは startTime を独自に持つ。
  const startTime = Date.now();

  function tick() {
    if (isFullPlay) { clearInterval(tickTimer); return; }
    const rem     = Math.max(0, (slotEndTime - Date.now()) / 1000);
    // 経過時間をスロット開始から測り、終了時刻との差分で全体幅を動的に求める。
    // これにより triggerNextSong が slotEndTime をリセットしても
    // プログレスバーが瞬間的に跳ぶ（あるいは 0 に戻る）ことを防ぐ。
    const elapsed  = (Date.now() - startTime) / 1000;
    const spanSec  = elapsed + rem;                    // 現時点で見える全体幅
    const pct      = spanSec > 0 ? (elapsed / spanSec) * 100 : 0;

    document.getElementById('countdown').textContent = rem.toFixed(1);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressFill').classList.remove('full-mode');

    // クロスフェード中かどうかで表示を切り替え
    if (isFading) {
      document.getElementById('countdown').classList.add('fading');
      document.getElementById('countdown').classList.remove('full');
      document.getElementById('statusDot').className   = 'status-dot xfade';
      document.getElementById('statusText').textContent = 'CROSSFADING...';
      document.getElementById('pillPlay').classList.remove('active');
      document.getElementById('pillFade').classList.add('fading-pill');
    } else {
      document.getElementById('countdown').classList.remove('fading', 'full');
      document.getElementById('pillPlay').classList.add('active');
      document.getElementById('pillFade').classList.remove('fading-pill');
    }

    if (rem <= 0) clearInterval(tickTimer);
  }
  tick();
  tickTimer = setInterval(tick, 80);
}

// ════════════════════════════════════════════════════════
//  UI HELPERS
// ════════════════════════════════════════════════════════
// addHistory: true=履歴に追加、false=タイトル更新のみ
function setUIPlaying(title, addHistoryFlag = true) {
  const el = document.getElementById('npTitle');
  el.textContent = stripExt(title);
  el.classList.remove('idle');

  if (addHistoryFlag) addToHistory(title);

  updateMediaSessionPlaying(title);

  if (!isFullPlay) {
    document.getElementById('statusDot').className   = 'status-dot on';
    document.getElementById('statusText').textContent = 'PLAYING';
    document.getElementById('pillPlay').classList.add('active');
    document.getElementById('pillFade').classList.remove('fading-pill');
    document.getElementById('pillFull').classList.remove('full-pill');
  }
}

function setUIFading() {
  document.getElementById('statusDot').className   = 'status-dot xfade';
  document.getElementById('statusText').textContent = 'CROSSFADING...';
}

function setUIFullPlay() {
  document.getElementById('statusDot').className   = 'status-dot full';
  document.getElementById('statusText').textContent = 'FULL PLAY';
  document.getElementById('pillPlay').classList.remove('active');
  document.getElementById('pillFade').classList.remove('fading-pill');
  document.getElementById('pillFull').classList.add('full-pill');
  document.getElementById('countdown').classList.remove('fading');
  document.getElementById('countdown').classList.add('full');
  document.getElementById('progressFill').classList.add('full-mode');
  document.getElementById('nextTitle').textContent = '— フルで再生中 —';
  // フルモード時もMedia Sessionを更新
  const currentFile = files[currentIdx];
  if (currentFile) updateMediaSessionPlaying(currentFile.name);
}

function setUIIdle() {
  const el = document.getElementById('npTitle');
  el.textContent = '— フォルダを選択して再生を開始してください —';
  el.classList.add('idle');

  document.getElementById('countdown').textContent    = '--.-';
  document.getElementById('countdown').classList.remove('fading', 'full');
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('progressFill').classList.remove('full-mode');
  document.getElementById('nextTitle').textContent     = '—';
  document.getElementById('statusDot').className       = 'status-dot';
  document.getElementById('statusText').textContent    = 'STOPPED';
  document.getElementById('pillPlay').classList.remove('active');
  document.getElementById('pillFade').classList.remove('fading-pill');
  document.getElementById('pillFull').classList.remove('full-pill');

  // 停止時に再生履歴をリセットして非表示に戻す
  playHistory = [];
  document.getElementById('historyList').innerHTML = '';
  document.getElementById('historyWrap').style.display = 'none';
}

// ════════════════════════════════════════════════════════
//  AUDIO INTERRUPTION AUTO-RESUME
//  電話などで中断された後、自動的に再開する
// ════════════════════════════════════════════════════════
(function setupAutoResume() {
  // 中断直前に再生中だったかどうかを記憶するフラグ
  let wasPlayingBeforeInterrupt = false;

  // Web Audio Context のサスペンド/再開で検知する
  // （電話着信時にブラウザが AudioContext を suspend する）
  function checkAudioContextState() {
    if (!actx) return;
    if (actx.state === 'suspended' && isPlaying) {
      wasPlayingBeforeInterrupt = true;
    } else if (actx.state === 'running' && wasPlayingBeforeInterrupt) {
      wasPlayingBeforeInterrupt = false;
      // AudioContext は既に running に戻っているので audio 要素を再開するだけ
      audios.forEach(a => {
        if (!a.paused && a.src) return; // すでに再生中ならスキップ
        // src があって一時停止中の場合だけ再開
        if (a.src && a.paused && isPlaying) {
          a.play().catch(() => {});
        }
      });
    }
  }

  // AudioContext の状態変化を監視（100ms ポーリング）
  setInterval(() => {
    if (!actx || !isPlaying) return;
    checkAudioContextState();
  }, 100);

  // visibilitychange: 画面が非表示→表示に戻ったタイミングでも確認
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState !== 'visible') return;
    if (!isPlaying) return;

    // AudioContext が止まっていたら再開
    if (actx && actx.state === 'suspended') {
      actx.resume().then(() => {
        audios.forEach(a => {
          if (a.src && a.paused) a.play().catch(() => {});
        });
      });
      return;
    }

    // audio 要素が止まっていたら再開（AudioContext は動いているケース）
    audios.forEach(a => {
      if (a.src && a.paused) a.play().catch(() => {});
    });
  });

  // pause イベントで中断を検知（電話着信など外部要因による pause）
  // ユーザーの意図的な STOP とは isPlaying で区別できる
  function onExternalPause(e) {
    if (!isPlaying) return; // ユーザーが止めた場合は何もしない
    wasPlayingBeforeInterrupt = true;
  }

  function onExternalPlay() {
    wasPlayingBeforeInterrupt = false;
  }

  // audios 配列に対してリスナーを設定
  // (audios は initAudioContext より前に定義されているため直接登録)
  audios.forEach(a => {
    a.addEventListener('pause', onExternalPause);
    a.addEventListener('play',  onExternalPlay);
  });

  // AudioContext の statechange イベントでも拾う
  // （actx は initAudioContext 後に存在するのでポーリングで後付け登録）
  let acStateWatcher = setInterval(() => {
    if (!actx) return;
    clearInterval(acStateWatcher);
    actx.addEventListener('statechange', () => {
      if (actx.state === 'running' && wasPlayingBeforeInterrupt && isPlaying) {
        wasPlayingBeforeInterrupt = false;
        audios.forEach(a => {
          if (a.src && a.paused) a.play().catch(() => {});
        });
      }
    });
  }, 200);
})();

// ════════════════════════════════════════════════════════
//  KEYBOARD SHORTCUTS
// ════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return; // スライダー操作中は無視
  switch (e.code) {
    case 'Space':
      e.preventDefault();
      // keydown の preventDefault() でスクロールを止めつつ、
      // blur() でフォーカスを body に移してから togglePlay を呼ぶ。
      // 一部ブラウザは keyup で合成 click を生成するため、
      // keyup でも Space を preventDefault する（下の keyup ハンドラ参照）。
      if (document.activeElement && document.activeElement !== document.body) {
        document.activeElement.blur();
      }
      if (!document.getElementById('btnPlay').disabled) togglePlay();
      break;
    case 'ArrowRight':
      e.preventDefault();
      if (!document.getElementById('btnSkip').disabled) skipTrack();
      break;
    case 'KeyF':
      if (!document.getElementById('btnFull').disabled) toggleFullPlay();
      break;
  }
});

// Space の keyup でも preventDefault して合成クリックを完全に封じる。
// blur() 後にフォーカスが body にあれば合成 click は届かないが、
// blur() が失敗した場合（shadow DOM 内のボタン等）の保険として追加する。
document.addEventListener('keyup', e => {
  if (e.code === 'Space' && e.target.tagName !== 'INPUT') {
    e.preventDefault();
  }
});

// ════════════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════════════
// LocalStorageから前回の設定を復元してスライダーに反映
(function loadSavedSettings() {
  const savedPlay   = localStorage.getItem('jukebox_play');
  const savedFade   = localStorage.getItem('jukebox_fade');
  const savedVol    = localStorage.getItem('jukebox_vol');
  const savedWobble = localStorage.getItem('jukebox_wobble');
  if (savedPlay   !== null) document.getElementById('sliderPlay').value   = savedPlay;
  if (savedFade   !== null) document.getElementById('sliderFade').value   = savedFade;
  if (savedVol    !== null) document.getElementById('sliderVol').value    = savedVol;
  if (savedWobble !== null) document.getElementById('sliderWobble').value = savedWobble;
})();

onSettingChange();
onVolumeChange();
onWobbleChange();
tryRestoreFolder();
</script>
