<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#00e5cc">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no">
<meta name="description" content="L-BOX — ローカルフォルダの音源をクロスフェードでつないで流すブラウザ完結型ランダムジュークボックス。揺らぎ・スリープタイマー・ロック画面操作対応。">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.svg">
<title>L-BOX</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* 端末側のノッチ・角丸ディスプレイ・狭幅ビューでも横スクロールが出ないように。
   .controls の grid 子要素が min-content で右に飛び出した場合の最終防衛線。 */
html, body { overflow-x: hidden; }

:root {
  --bg:        #000d0f;
  --panel:     #001518;
  --panel2:    #001e22;
  --panel3:    #002830;
  --amber:     #00e5cc;
  --amber-dim: #008a80;
  --amber-lo:  #003d40;
  --neon:      #00ffee;
  --neon-glow: rgba(0,255,238,0.5);
  --cream:     #d0f7f5;
  --dim:       #2a8a88;
  --dim2:      #3d8a85;
  --green:     #3dffe0;
  --green-glow:rgba(61,255,224,0.4);
  --red:       #ff4455;
}

body {
  background: var(--bg);
  color: var(--cream);
  font-family: 'Courier New', Courier, monospace;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,229,204,0.07) 0%, transparent 70%),
    repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,200,180,0.012) 3px, rgba(0,200,180,0.012) 4px);
  -webkit-tap-highlight-color: transparent;
  -webkit-text-size-adjust: 100%;
       text-size-adjust: 100%;
}

/* ─── JUKEBOX SHELL ─── */
.jukebox {
  width: 100%;
  max-width: 660px;
  background: var(--panel);
  border: 2px solid var(--amber-dim);
  border-radius: 16px;
  box-shadow:
    0 0 0 1px rgba(0,229,204,0.08),
    0 0 50px rgba(0,229,204,0.18),
    0 0 120px rgba(0,229,204,0.07),
    inset 0 1px 0 rgba(0,230,210,0.06);
  overflow: hidden;
}

/* ─── HEADER ─── */
.header {
  background: var(--panel2);
  border-bottom: 1px solid var(--amber-dim);
  padding: 22px 28px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.header-left { flex: 1; }

.header h1 {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 44px;
  letter-spacing: 18px;
  color: var(--amber);
  text-shadow:
    0 0 8px  rgba(0,255,238,0.8),
    0 0 24px rgba(0,220,200,0.4),
    0 0 60px rgba(0,180,160,0.15);
  line-height: 1;
  margin-left: 2px;
}

.header-sub {
  font-size: 10px;
  letter-spacing: 5px;
  color: var(--dim);
  margin-top: 6px;
  text-transform: uppercase;
}

/* spinning vinyl */
.vinyl {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background:
    radial-gradient(circle at 50% 50%, #002a28 0%, #002a28 12%, transparent 12%),
    repeating-radial-gradient(circle at 50% 50%, #001a18 0px, #001a18 3px, #000d0d 3px, #000d0d 6px);
  border: 3px solid #004a48;
  box-shadow:
    0 0 0 2px #001a18,
    0 0 0 4px var(--amber-dim),
    0 0 20px rgba(0,229,204,0.15);
  position: relative;
  flex-shrink: 0;
  animation: spin 4s linear infinite paused;
}
.vinyl.spinning { animation-play-state: running; }
.vinyl::after {
  content: '';
  position: absolute;
  inset: 50%;
  transform: translate(-50%,-50%);
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--amber);
  box-shadow: 0 0 6px var(--neon-glow);
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ─── NOW PLAYING ─── */
.now-playing {
  padding: 18px 28px;
  background: var(--panel2);
  border-bottom: 1px solid var(--amber-lo);
}

.np-label {
  font-size: 9px;
  letter-spacing: 4px;
  color: var(--dim);
  text-transform: uppercase;
  margin-bottom: 6px;
}

.np-title {
  font-size: 18px;
  color: var(--cream);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-height: 26px;
  letter-spacing: 0.5px;
  transition: color 0.3s;
}
.np-title.idle { color: var(--dim); font-style: italic; }

.progress-row {
  display: flex;
  align-items: center;
  margin-top: 10px;
}

.progress-bg {
  flex: 1;
  height: 5px;
  background: var(--amber-lo);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(to right, var(--amber-dim), var(--amber), var(--neon));
  border-radius: 3px;
  width: 0%;
  transition: width 0.1s linear;
  box-shadow: 0 0 6px var(--neon-glow);
}
/* full play mode: green progress */
.progress-fill.full-mode {
  background: linear-gradient(to right, #1a8f50, var(--green), #a0ffcc);
  box-shadow: 0 0 6px var(--green-glow);
}

.phase-label {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--dim);
  margin-top: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.phase-pill {
  display: inline-block;
  padding: 1px 7px;
  border-radius: 10px;
  background: var(--amber-lo);
  color: var(--amber-dim);
  font-size: 10px;
  letter-spacing: 2px;
  transition: all 0.3s;
}
.phase-pill.active      { background: rgba(0,229,204,0.15); color: var(--amber); }
.phase-pill.fading-pill { background: rgba(0,255,238,0.15);  color: var(--neon); }
.phase-pill.full-pill   { background: rgba(61,255,224,0.15); color: var(--green); }

/* ─── NEXT TRACK ─── */
.next-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-top: 8px;
}
.next-prefix { font-size: 9px; letter-spacing: 3px; color: var(--dim); flex-shrink: 0; }
.next-name   { font-size: 11px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ─── STATUS BAR ─── */
.status-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 28px;
  background: var(--panel3);
  border-bottom: 1px solid var(--amber-lo);
}

.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--dim2);
  flex-shrink: 0;
  transition: background 0.3s, box-shadow 0.3s;
}
.status-dot.on    { background: var(--green); box-shadow: 0 0 8px var(--green); animation: blink 2s ease-in-out infinite; }
.status-dot.xfade { background: var(--neon);  box-shadow: 0 0 8px var(--neon-glow); animation: blink 0.7s ease-in-out infinite; }
.status-dot.full  { background: var(--green); box-shadow: 0 0 8px var(--green); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

.status-text     { font-size: 10px; letter-spacing: 2px; color: var(--dim); flex: 1; }
.file-count-badge{ font-size: 10px; color: var(--dim2); letter-spacing: 1px; }

/* ─── CONTROLS ─── */
.controls {
  display: grid;
  grid-template-columns: 1fr 1.4fr 1fr;
  grid-template-rows: auto auto;
  gap: 10px;
  padding: 18px 28px;
  border-bottom: 1px solid var(--amber-lo);
}
/* grid 子の min-content（white-space:nowrap + letter-spacing で広がりがち）が
   1fr 割合を上回って右にはみ出すのを抑制。あふれた分は省略表示にする。
   ※「📁 フォルダ選択」「⏭ スキップ」など狭幅端末で見切れる主因はこれ。 */
.controls > .btn {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
}

.btn {
  padding: 13px 8px;
  border: 1px solid var(--amber-lo);
  background: transparent;
  color: var(--amber-dim);
  font-family: 'Courier New', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 6px;
  transition: all 0.15s;
  outline: none;
  white-space: nowrap;
  touch-action: manipulation;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  min-height: 44px;
}
.btn:hover:not(:disabled) {
  border-color: var(--amber);
  color: var(--amber);
  background: rgba(0,229,204,0.07);
  box-shadow: 0 0 14px rgba(0,229,204,0.2);
}
.btn:active:not(:disabled) { transform: scale(0.97); }
/* キーボード操作時のみフォーカスリングを出す（マウスクリックでは出さない） */
.btn:focus-visible,
.sleep-btn:focus-visible,
#restoreBtn:focus-visible,
#volLabel:focus-visible,
#searchInput:focus-visible {
  outline: 2px solid var(--neon);
  outline-offset: 2px;
  box-shadow: 0 0 12px var(--neon-glow);
}

.btn.primary {
  border-color: var(--amber);
  color: var(--bg);
  background: var(--amber);
  font-weight: bold;
  box-shadow: 0 0 18px rgba(0,229,204,0.4);
  font-size: 13px;
  letter-spacing: 3px;
}
.btn.primary:hover:not(:disabled) {
  background: var(--neon);
  border-color: var(--neon);
  box-shadow: 0 0 28px var(--neon-glow);
  color: var(--bg);
}
.btn.primary.stop-mode {
  background: transparent;
  color: var(--red);
  border-color: var(--red);
  box-shadow: 0 0 14px rgba(255,68,85,0.2);
}
.btn.primary.stop-mode:hover:not(:disabled) {
  background: rgba(255,68,85,0.1);
  box-shadow: 0 0 22px rgba(255,68,85,0.3);
}

/* Full Play / Repeat 1 — 2ボタンを横並びに収める行 */
.full-repeat-row {
  grid-column: 1 / -1;
  display: flex;
  gap: 10px;
}
.full-repeat-row .btn {
  flex: 1;
  min-width: 0;       /* flex子の min-content による横はみ出しを抑制 */
}

/* Full Play button */
.btn.full-btn {
  font-size: 11px;
  letter-spacing: 2px;
  padding: 11px 8px;
}

/* Repeat 1 button — 通常状態は Full と同じ落ち着いた見た目 */
.btn.repeat-btn {
  font-size: 11px;
  letter-spacing: 2px;
  padding: 11px 8px;
}
/* アクティブ時はネオン系シアンで Full(緑) と視覚的に分離 */
.btn.repeat-btn.repeat-active {
  border-color: var(--neon);
  color: var(--neon);
  background: rgba(0,255,238,0.06);
  box-shadow: 0 0 18px rgba(0,255,238,0.2);
}
.btn.repeat-btn.repeat-active:hover:not(:disabled) {
  background: rgba(0,255,238,0.12);
  box-shadow: 0 0 28px rgba(0,255,238,0.35);
}

/* Restore button */
.btn.restore-btn {
  grid-column: 1 / -1;
  font-size: 11px;
  letter-spacing: 2px;
  padding: 11px 8px;
  border-color: var(--amber);
  color: var(--amber);
  background: rgba(0,229,204,0.08);
  box-shadow: 0 0 12px rgba(0,229,204,0.15);
}
.btn.restore-btn:hover:not(:disabled) {
  background: rgba(0,229,204,0.18);
  box-shadow: 0 0 22px rgba(0,229,204,0.3);
}
.btn.full-btn.full-active {
  border-color: var(--green);
  color: var(--green);
  background: rgba(61,255,143,0.06);
  box-shadow: 0 0 18px rgba(61,255,143,0.2);
}
.btn.full-btn.full-active:hover:not(:disabled) {
  background: rgba(61,255,143,0.12);
  box-shadow: 0 0 28px rgba(61,255,143,0.35);
}

.btn:disabled { opacity: 0.25; cursor: not-allowed; }

/* ─── RESTORE BANNER ─── */
#restoreBanner {
  padding: 14px 28px;
  background: rgba(0,229,204,0.10);
  border-bottom: 2px solid var(--amber);
  border-top: 2px solid var(--amber);
  display: flex;
  align-items: center;
  gap: 14px;
  animation: bannerPulse 2.5s ease-in-out infinite;
}
@keyframes bannerPulse {
  0%,100% { box-shadow: inset 0 0 0 0 rgba(0,229,204,0.0); }
  50%      { box-shadow: inset 0 0 24px 0 rgba(0,229,204,0.12); }
}
#restoreIcon {
  font-size: 22px;
  flex-shrink: 0;
  filter: drop-shadow(0 0 6px rgba(0,229,204,0.6));
}
#restoreTextGroup { flex: 1; }
#restoreTitle {
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--amber);
  text-transform: uppercase;
  margin-bottom: 2px;
  text-shadow: 0 0 8px rgba(0,229,204,0.4);
}
#restoreInfo {
  font-size: 10px;
  color: var(--amber-dim);
  letter-spacing: 1px;
}
#restoreBtn {
  padding: 10px 18px;
  border: 2px solid var(--amber);
  background: var(--amber);
  color: var(--bg);
  font-family: 'Courier New', monospace;
  font-size: 12px;
  font-weight: bold;
  letter-spacing: 2px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
  box-shadow: 0 0 18px rgba(0,229,204,0.35);
  white-space: nowrap;
}
#restoreBtn:hover {
  background: var(--neon);
  border-color: var(--neon);
  box-shadow: 0 0 28px var(--neon-glow);
}
#restoreBtn:active { transform: scale(0.97); }

/* ─── SETTINGS ─── */
.settings {
  padding: 18px 28px;
  border-bottom: 1px solid var(--amber-lo);
}

.settings-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.settings-title {
  font-size: 9px;
  letter-spacing: 4px;
  color: var(--dim);
  text-transform: uppercase;
}
.total-badge {
  font-size: 10px;
  color: var(--amber-dim);
  letter-spacing: 1px;
}

.setting-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}
.setting-row:last-child { margin-bottom: 0; }

.setting-label {
  font-size: 10px;
  color: var(--cream);
  letter-spacing: 1px;
  width: 130px;
  flex-shrink: 0;
  /* label要素に置き換わっても div と同じ感触を保つ（IビームではなくデフォルトUA矢印） */
  cursor: default;
}
/* <label for=slider> はクリック→スライダーへフォーカスが移るためポインタにする */
label.setting-label[for] { cursor: pointer; }

input[type=range] {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 3px;
  background: var(--amber-lo);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  background: var(--amber);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--neon-glow);
  cursor: pointer;
  transition: transform 0.1s;
}
input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
input[type=range]::-moz-range-thumb {
  width: 14px;
  height: 14px;
  background: var(--amber);
  border: none;
  border-radius: 50%;
  box-shadow: 0 0 8px var(--neon-glow);
  cursor: pointer;
}
/* volume slider thumb = green */
#sliderVol::-webkit-slider-thumb { background: var(--green); box-shadow: 0 0 8px var(--green-glow); }
#sliderVol::-moz-range-thumb     { background: var(--green); box-shadow: 0 0 8px var(--green-glow); }

/* wobble slider thumb = warm amber/cream */
#sliderWobble::-webkit-slider-thumb { background: #ffe0a0; box-shadow: 0 0 10px rgba(255,210,100,0.7); }
#sliderWobble::-moz-range-thumb     { background: #ffe0a0; box-shadow: 0 0 10px rgba(255,210,100,0.7); }
#sliderWobble { background: linear-gradient(to right, var(--amber-lo), rgba(255,210,100,0.25)); }

.wobble-val-wrap {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  /* width 固定 + flex-shrink:0 で、モード文字列の長さ変化により
     val-wrap が伸縮 → スライダー幅が脈打つバグを防ぐ。
     "▸ CASSETTE" が最長 (~62px @9px font, ls 2px) なので 80px 確保。 */
  width: 80px;
  flex-shrink: 0;
  /* 2行レイアウトで他行より行高が嵩むので、はみ出した分は overflow せず詰める */
  overflow: hidden;
}
.wobble-mode {
  font-size: 9px;
  letter-spacing: 2px;
  color: rgba(255,210,100,0.6);
  margin-top: 2px;
  text-transform: uppercase;
  white-space: nowrap;
  /* 万一はみ出しても省略表示で崩れない */
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}
.setting-val.wobble-val { color: #ffe0a0; }

.setting-val {
  font-size: 13px;
  color: var(--amber);
  min-width: 36px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}
.setting-val.vol-val { color: var(--green); }

/* ─── HISTORY ─── */
.history-wrap {
  padding: 10px 28px 6px;
  border-bottom: 1px solid var(--amber-lo);
  display: none;
}
.history-label {
  font-size: 9px;
  letter-spacing: 4px;
  color: var(--dim2);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.histlist {
  list-style: none;
}
.histlist li {
  font-size: 10px;
  color: var(--dim2);
  padding: 1px 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: 0.5px;
}
.histlist li:first-child { color: var(--dim); }
.histlist li::before {
  content: '⏮ ';
  opacity: 0.4;
  font-size: 8px;
}

/* ─── FILE LIST ─── */
.filelist-wrap {
  padding: 12px 28px 16px;
  max-height: 150px;
  overflow-y: auto;
  /* Firefox 用標準プロパティ。-webkit-scrollbar は Chrome/Safari 専用で
     Firefox では太いデフォルトバーが出てジュークボックスの細身デザインが崩れていた。 */
  scrollbar-width: thin;
  scrollbar-color: var(--amber-lo) transparent;
}
.filelist-wrap::-webkit-scrollbar { width: 3px; }
.filelist-wrap::-webkit-scrollbar-track { background: transparent; }
.filelist-wrap::-webkit-scrollbar-thumb { background: var(--amber-lo); border-radius: 2px; }

.filelist {
  list-style: none;
}
.filelist li {
  font-size: 10px;
  color: var(--dim2);
  padding: 2px 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: 0.5px;
  transition: color 0.2s, background 0.15s;
  cursor: pointer;
  border-radius: 3px;
}
.filelist li:hover {
  color: var(--amber-dim);
  background: rgba(0,229,204,0.05);
}
.filelist li.active {
  color: var(--amber);
  text-shadow: 0 0 6px rgba(0,229,204,0.4);
}

/* ─── FOOTER ─── */
.footer {
  padding: 10px 28px;
  background: var(--panel2);
  border-top: 1px solid var(--amber-lo);
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 9px;
  color: var(--dim2);
  letter-spacing: 2px;
}
.kbd-hint { letter-spacing: 1px; opacity: 0.6; }

/* hidden input */
#folderInput { display: none; }

/* ─── SLEEP TIMER ─── */
.sleep-row {
  flex-wrap: wrap;
}
.sleep-buttons {
  display: flex;
  gap: 6px;
  flex: 1;
  flex-wrap: wrap;
}
.sleep-btn {
  flex: 1;
  min-width: 38px;
  /* WCAG 2.5.5 Target Size: 44px に近づけてタップ精度を上げる
     （元 32px は指タップで誤爆しやすかった） */
  min-height: 40px;
  padding: 9px 8px;
  border: 1px solid var(--amber-lo);
  background: transparent;
  color: var(--amber-dim);
  font-family: 'Courier New', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  cursor: pointer;
  border-radius: 4px;
  transition: all 0.15s;
  outline: none;
  touch-action: manipulation;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.sleep-btn.active {
  border-color: var(--amber);
  color: var(--amber);
  background: rgba(0,229,204,0.10);
  box-shadow: 0 0 10px rgba(0,229,204,0.18);
}
.sleep-btn:active { transform: scale(0.95); }
.setting-val.sleep-val { color: var(--neon); min-width: 50px; font-size: 11px; }

/* ─── VOLUME LABEL (clickable for mute) ───
   <button> で実装することで keyboard tab/Enter/Space 操作と
   スクリーンリーダー対応を獲得する。デフォルトのボタン外観は
   全てリセットして .setting-label と同じ見た目に揃える。 */
.vol-label-clickable {
  cursor: pointer;
  position: relative;
  transition: color 0.15s;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
  /* button reset */
  appearance: none;
  -webkit-appearance: none;
  background: transparent;
  border: 0;
  padding: 0;
  margin: 0;
  text-align: left;
  font: inherit;
  color: inherit;
  letter-spacing: inherit;
}
.vol-label-clickable::before {
  content: '🔊 ';
  font-size: 11px;
}
.vol-label-clickable.muted::before { content: '🔇 '; }
.vol-label-clickable.muted { color: var(--red); }

/* ─── SEARCH ─── */
.search-wrap {
  padding: 8px 28px 0;
  display: flex;
  align-items: center;
  gap: 8px;
}
#searchInput {
  flex: 1;
  background: var(--panel3);
  border: 1px solid var(--amber-lo);
  color: var(--cream);
  font-family: 'Courier New', monospace;
  font-size: 12px;
  padding: 8px 10px;
  border-radius: 4px;
  outline: none;
  min-height: 36px;
  letter-spacing: 0.5px;
  -webkit-appearance: none;
  appearance: none;
}
#searchInput:focus {
  border-color: var(--amber);
  box-shadow: 0 0 8px rgba(0,229,204,0.2);
}
#searchInput::placeholder { color: var(--dim2); }
.search-count {
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 1px;
  min-width: 42px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}

/* ─── REDUCED MOTION: 前庭障害対応 ───
   ビニル回転・バナー脈動・status-dot blink・active時の scale など
   ユーザが視覚的揺れを嫌うと宣言した場合は全て止める。
   transition は色等のみのため残してもよいが、安全側で 0.01ms に短縮。 */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
  .vinyl, .vinyl.spinning { animation: none !important; }
  #restoreBanner { animation: none !important; }
  .status-dot.on, .status-dot.xfade { animation: none !important; }
  .btn:active:not(:disabled),
  .sleep-btn:active,
  #restoreBtn:active { transform: none !important; }
  input[type=range]::-webkit-slider-thumb:hover { transform: none !important; }
}

/* ─── TOUCH DEVICES: prevent sticky hover ─── */
@media (hover: none), (pointer: coarse) {
  .btn:hover:not(:disabled) {
    border-color: var(--amber-lo);
    color: var(--amber-dim);
    background: transparent;
    box-shadow: none;
  }
  .btn.primary:hover:not(:disabled) {
    background: var(--amber);
    border-color: var(--amber);
    color: var(--bg);
    box-shadow: 0 0 18px rgba(0,229,204,0.4);
  }
  .btn.primary.stop-mode:hover:not(:disabled) {
    background: transparent;
    color: var(--red);
    border-color: var(--red);
    box-shadow: 0 0 14px rgba(255,68,85,0.2);
  }
  .btn.full-btn.full-active:hover:not(:disabled) {
    background: rgba(61,255,143,0.06);
    box-shadow: 0 0 18px rgba(61,255,143,0.2);
  }
  .btn.repeat-btn.repeat-active:hover:not(:disabled) {
    background: rgba(0,255,238,0.06);
    box-shadow: 0 0 18px rgba(0,255,238,0.2);
  }
  .btn.restore-btn:hover:not(:disabled) {
    background: rgba(0,229,204,0.08);
    box-shadow: 0 0 12px rgba(0,229,204,0.15);
  }
  #restoreBtn:hover {
    background: var(--amber);
    border-color: var(--amber);
    box-shadow: 0 0 18px rgba(0,229,204,0.35);
  }
  .filelist li:hover {
    color: var(--dim2);
    background: transparent;
  }
  .sleep-btn:hover {
    border-color: var(--amber-lo);
    color: var(--amber-dim);
    background: transparent;
  }
  .sleep-btn.active:hover {
    border-color: var(--amber);
    color: var(--amber);
    background: rgba(0,229,204,0.10);
  }
  input[type=range]::-webkit-slider-thumb:hover { transform: none; }
}

/* ─── MOBILE ─── */
@media (max-width: 480px) {
  /* ヘッダーも safe-area を尊重（ノッチ/角丸ディスプレイで右側 "L-BOX" の "X" が
     見切れていた問題への対応。letter-spacing が大きいと末尾が画面外に飛び出す） */
  .header {
    padding: 16px max(18px, env(safe-area-inset-right)) 14px max(18px, env(safe-area-inset-left));
  }
  .header h1 { font-size: 32px; letter-spacing: 12px; }
  /* 各セクションの左右 padding に safe-area-inset を反映。
     旧 16px 固定だと、Android のノッチ/カットアウト・iOS のホームバー横の
     セーフエリア外に内容が描画されて「右側が画面エッジに張り付く／隠れる」状態だった。 */
  .now-playing, .controls, .settings,
  .status-bar, .history-wrap, .filelist-wrap, .footer {
    padding-left: max(16px, env(safe-area-inset-left));
    padding-right: max(16px, env(safe-area-inset-right));
  }
  .search-wrap {
    padding-left: max(16px, env(safe-area-inset-left));
    padding-right: max(16px, env(safe-area-inset-right));
  }
  #restoreBanner {
    padding: 12px max(16px, env(safe-area-inset-right)) 12px max(16px, env(safe-area-inset-left));
  }
  .setting-label {
    width: 82px;
    font-size: 9px;
    letter-spacing: 0.5px;
  }
  .setting-val {
    min-width: 34px;
    font-size: 11px;
  }
  /* モード最長 "▸ CASSETTE" に合わせて 64px (8px font, ls 1px で約60px) */
  .wobble-val-wrap { width: 64px; }
  .wobble-mode { font-size: 8px; letter-spacing: 1px; }

  /* ── Larger touch targets on mobile ── */
  input[type=range] { height: 6px; }
  input[type=range]::-webkit-slider-thumb { width: 22px; height: 22px; }
  input[type=range]::-moz-range-thumb     { width: 22px; height: 22px; }

  .filelist-wrap { max-height: 200px; -webkit-overflow-scrolling: touch; }
  .filelist li { padding: 6px 4px; font-size: 11px; }
  .histlist li { padding: 3px 0; }

  /* footer too cramped on mobile — hide kbd hint */
  .footer .kbd-hint { display: none; }

  .sleep-buttons { gap: 4px; }
  /* モバイルもタップターゲットを 38px 以上に維持 */
  .sleep-btn { font-size: 9px; min-width: 32px; min-height: 38px; padding: 9px 4px; letter-spacing: 0; }
}
</style>
</head>
<body>

<div class="jukebox">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <h1>L-BOX</h1>
      <div class="header-sub">Random Music Player</div>
    </div>
    <div class="vinyl" id="vinyl" aria-hidden="true"></div>
  </div>

  <!-- NOW PLAYING -->
  <div class="now-playing">
    <div class="np-label" id="npLabel">▶ NOW PLAYING</div>
    <div class="np-title idle" id="npTitle" aria-live="polite" aria-atomic="true" aria-labelledby="npLabel">— フォルダを選択して再生を開始してください —</div>

    <div class="progress-row">
      <div class="progress-bg" id="progressBar" role="progressbar" aria-label="再生進捗" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="phase-label" aria-hidden="true">
      <span class="phase-pill" id="pillPlay">PLAYING</span>
      <span>→</span>
      <span class="phase-pill" id="pillFade">CROSSFADE</span>
      <span>→</span>
      <span class="phase-pill" id="pillFull">FULL PLAY</span>
    </div>

    <div class="next-row">
      <span class="next-prefix">NEXT ▶</span>
      <span class="next-name" id="nextTitle">—</span>
    </div>
  </div>

  <!-- STATUS -->
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <div class="status-text" id="statusText">STOPPED</div>
    <div class="file-count-badge" id="fileBadge">0 files</div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button class="btn" id="btnFolder">📁 フォルダ選択</button>
    <button class="btn primary" id="btnPlay" disabled aria-pressed="false" onclick="togglePlay()">▶ PLAY</button>
    <button class="btn" id="btnSkip" disabled onclick="skipTrack()">⏭ スキップ</button>
    <div class="full-repeat-row">
      <button class="btn full-btn" id="btnFull" disabled aria-pressed="false" onclick="toggleFullPlay()">♾ フルで聴く</button>
      <button class="btn repeat-btn" id="btnRepeat" disabled aria-pressed="false" onclick="toggleRepeatOne()">🔂 リピート1</button>
    </div>
  </div>

  <!-- RESTORE BANNER -->
  <div id="restoreBanner" style="display:none">
    <span id="restoreIcon">📂</span>
    <div id="restoreTextGroup">
      <div id="restoreTitle">▶ 前回のフォルダ</div>
      <div id="restoreInfo"></div>
    </div>
    <button id="restoreBtn">↩ ワンクリックで復元</button>
  </div>

  <!-- SETTINGS -->
  <div class="settings">
    <div class="settings-header">
      <div class="settings-title">⚙ SETTINGS</div>
      <div class="total-badge">合計 1枠 = <span id="totalBadge">20s</span></div>
    </div>
    <div class="setting-row">
      <label class="setting-label" for="sliderPlay">再生時間 (solo)</label>
      <input type="range" id="sliderPlay" min="5" max="120" value="12" oninput="onSettingChange()">
      <div class="setting-val" id="valPlay">12s</div>
    </div>
    <div class="setting-row">
      <label class="setting-label" for="sliderFade">クロスフェード</label>
      <input type="range" id="sliderFade" min="1" max="30" value="8" oninput="onSettingChange()">
      <div class="setting-val" id="valFade">8s</div>
    </div>
    <div class="setting-row">
      <button type="button" class="setting-label vol-label-clickable" id="volLabel" title="クリックでミュート (M)" aria-pressed="false" aria-label="ミュート切替（M キーでも可）">ボリューム</button>
      <input type="range" id="sliderVol" min="0" max="100" value="80" oninput="onVolumeChange()" aria-label="ボリューム">
      <div class="setting-val vol-val" id="valVol">80%</div>
    </div>
    <div class="setting-row">
      <label class="setting-label" for="sliderWobble">揺らぎ ✦</label>
      <input type="range" id="sliderWobble" min="0" max="100" value="0" oninput="onWobbleChange()">
      <div class="wobble-val-wrap">
        <div class="setting-val wobble-val" id="valWobble">0</div>
        <div class="wobble-mode" id="wobbleMode">— OFF —</div>
      </div>
    </div>
    <div class="setting-row sleep-row">
      <div class="setting-label" id="sleepLabel">⏰ スリープ</div>
      <div class="sleep-buttons" id="sleepButtons" role="group" aria-labelledby="sleepLabel">
        <button type="button" class="sleep-btn active" data-min="0" aria-label="スリープタイマー解除">OFF</button>
        <button type="button" class="sleep-btn" data-min="15" aria-label="15分後にスリープ">15m</button>
        <button type="button" class="sleep-btn" data-min="30" aria-label="30分後にスリープ">30m</button>
        <button type="button" class="sleep-btn" data-min="60" aria-label="60分後にスリープ">60m</button>
        <button type="button" class="sleep-btn" data-min="90" aria-label="90分後にスリープ">90m</button>
      </div>

  </div>

  <!-- HISTORY -->
  <div class="history-wrap" id="historyWrap">

  <!-- SEARCH -->
  <div class="search-wrap" id="searchWrap" style="display:none">
    <input type="search" id="searchInput" placeholder="🔍 曲を検索..." aria-label="曲を検索（／キーでフォーカス、Esc でクリア）" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <span class="search-count" id="searchCount"></span>
  </div>

  <!-- FILE LIST -->
  <div class="filelist-wrap">
    <ul class="filelist" id="fileList"></ul>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <span>RANDOM JUKEBOX</span>
    <span class="kbd-hint">SPACE=再生 　→=スキップ 　F=フル 　R=リピート 　M=ミュート</span>
    <span>HTML5 AUDIO</span>
  </div>

</div>

<input type="file" id="folderInput" webkitdirectory multiple accept="audio/*">

<script>
// ════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════
let files        = [];
let currentIdx   = -1;
let nextIdx      = -1;
let isPlaying    = false;
let isFading     = false;
let isFullPlay   = false;      // フルで聴くモード（1曲フル → 次へ）
let isRepeatOne  = false;      // リピート1モード（現在曲を頭から無限ループ）
let activeSlot   = 0;

let playDuration = 12;         // solo play seconds (12 + 8 = 20)
let fadeDuration = 8;          // crossfade seconds
let masterVolume = 0.8;        // 0.0 – 1.0

let slotEndTime  = 0;
let fadeTimer    = null;
let tickTimer    = null;
let xfadeTimer   = null;

// ── 操作世代番号 ──
// playTrack / startCrossfade の呼び出しごとにインクリメントし、
// 非同期コールバック（loadedmetadata・ended・setInterval）の冒頭で
// 自分の世代と現在の operationId が一致するか確認する。
// 不一致なら古い操作のコールバックなので即 return する。
let operationId  = 0;

// ── フルモード ended リスナー参照 ──
// toggleFullPlay が audio.addEventListener('ended', onFullEnded) で登録した
// 関数の参照を保持する。stopAll / playTrack の冒頭で removeEventListener に
// 渡すことで、連打時にリスナーが Audio 要素に蓄積するのを防ぐ。
let _onFullEnded = null;

let playHistory  = [];         // 再生履歴 (最大5件)

// ── 外部割り込み / ロック画面操作 ──
// userPaused: 通知パネルのポーズボタン等で「ユーザーが意図して止めた」場合に true。
//   visibilitychange / statechange の自動復帰ロジックはこのフラグを尊重し、
//   勝手に再開しない。MediaSession 'play' / togglePlay / stopAll でクリア。
let userPaused = false;

// ── 内部 audio.pause() 判別フラグ ──
// finishCrossfade / resolveActiveSlot 等の内部処理から呼ぶ audio.pause() は
// onExternalPause に「外部中断」と誤検知させてはいけない。誤検知すると pauseStartMs が
// 立ち、次のスロットの play() で onExternalPlay が "pausedMs ぶん slotEndTime を後ろへ"
// 補正してしまい、毎クロスフェードで slotEndTime が約 playDuration ぶんずつ後ろへずれて、
// 最終的に audio.duration を超えて自然終了 → 次曲が来ず音が鳴らなくなる致命バグになる。
// この値が >0 の間に発火した pause/play イベントは内部由来とみなして無視する。
// HTML spec 上 'pause' は "queue a media element task" でディスパッチされる可能性が
// あるため、queueMicrotask ではなく setTimeout で次タスク以降まで保持する。
// 100ms 窓内に発生する外部 pause は確率的に無視されるが実害ない（電話着信等が
// クロスフェード完了の 100ms 以内に発生するレース条件は非現実的）。
let _internalAudioOp = 0;
function markInternalAudioOp() {
  _internalAudioOp++;
  setTimeout(() => { _internalAudioOp = Math.max(0, _internalAudioOp - 1); }, 100);
}

// ── 次曲プリロード ──
let preloadTimer        = null;    // 次曲を先行ロードするタイマー
let preloadedForIdx     = -1;      // プリロード完了済みの nextIdx（-1=未プリロード）
// schedulePreload が登録した onPreloadMeta の解除関数。startCrossfade が
// プリロード不使用で再ロードする際に明示的に除去することで、古いリスナーと
// 新しい onNextMeta が loadedmetadata を二重処理するのを防ぐ。
let _preloadMetaCleanup = null;

// ── 揺らぎエンジン ──
let wobbleIntensity = 0;       // 0.0 – 1.0
let breathGainA = null, breathGainB = null;
let lofiFilterA = null, lofiFilterB = null;
let wobblePannerA = null, wobblePannerB = null;
let noiseSource = null, noiseGainNode = null;
let wobbleLoopId = null;

// Brownian motion state
let _wow = 0, _wowV = 0;
let _breathPh = [0, Math.PI * 0.73];
let _panPh    = [0, Math.PI * 1.37];
let _filtPh   = 0;

// ── 拡張子を除いた表示名 ──
function stripExt(filename) {
  return filename.replace(/\.[^.]+$/, '');
}

// ════════════════════════════════════════════════════════
//  MEDIA SESSION (ロック画面 / 通知パネルからの操作)
// ════════════════════════════════════════════════════════
// Android Brave / Chrome で画面ロック時の通知に曲名を表示し、
// 通知パネルや BT ヘッドフォンの再生/停止/次へボタンを受け付ける。
// 電話着信後の自動復帰にも MediaSession 'play' が呼ばれることがある。
function setupMediaSession() {
  if (!('mediaSession' in navigator)) return;
  const ms = navigator.mediaSession;
  const safe = fn => () => { try { fn(); } catch(_) {} };

  try {
    ms.setActionHandler('play', safe(() => {
      userPaused = false;
      if (!isPlaying) {
        togglePlay();
      } else {
        // 外部 pause（電話着信等）からの復帰
        const a = audios[activeSlot];
        if (a && a.src && a.paused) a.play().catch(() => {});
      }
      setMediaSessionPlaybackState('playing');
    }));

    ms.setActionHandler('pause', safe(() => {
      pauseAll();
    }));

    ms.setActionHandler('nexttrack', safe(() => {
      if (isPlaying) skipTrack();
    }));

    // ランダムジュークボックスに「前曲」の概念がない。
    // null を渡して明示的に無効化することで、ロック画面/通知パネル/BTリモコンで
    // previous ボタンが押下不可（グレーアウト）になり、誤って次曲へ飛ぶUXバグを防ぐ。
    try { ms.setActionHandler('previoustrack', null); } catch(_) {}

    try {
      ms.setActionHandler('stop', safe(() => {
        if (isPlaying) stopAll();
      }));
    } catch(_) {}
  } catch (e) {
    console.warn('MediaSession setup failed:', e);
  }
}

function updateMediaSessionMetadata(title) {
  if (!('mediaSession' in navigator) || typeof MediaMetadata === 'undefined') return;
  try {
    navigator.mediaSession.metadata = new MediaMetadata({
      title:  stripExt(title || ''),
      artist: 'L-BOX',
      album:  'Random Jukebox'
    });
  } catch (_) {}
}

function setMediaSessionPlaybackState(state) {
  if (!('mediaSession' in navigator)) return;
  try { navigator.mediaSession.playbackState = state; } catch (_) {}
}

// ── localStorage 書き込みのデバウンス ──
// スライダーの input イベントは 1ドラッグで数十～数百回発火する。
// 毎回 setItem するとシリアル化＋同期 I/O で UI がカクつくので、
// キーごとに 200ms のレートリミットをかける。最後の値だけが書かれる。
const _saveTimers = {};
function debouncedSave(key, value) {
  clearTimeout(_saveTimers[key]);
  _saveTimers[key] = setTimeout(() => {
    try { localStorage.setItem(key, value); } catch (_) {}
  }, 200);
}

// Safari プライベートモード等で localStorage.setItem が SecurityError を投げる
// ケースを吸収する。書き込みに失敗しても致命的ではないので静かに無視する。
function safeLSSet(key, value) {
  try { localStorage.setItem(key, value); } catch (_) {}
}
function safeLSGet(key) {
  try { return localStorage.getItem(key); } catch (_) { return null; }
}

// ════════════════════════════════════════════════════════
//  PLAYBACK ADVANCE GUARD
//  fadeTimer 内で「進めるべきか / 様子見すべきか」を判定するヘルパー。
//  バックグラウンドで setTimeout が遅延し、発火時には audio が
//  自然終了 (paused かつ ended) しているケースが頻発する。旧実装は
//  `if (paused) return` で一律様子見していたため、自然終了した曲で
//  クロスフェードが永遠に始まらず "音が止まる" バグになっていた。
// ════════════════════════════════════════════════════════
function shouldAdvancePlayback() {
  if (userPaused) return false;          // ユーザー意図の pause → 様子見
  const a = audios[activeSlot];
  if (!a) return true;                   // slot 不在は仕切り直し
  if (!a.paused) return true;            // 通常再生中 → 進める
  // paused: 自然終了か外部 pause かを判定
  const naturallyDone = a.ended ||
    (isFinite(a.duration) && a.currentTime >= a.duration - 0.3);
  return naturallyDone;                  // 終了 → 進める / 外部 pause → 様子見
}

// ════════════════════════════════════════════════════════
//  WATCHDOG — バックグラウンド時の "音が止まる" 最終防衛線
//  - fadeTimer がブラウザの省電力で大幅に遅延した
//  - audio.play() が NotAllowedError で silently fail した
//  - ended イベントが届かなかった (ブラウザバグ)
//  これらで進行が止まったとき、5秒ごとに状態を確認して復帰させる。
//  バックグラウンドでも setInterval は完全には停止しない（最低数秒
//  おきには発火する）ため、最終防衛線として機能する。
// ════════════════════════════════════════════════════════
let watchdogTimer = null;
function startWatchdog() {
  if (watchdogTimer) return;
  watchdogTimer = setInterval(checkPlaybackHealth, 5000);
}
function stopWatchdog() {
  if (watchdogTimer) { clearInterval(watchdogTimer); watchdogTimer = null; }
}
function checkPlaybackHealth() {
  if (!isPlaying || userPaused) return;

  const a = audios[activeSlot];

  // リピート1: audio.loop=true が進行を担うので、停止していれば軽くキックするだけ
  if (isRepeatOne) {
    if (a && a.src && a.paused) {
      a.play().catch(() => {});
      // tickTimer が停止していた場合（visibilitychange 等）もプログレスバーを再起動する
      startRepeatCountdown();
    }
    return;
  }

  // フルプレイモード: ended 取りこぼしの保険
  if (isFullPlay) {
    if (a && a.src && a.paused && (a.ended ||
        (isFinite(a.duration) && a.currentTime >= a.duration - 0.5))) {
      isFullPlay = false;
      updateFullBtn();
      playTrack(false);
    }
    return;
  }

  // クロスフェード進行中はノータッチ
  if (isFading) return;
  if (!a) return;

  // src なし = 復旧不能 → playTrack で仕切り直す
  if (!a.src) {
    playTrack(false);
    return;
  }
  // 自然終了したのにクロスフェードが始まっていない
  if (a.paused && (a.ended ||
      (isFinite(a.duration) && a.currentTime >= a.duration - 0.3))) {
    triggerNextSong();
    return;
  }
  // 外部 pause が解けないまま slotEndTime を大幅に超過 → 強制 advance
  if (slotEndTime > 0 && Date.now() > slotEndTime + 5000) {
    triggerNextSong();
    return;
  }
  // paused だが ended でもない → 復帰を試みる（連打にならないよう静かに）
  if (a.paused) {
    a.play().catch(() => {});
  }
}

// ════════════════════════════════════════════════════════
//  AUDIO ELEMENTS
// ════════════════════════════════════════════════════════
const audioA = new Audio();
const audioB = new Audio();
const audios = [audioA, audioB];
audioA.preload = audioB.preload = 'none';

// playbackRate 変更時にブラウザのピッチ補正（Preserve Pitch）を無効化する。
// 補正が有効だと「テープの回転ムラ」効果が打ち消されて平坦な変速になってしまう。
// 標準プロパティ + ベンダープレフィックス（Firefox旧・Safari旧）を両方設定する。
function disablePitchPreservation(audio) {
  audio.preservesPitch       = false;   // 標準（Chrome 86+, Firefox 99+, Safari 16+）
  audio.mozPreservesPitch    = false;   // Firefox 旧バージョン
  audio.webkitPreservesPitch = false;   // Safari 旧バージョン
}
audios.forEach(disablePitchPreservation);

// 各スロットが現在保持しているオブジェクトURL（メモリリーク防止用）
const slotObjectURL = [null, null];

/**
 * 指定スロットの audio.src に ObjectURL をセットし、
 * 以前のURLを revokeObjectURL で解放する。
 */
function setSlotSrc(slot, file) {
  // 古いURLを解放
  if (slotObjectURL[slot]) {
    URL.revokeObjectURL(slotObjectURL[slot]);
    slotObjectURL[slot] = null;
  }
  const url = URL.createObjectURL(file);
  slotObjectURL[slot] = url;
  audios[slot].src = url;
  // src の再セット後にピッチ補正が再有効化されるブラウザがあるため毎回適用する
  disablePitchPreservation(audios[slot]);
}

/**
 * 指定スロットの audio.src をクリアし、ObjectURLも解放する。
 */
function clearSlotSrc(slot) {
  if (slotObjectURL[slot]) {
    URL.revokeObjectURL(slotObjectURL[slot]);
    slotObjectURL[slot] = null;
  }
  try { audios[slot].src = ''; } catch(_) {}
}

// ════════════════════════════════════════════════════════
//  WEB AUDIO API
// ════════════════════════════════════════════════════════
let actx       = null;
let analyser   = null;
let gainA      = null;
let gainB      = null;
let masterGain = null;

function initAudioContext() {
  // 生成のみ行う。resume は resumeAudioContext() に完全に委ねる。
  // ここで actx.resume() を fire-and-forget すると resumeAudioContext() での
  // await resume() と二重呼び出し競合が起きるため意図的に行わない。
  if (actx) return;
  try {
    actx = new (window.AudioContext || window.webkitAudioContext)();

    // ── statechange リスナーは actx 生成と同時に登録 ──
    //   以前は setupAutoResume 内で 200ms ポーリングで actx の出現を待っていたが、
    //   ユーザーが一度も再生しないとポーリングが永続して電池を浪費するため、
    //   生成時点で直接 addEventListener する方式へ変更した。
    try {
      actx.addEventListener('statechange', () => {
        if (!actx) return;
        // suspended へ落ちた: 再生中なら能動的に resume を試みる
        if (actx.state === 'suspended' && isPlaying && !userPaused) {
          actx.resume().catch(() => {});
          return;
        }
        // running 復帰: audio 要素が paused になっているケースをカバー
        // (a.play() は 'play' イベントで onExternalPlay を発火し、
        //  pauseStartMs / wasPlayingBeforeInterrupt をクリーンアップしてくれる)
        if (actx.state === 'running' && isPlaying && !userPaused) {
          audios.forEach(a => {
            if (a.src && a.paused) a.play().catch(() => {});
          });
        }
      });
    } catch(_) {}

    const srcA = actx.createMediaElementSource(audioA);
    const srcB = actx.createMediaElementSource(audioB);

    gainA = actx.createGain(); gainA.gain.value = 1;
    gainB = actx.createGain(); gainB.gain.value = 0;

    analyser = actx.createAnalyser();

    masterGain = actx.createGain();
    masterGain.gain.value = masterVolume;

    // WebAudio がゲイン制御を引き継ぐので element.volume を 1.0 にリセット
    // （boot 時に fallback で 0 にセットされていると次の曲が無音になるバグを防ぐ）
    audioA.volume = 1.0;
    audioB.volume = 1.0;

    // ── 揺らぎノード (slot A) ──
    breathGainA = actx.createGain(); breathGainA.gain.value = 1;
    lofiFilterA = actx.createBiquadFilter();
    lofiFilterA.type = 'lowpass'; lofiFilterA.frequency.value = 20000; lofiFilterA.Q.value = 0.5;
    wobblePannerA = actx.createStereoPanner(); wobblePannerA.pan.value = 0;

    // ── 揺らぎノード (slot B) ──
    breathGainB = actx.createGain(); breathGainB.gain.value = 1;
    lofiFilterB = actx.createBiquadFilter();
    lofiFilterB.type = 'lowpass'; lofiFilterB.frequency.value = 20000; lofiFilterB.Q.value = 0.5;
    wobblePannerB = actx.createStereoPanner(); wobblePannerB.pan.value = 0;

    // ── ピンクノイズ ──
    noiseGainNode = actx.createGain(); noiseGainNode.gain.value = 0;
    try {
      const nBuf = actx.createBuffer(1, actx.sampleRate * 3, actx.sampleRate);
      const nd = nBuf.getChannelData(0);
      let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
      for (let i=0;i<nd.length;i++) {
        const wh = Math.random()*2-1;
        b0=0.99886*b0+wh*0.0555179; b1=0.99332*b1+wh*0.0750759;
        b2=0.96900*b2+wh*0.1538520; b3=0.86650*b3+wh*0.3104856;
        b4=0.55000*b4+wh*0.5329522; b5=-0.7616*b5-wh*0.0168980;
        nd[i]=(b0+b1+b2+b3+b4+b5+b6+wh*0.5362)*0.11; b6=wh*0.115926;
      }
      noiseSource = actx.createBufferSource();
      noiseSource.buffer = nBuf; noiseSource.loop = true;
      noiseSource.connect(noiseGainNode);
      noiseGainNode.connect(masterGain);
      noiseSource.start();
    } catch(e) { console.warn('Noise gen failed:', e); }

    // ── グラフ接続 ──
    srcA.connect(gainA); gainA.connect(breathGainA); breathGainA.connect(lofiFilterA); lofiFilterA.connect(wobblePannerA); wobblePannerA.connect(analyser);
    srcB.connect(gainB); gainB.connect(breathGainB); breathGainB.connect(lofiFilterB); lofiFilterB.connect(wobblePannerB); wobblePannerB.connect(analyser);
    analyser.connect(masterGain);
    masterGain.connect(actx.destination);
  } catch(e) {
    console.warn('AudioContext unavailable:', e);
  }
}

/**
 * ユーザージェスチャーの文脈（クリックイベント等）で呼ぶことで、
 * ブラウザの自動再生ポリシーに準拠しながら AudioContext を確実に起動する。
 *
 * ① actx が未生成なら initAudioContext() で生成する
 * ② 生成済みでも suspended 状態なら resume() を await で待つ
 *    ─ initAudioContext() は resume を行わないため二重呼び出し競合は発生しない
 * ③ resume 後も suspended のまま（ポリシー拒否）なら警告をログに残す
 * ④ 常に Promise<void> を返すので await で安全に待てる
 */
async function resumeAudioContext() {
  initAudioContext();           // 未生成なら生成（resume は行わない）
  if (!actx) return;
  if (actx.state !== 'suspended') return;  // 既に running / closed なら不要
  try {
    await actx.resume();
  } catch(e) {
    console.warn('AudioContext resume failed:', e);
  }
  // resume 完了後も suspended のまま = ブラウザポリシーによる拒否（iOS Safari 等）
  if (actx.state === 'suspended') {
    console.warn('AudioContext はユーザー操作後も suspended のままです。ブラウザのポリシーを確認してください。');
  }
}

/**
 * クロスフェード割り込み時に「今どちらが主役か」をゲインで判定し
 * activeSlot を確定する。小さい方のスロットは pause + clearSlotSrc する。
 * ゲイン値はそのまま保持して startCrossfade の xfadeTimer に引き継ぐ。
 */
function resolveActiveSlot() {
  const inSlot  = 1 - activeSlot;
  const getGain = s => (actx && (s === 0 ? gainA : gainB))
    ? (s === 0 ? gainA.gain.value : gainB.gain.value)
    : audios[s].volume;

  const inGain  = getGain(inSlot);
  const outGain = getGain(activeSlot);

  if (inGain > outGain) {
    // フェードインが進んでいる → inSlot を activeSlot に昇格
    markInternalAudioOp();
    try { audios[activeSlot].pause(); } catch (_) {}
    clearSlotSrc(activeSlot);
    setSlotGain(activeSlot, 0);
    activeSlot = inSlot;
  } else {
    // outSlot がまだ主役 → inSlot だけ止める
    markInternalAudioOp();
    try { audios[inSlot].pause(); } catch (_) {}
    clearSlotSrc(inSlot);
    setSlotGain(inSlot, 0);
  }
  // activeSlot のゲインはそのまま保持（急激な音量変化を避ける）
}

function setSlotGain(slot, value) {
  const v = Math.max(0, Math.min(1, value));
  if (actx && gainA) {
    // 進行中の linearRamp 等オートメーションを必ず取り消してから即値に確定する。
    // これにより skip/stop 時にゲインがランプの途中値で止まる不具合を防げる。
    const gNode = slot === 0 ? gainA : gainB;
    const now = actx.currentTime;
    gNode.gain.cancelScheduledValues(now);
    gNode.gain.setValueAtTime(v, now);
  } else {
    audios[slot].volume = v * masterVolume;
  }
}

function applyMasterVolume() {
  if (actx && masterGain) {
    masterGain.gain.value = masterVolume;
  } else {
    // fallback: re-apply to both slots
    const slotVols = [gainA ? gainA.gain.value : (activeSlot === 0 ? 1 : 0),
                      gainB ? gainB.gain.value : (activeSlot === 1 ? 1 : 0)];
    audios.forEach((a, i) => { a.volume = slotVols[i] * masterVolume; });
  }
}

// ════════════════════════════════════════════════════════
//  INDEXEDDB — フォルダハンドル永続化
// ════════════════════════════════════════════════════════
const IDB_NAME = 'jukeboxDB', IDB_STORE = 'kv';
const idbOpen = () => new Promise((res, rej) => {
  const r = indexedDB.open(IDB_NAME, 1);
  r.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE);
  r.onsuccess = e => res(e.target.result);
  r.onerror   = e => rej(e.target.error);
});
const idbGet = async key => {
  try {
    const db = await idbOpen();
    return await new Promise((res, rej) => {
      const req = db.transaction(IDB_STORE).objectStore(IDB_STORE).get(key);
      req.onsuccess = e => res(e.target.result ?? null);
      req.onerror   = e => rej(e.target.error);
    });
  } catch(e) { return null; }
};
const idbSet = async (key, val) => {
  try {
    const db = await idbOpen();
    await new Promise((res, rej) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).put(val, key);
      tx.oncomplete = () => res();
      tx.onerror    = e => rej(e.target.error);
    });
  } catch(e) {}
};

// ════════════════════════════════════════════════════════
//  FILE SELECTION
// ════════════════════════════════════════════════════════

// フォルダボタン: onclick 属性なし、JS で完全管理
document.getElementById('btnFolder').addEventListener('click', () => selectFolder());

async function selectFolder() {
  if (window.showDirectoryPicker) {
    try {
      const handle = await window.showDirectoryPicker({ mode: 'read' });
      await idbSet('folderHandle', handle);
      safeLSSet('lastFolderName', handle.name);
      await loadFilesFromHandle(handle);
      updateFolderBtn(handle.name);
      hideBanner();
    } catch(e) {
      if (e.name !== 'AbortError') console.warn('Folder picker error:', e);
    }
  } else {
    document.getElementById('folderInput').click();
  }
}

// fallback: <input webkitdirectory>
document.getElementById('folderInput').addEventListener('change', function(e) {
  const exts = /\.(mp3|wav|ogg|flac|aac|m4a|opus|weba|wma)$/i;
  files = Array.from(e.target.files)
    .filter(f => exts.test(f.name))
    .sort((a, b) => a.name.localeCompare(b.name, 'ja'));
  renderFileList();
  document.getElementById('fileBadge').textContent = files.length + ' files';
  document.getElementById('btnPlay').disabled = files.length === 0;
  if (isPlaying) stopAll();
  // フォルダ名をLocalStorageに保存してボタンを更新
  if (e.target.files.length > 0) {
    const folderName = e.target.files[0].webkitRelativePath.split('/')[0] || 'フォルダ';
    safeLSSet('lastFolderName', folderName);
    updateFolderBtn(folderName);
  }
});

async function loadFilesFromHandle(handle) {
  const exts = /\.(mp3|wav|ogg|flac|aac|m4a|opus|weba|wma)$/i;
  const arr  = [];

  // サブフォルダも含めて走査する。<input webkitdirectory> のフォールバック経路と
  // 挙動を揃えるため再帰する。深さ制限はディレクトリ循環を防ぐためのガード。
  async function walk(dirHandle, depth) {
    if (depth > 8) return;
    for await (const entry of dirHandle.values()) {
      if (entry.kind === 'file' && exts.test(entry.name)) {
        try { arr.push(await entry.getFile()); }
        catch (_) { /* 読めないファイルはスキップ */ }
      } else if (entry.kind === 'directory') {
        try { await walk(entry, depth + 1); }
        catch (_) { /* 権限なしのサブフォルダはスキップ */ }
      }
    }
  }
  await walk(handle, 0);

  arr.sort((a, b) => a.name.localeCompare(b.name, 'ja'));
  files = arr;
  renderFileList();
  document.getElementById('fileBadge').textContent = files.length + ' files';
  document.getElementById('btnPlay').disabled = files.length === 0;
  if (isPlaying) stopAll();
}

function updateFolderBtn(name) {
  const short = name.length > 10 ? name.slice(0, 10) + '…' : name;
  document.getElementById('btnFolder').textContent = `📂 ${short}`;
}

function hideBanner() {
  const banner = document.getElementById('restoreBanner');
  banner.style.display = 'none';
  // showErrorBanner が立てた role=alert を残すと、次に通常バナーで表示した際に
  // スクリーンリーダーが「警告」として読み上げてしまう。隠す段階で必ず外す。
  banner.removeAttribute('role');
}

function showBanner(folderName, onRestoreClick) {
  const short = folderName.length > 28 ? folderName.slice(0, 28) + '…' : folderName;
  document.getElementById('restoreTitle').textContent = '▶ 前回のフォルダ';
  document.getElementById('restoreInfo').textContent = `「${short}」を検出しました`;
  const banner = document.getElementById('restoreBanner');
  banner.style.display = 'flex';
  banner.removeAttribute('role');  // 通常バナーは alert ロール不要
  // ボタンを複製してリスナーをリセット
  const oldBtn = document.getElementById('restoreBtn');
  const newBtn = oldBtn.cloneNode(true);
  newBtn.textContent = '↩ ワンクリックで復元';
  oldBtn.parentNode.replaceChild(newBtn, oldBtn);
  newBtn.addEventListener('click', onRestoreClick);
}

// alert() の代替：既存バナーをエラー表示に流用して非破壊通知する。
// onRetry を渡せば「再選択」クリックで元のフロー (selectFolder 等) に戻れる。
function showErrorBanner(message, onRetry) {
  document.getElementById('restoreTitle').textContent = '⚠ 復元に失敗';
  document.getElementById('restoreInfo').textContent = message;
  const banner = document.getElementById('restoreBanner');
  banner.style.display = 'flex';
  // role=alert を付けてスクリーンリーダーに即時通知する
  banner.setAttribute('role', 'alert');
  const oldBtn = document.getElementById('restoreBtn');
  const newBtn = oldBtn.cloneNode(true);
  newBtn.textContent = '↻ フォルダを選び直す';
  oldBtn.parentNode.replaceChild(newBtn, oldBtn);
  newBtn.addEventListener('click', () => {
    hideBanner();
    if (typeof onRetry === 'function') onRetry();
  });
}

async function tryRestoreFolder() {
  const savedName = safeLSGet('lastFolderName');

  // ── 対応環境: IndexedDB の handle で自動復元を試みる ──
  // Android Chrome / iOS Safari / Firefox には showDirectoryPicker が無いので
  // この経路はスキップされ、後続のフォールバックバナーへ流れる。
  if (window.showDirectoryPicker) {
    try {
      const handle = await idbGet('folderHandle');
      if (handle) {
        let perm;
        try { perm = await handle.queryPermission({ mode: 'read' }); }
        catch(e) { perm = 'prompt'; }

        if (perm === 'granted') {
          try {
            await loadFilesFromHandle(handle);
            updateFolderBtn(handle.name);
            hideBanner();
            return;     // 自動復元成功 → フォールバック不要
          } catch(e) {
            showBanner(savedName || handle.name || 'フォルダ', () => restoreWithPermission(handle));
            return;
          }
        } else {
          // 'prompt' or 'denied' → ワンクリック復元バナー
          showBanner(savedName || handle.name || 'フォルダ', () => restoreWithPermission(handle));
          return;
        }
      }
      // handle が無い場合は下のフォールバックへ流す
    } catch(e) {
      console.log('Folder restore error:', e);
    }
  }

  // ── フォールバック: 名前だけ残っている / API 非対応 ──
  // Android Chrome や iOS Safari など showDirectoryPicker 非対応の環境では
  // handle 永続化ができないため、せめて「前回のフォルダ名」を表示して
  // ワンクリックで再選択できるバナーを出す。これが無いと「何も復元されない／
  // 何のバナーも出ない」状態になり、ユーザーが毎回ゼロから探すハメになる。
  if (savedName) showFallbackRestoreBanner(savedName);
}

// showDirectoryPicker 非対応 / handle 紛失時のフォールバックバナー。
// ボタンを押すと selectFolder() が走り、ピッカー or webkitdirectory フォールバックを呼ぶ。
function showFallbackRestoreBanner(folderName) {
  const short = folderName.length > 28 ? folderName.slice(0, 28) + '…' : folderName;
  document.getElementById('restoreTitle').textContent = '▶ 前回のフォルダ';
  document.getElementById('restoreInfo').textContent  = `「${short}」 — もう一度選択するとリスト復活`;
  const banner = document.getElementById('restoreBanner');
  banner.style.display = 'flex';
  banner.removeAttribute('role');
  const oldBtn = document.getElementById('restoreBtn');
  const newBtn = oldBtn.cloneNode(true);
  newBtn.textContent = '📁 フォルダを選び直す';
  oldBtn.parentNode.replaceChild(newBtn, oldBtn);
  newBtn.addEventListener('click', () => {
    hideBanner();
    selectFolder();
  });
}

async function restoreWithPermission(handle) {
  try {
    let perm;
    try { perm = await handle.queryPermission({ mode: 'read' }); }
    catch(e) { perm = 'prompt'; }

    if (perm !== 'granted') {
      perm = await handle.requestPermission({ mode: 'read' });
    }
    if (perm === 'granted') {
      await loadFilesFromHandle(handle);
      updateFolderBtn(handle.name);
      safeLSSet('lastFolderName', handle.name);
      hideBanner();
    } else {
      // 非破壊バナー：UI を止めずユーザの次操作を待つ
      showErrorBanner('フォルダへのアクセスが拒否されました。', selectFolder);
    }
  } catch(e) {
    console.warn('Permission request failed:', e);
    showErrorBanner('フォルダの復元に失敗しました。', selectFolder);
  }
}

function renderFileList() {
  const ul = document.getElementById('fileList');
  ul.innerHTML = '';

  if (files.length === 0) {
    // 対応形式ゼロ時の説明メッセージ（無言で disabled だと原因が伝わらない）
    const msg = document.createElement('li');
    msg.className = 'filelist-empty-msg';
    msg.textContent = '対応音源が見つかりませんでした（mp3 / wav / ogg / flac / aac / m4a / opus / weba / wma）';
    msg.style.cssText = 'color: var(--dim2); padding: 8px 4px; cursor: default; font-style: italic; white-space: normal;';
    ul.appendChild(msg);
  } else {
    // ── DocumentFragment で 1 回のリフローにまとめる ──
    //   曲数が多い (数百〜) ライブラリで appendChild N 回によるレイアウトコストを削減。
    const frag = document.createDocumentFragment();
    files.forEach((f, i) => {
      const li = document.createElement('li');
      li.id = 'fi-' + i;
      li.textContent = stripExt(f.name);
      li.title = f.name;
      // ── キーボード操作対応 (WCAG 2.1.1) ──
      // tabindex=0 で Tab 到達可、role=button で SR がボタンとして読む、
      // keydown で Enter/Space を click と同等に扱う。
      li.tabIndex = 0;
      li.setAttribute('role', 'button');
      li.addEventListener('click', () => playSpecificTrack(i));
      li.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          playSpecificTrack(i);
        }
      });
      frag.appendChild(li);
    });
    ul.appendChild(frag);
  }

  // 検索ボックスの表示 / フィルタ再適用
  const searchWrap = document.getElementById('searchWrap');
  if (searchWrap) searchWrap.style.display = files.length > 0 ? 'flex' : 'none';
  applySearchFilter();
}

// ════════════════════════════════════════════════════════
//  SEARCH / FILTER
// ════════════════════════════════════════════════════════
function applySearchFilter() {
  const input = document.getElementById('searchInput');
  if (!input) return;
  const q = input.value.toLowerCase().trim();
  let visible = 0;
  const lis = document.querySelectorAll('.filelist li');
  lis.forEach((li, i) => {
    // 空フォルダ用プレースホルダ li は検索対象外で常に表示
    if (li.classList.contains('filelist-empty-msg')) {
      li.style.display = '';
      return;
    }
    if (!q) {
      li.style.display = '';
      visible++;
    } else {
      const name = files[i] ? stripExt(files[i].name).toLowerCase() : '';
      const match = name.includes(q);
      li.style.display = match ? '' : 'none';
      if (match) visible++;
    }
  });
  const countEl = document.getElementById('searchCount');
  if (countEl) countEl.textContent = q ? (visible + ' / ' + files.length) : '';
}

function highlightFile(idx) {
  document.querySelectorAll('.filelist li').forEach(l => l.classList.remove('active'));
  const li = document.getElementById('fi-' + idx);
  if (li) { li.classList.add('active'); }
}

// ════════════════════════════════════════════════════════
//  PLAY SPECIFIC TRACK (曲一覧クリック — クロスフェードで切り替え)
// ════════════════════════════════════════════════════════
async function playSpecificTrack(idx) {
  if (files.length === 0 || idx < 0 || idx >= files.length) return;

  // まだ再生していない場合は通常起動
  if (!isPlaying) {
    await resumeAudioContext();  // クリック文脈で確実に resume
    isPlaying = true;
    activeSlot = 0;
    // stopAll() で element.volume が 0 になっている場合に備えて 1.0 に戻す
    audios.forEach(a => { a.volume = 1.0; });
    const _bp = document.getElementById('btnPlay');
    _bp.textContent = '⏹ STOP';
    _bp.classList.add('stop-mode');
    _bp.setAttribute('aria-pressed', 'true');
    document.getElementById('btnSkip').disabled   = false;
    document.getElementById('btnFull').disabled   = false;
    document.getElementById('btnRepeat').disabled = false;

    isFading    = false;
    isFullPlay  = false;
    isRepeatOne = false;
    audios.forEach(a => { a.loop = false; });
    updateRepeatBtn();
    operationId++;               // 古い非同期処理を無効化
    clearTimeout(fadeTimer);
    clearInterval(xfadeTimer);
    clearInterval(tickTimer);
    updateFullBtn();

    audios.forEach((a, i) => { markInternalAudioOp(); try { a.pause(); } catch (_) {} clearSlotSrc(i); });
    activeSlot = 0;
    setSlotGain(0, 1);
    setSlotGain(1, 0);

    nextIdx = idx;
    startWatchdog();             // 5秒間隔のヘルスチェックを開始
    playTrack(false);
    return;
  }

  // リピート1 中: 指定曲を新しいリピート対象として頭から再生し直す
  if (isRepeatOne) {
    playRepeatOneTrack(idx);
    return;
  }

  // 再生中 → クロスフェードで指定曲へ切り替え
  // skipTrack と同様に、クロスフェード中でも受け付けて即座にリセットする。

  operationId++;                 // 進行中のすべての非同期コールバックを無効化
  isFullPlay = false;
  isFading   = false;            // クロスフェード中フラグを強制解除
  clearTimeout(fadeTimer);
  clearTimeout(preloadTimer);
  if (_preloadMetaCleanup) { _preloadMetaCleanup(); _preloadMetaCleanup = null; }
  if (_onFullEnded) { audios.forEach(a => a.removeEventListener('ended', _onFullEnded)); _onFullEnded = null; }
  preloadedForIdx = -1;
  // xfadeTimer は startCrossfade の Web Audio ルートでは setTimeout、
  // フォールバックでは setInterval で使われるため両方クリアする。
  clearTimeout(xfadeTimer);
  clearInterval(xfadeTimer);
  clearInterval(tickTimer);
  updateFullBtn();

  // クロスフェード途中の場合、ゲインが大きい方を activeSlot に昇格させ小さい方を止める。
  // ゲインはいじらず現在値のまま startCrossfade に引き継ぐ（急激な音量変化を防ぐ）。
  resolveActiveSlot();
  if (nextIdx >= 0) currentIdx = nextIdx;

  nextIdx = idx;

  const nextFile = files[nextIdx];
  if (nextFile) setUIPlaying(nextFile.name, true);

  slotEndTime = Date.now() + (fadeDuration + playDuration) * 1000;
  startCountdown(fadeDuration + playDuration, slotEndTime);
  startCrossfade(true);  // operationId はインクリメント済み
}


// ════════════════════════════════════════════════════════
//  揺らぎエンジン
// ════════════════════════════════════════════════════════
function getWobbleMode(v) {
  if (v === 0)  return '— OFF —';
  if (v <= 20)  return '▸ かすか';
  if (v <= 50)  return '▸ ゆらぎ';
  if (v <= 66)  return '▸ たゆたい';
  if (v <= 80)  return '▸ うねり';
  return '▸ とうすい';
}

function onWobbleChange() {
  const slider = document.getElementById('sliderWobble');
  const raw = +slider.value;
  wobbleIntensity = raw / 100;
  document.getElementById('valWobble').textContent = raw;
  const modeLabel = getWobbleMode(raw);
  document.getElementById('wobbleMode').textContent = modeLabel;
  // SR には数値だけでなくモード名も伝える（例: "0 OFF" / "45 ゆらぎ"）
  slider.setAttribute('aria-valuetext', raw + ' ' + modeLabel.replace(/[—▸\s]/g, ''));

  if (wobbleIntensity === 0) resetWobbleNodes();
  if (wobbleIntensity > 0 && !wobbleLoopId) startWobbleLoop();
  if (wobbleIntensity === 0 && wobbleLoopId) {
    clearInterval(wobbleLoopId); wobbleLoopId = null;
  }
  debouncedSave('jukebox_wobble', raw);
}

function resetWobbleNodes() {
  audios.forEach(a => { try { a.playbackRate = 1; } catch(_) {} });
  const t = actx ? actx.currentTime : 0;
  if (breathGainA)  breathGainA.gain.setTargetAtTime(1, t, 0.3);
  if (breathGainB)  breathGainB.gain.setTargetAtTime(1, t, 0.3);
  if (lofiFilterA)  lofiFilterA.frequency.setTargetAtTime(20000, t, 0.5);
  if (lofiFilterB)  lofiFilterB.frequency.setTargetAtTime(20000, t, 0.5);
  if (wobblePannerA) wobblePannerA.pan.setTargetAtTime(0, t, 0.3);
  if (wobblePannerB) wobblePannerB.pan.setTargetAtTime(0, t, 0.3);
  if (noiseGainNode) noiseGainNode.gain.setTargetAtTime(0, t, 0.3);
}

function startWobbleLoop() {
  if (wobbleLoopId) return;
  // 不可視時に起動要求が来た場合は省電力のため起動しない。
  // 可視へ戻ったタイミングで applyWobbleVisibilityRate() が再起動する。
  if (document.hidden) return;
  wobbleLoopId = setInterval(wobbleTick, 65);
}

function wobbleTick() {
  if (!actx || wobbleIntensity === 0 || !isPlaying) return;
  const w   = wobbleIntensity;   // 0.01 – 1.0
  const t   = actx.currentTime;
  const now = Date.now();

  // ── Wow / Flutter（ピッチ揺れ）──
  // w=0.01 でほぼ気づかない、w=1.0 で明らかにわかる。
  // Brownian motion: ランダムウォーク＋緩やかなダンプ
  _wowV += (Math.random() - 0.5) * 0.0006 * w;
  _wowV *= 0.94;
  _wow  += _wowV;
  const wowRange = 0.003 + w * 0.030;          // w=1→±3.3%
  _wow = Math.max(-wowRange, Math.min(wowRange, _wow));
  // Flutter: テープの高周波揺れ
  const flutter = (Math.sin(now * 0.11) * 0.0025
                 + Math.sin(now * 0.067) * 0.0015
                 + (Math.random() - 0.5) * 0.001) * w;
  const rate = Math.max(0.92, Math.min(1.08, 1 + _wow + flutter));
  audios.forEach(a => { try { if (!a.paused) a.playbackRate = rate; } catch(_) {} });

  // ── 呼吸感（Breathing gain）──
  // ゆったりした周期でやさしく波打つ。不快にならない下限を自動設定。
  _breathPh[0] += 0.006 + Math.random() * 0.002;
  _breathPh[1] += 0.005 + Math.random() * 0.002;
  const breathDepth = w * 0.30;                // w=1→最大 -30%
  const b0 = 1 - (Math.sin(_breathPh[0]) * 0.5 + 0.5) * breathDepth;
  const b1 = 1 - (Math.sin(_breathPh[1]) * 0.5 + 0.5) * breathDepth;
  const breathFloor = 1 - breathDepth;         // 深くなるほど下限も下がる
  if (breathGainA) breathGainA.gain.setTargetAtTime(Math.max(breathFloor, b0), t, 0.25);
  if (breathGainB) breathGainB.gain.setTargetAtTime(Math.max(breathFloor, b1), t, 0.25);

  // ── フィルター揺らぎ（こもり感）──
  // w=0.01 はほぼ素通し、w=1 でしっかりこもりながらゆらぐ。
  _filtPh += 0.004 + Math.random() * 0.002;
  const fBase  = 20000 - w * 14000;           // w=1→6000Hz
  const fSwing = Math.sin(_filtPh) * 3500 * w;
  const fTarget = Math.max(1000, fBase + fSwing);
  if (lofiFilterA) lofiFilterA.frequency.setTargetAtTime(fTarget,        t, 0.4);
  if (lofiFilterB) lofiFilterB.frequency.setTargetAtTime(fTarget * 0.96, t, 0.4);

  // ── 空間的揺れ（Stereo pan drift）──
  // w=0.01 はほぼ中央、w=1 で ±0.55 まで静かに漂う。
  _panPh[0] += 0.005 + Math.random() * 0.002;
  _panPh[1] += 0.004 + Math.random() * 0.002;
  const p0 = Math.sin(_panPh[0]) * w * 0.55;
  const p1 = Math.sin(_panPh[1]) * w * 0.55;
  if (wobblePannerA) wobblePannerA.pan.setTargetAtTime(p0, t, 0.35);
  if (wobblePannerB) wobblePannerB.pan.setTargetAtTime(p1, t, 0.35);

  // ── テープヒスノイズ ──
  // w=0.01 は無音同然、w=1 でうっすら感じる程度。
  const nBase  = w * 0.028;
  const nDrift = (Math.sin(_filtPh * 0.6) * 0.5 + 0.5) * 0.012 * w;
  if (noiseGainNode) noiseGainNode.gain.setTargetAtTime(nBase + nDrift, t, 0.3);
}

function onSettingChange() {
  const sliderPlay = document.getElementById('sliderPlay');
  const sliderFade = document.getElementById('sliderFade');
  playDuration = +sliderPlay.value;
  fadeDuration = +sliderFade.value;
  document.getElementById('valPlay').textContent    = playDuration + 's';
  document.getElementById('valFade').textContent    = fadeDuration + 's';
  document.getElementById('totalBadge').textContent = (playDuration + fadeDuration) + 's';
  // SR 向けに単位「秒」を読ませる
  sliderPlay.setAttribute('aria-valuetext', playDuration + '秒');
  sliderFade.setAttribute('aria-valuetext', fadeDuration + '秒');
  // 設定の永続化（ドラッグ中の連続発火を debouncedSave で吸収）
  debouncedSave('jukebox_play', sliderPlay.value);
  debouncedSave('jukebox_fade', sliderFade.value);
}

function onVolumeChange() {
  const sliderVol = document.getElementById('sliderVol');
  masterVolume = +sliderVol.value / 100;
  const pct = Math.round(masterVolume * 100);
  document.getElementById('valVol').textContent = pct + '%';
  // SR 向けに単位「%」とミュート状態を読ませる
  sliderVol.setAttribute('aria-valuetext', pct === 0 ? 'ミュート' : pct + 'パーセント');
  applyMasterVolume();
  debouncedSave('jukebox_vol', sliderVol.value);
  // ミュート表示の同期（スライダーを手動で 0 へ動かしたケースもラベルへ反映）
  const label = document.getElementById('volLabel');
  if (label) {
    const muted = masterVolume === 0;
    label.classList.toggle('muted', muted);
    label.setAttribute('aria-pressed', muted ? 'true' : 'false');
  }
}

// ════════════════════════════════════════════════════════
//  HISTORY
// ════════════════════════════════════════════════════════
function addToHistory(name) {
  if (!name || playHistory[0] === name) return;
  playHistory.unshift(name);
  if (playHistory.length > 5) playHistory.pop();
  renderHistory();
}

function renderHistory() {
  const ul   = document.getElementById('historyList');
  const wrap = document.getElementById('historyWrap');
  ul.innerHTML = '';
  playHistory.forEach(name => {
    const li = document.createElement('li');
    li.textContent = stripExt(name);
    ul.appendChild(li);
  });
  wrap.style.display = playHistory.length > 0 ? 'block' : 'none';
}

// ════════════════════════════════════════════════════════
//  RANDOM HELPERS
// ════════════════════════════════════════════════════════
function randIdx(exclude = -1) {
  const len = files.length;
  if (len === 0) return -1;          // ファイルなし（呼び元で防ぐが念のため）
  if (len === 1) return 0;           // 1曲しかないので exclude を無視して返す
  if (exclude < 0 || exclude >= len) // exclude が無効値なら単純ランダム
    return Math.floor(Math.random() * len);

  // exclude を避けて選ぶ：候補配列から直接ランダム選択（ループ試行なし）
  const idx = Math.floor(Math.random() * (len - 1));
  return idx < exclude ? idx : idx + 1;
}

// ════════════════════════════════════════════════════════
//  PLAY / STOP
// ════════════════════════════════════════════════════════
async function togglePlay() {
  if (isPlaying) { pauseAll(); return; }

  // 一時停止中（src が残っている）なら resumeAll で再開
  const hasSrc = audios.some(a => a.src && a.src !== '');
  if (hasSrc && currentIdx >= 0) {
    await resumeAll();
    return;
  }

  // 初回または完全停止後の新規スタート
  userPaused = false;
  await resumeAudioContext();
  isPlaying  = true;
  activeSlot = 0;
  audios.forEach(a => { a.volume = 1.0; });
  setSlotGain(0, 1);
  setSlotGain(1, 0);
  const _btnPlay = document.getElementById('btnPlay');
  _btnPlay.textContent = '⏹ STOP';
  _btnPlay.classList.add('stop-mode');
  _btnPlay.setAttribute('aria-pressed', 'true');
  document.getElementById('btnSkip').disabled   = false;
  document.getElementById('btnFull').disabled   = false;
  document.getElementById('btnRepeat').disabled = false;
  startWatchdog();
  playTrack(true);
}

// ════════════════════════════════════════════════════════
//  PAUSE (一時停止 — タイマー・状態を保持したまま音だけ止める)
// ════════════════════════════════════════════════════════
function pauseAll() {
  // ── クロスフェード中ポーズの整合性確定 ──
  // クロスフェード中に通知パネル/PLAYボタン経由でポーズすると、wall-clock 駆動の
  // xfadeTimer はポーズ中も発火し、finishCrossfade が走ってスロット切替と
  // nextIdx 再抽選が起きる。復帰時に NEXT 表示や残り時間が「ポーズ前と違う」状態
  // になる整合性崩れにつながるため、ポーズ時点で xfadeTimer をクリアし、
  // ゲインを「クロスフェード完了形」に確定して finishCrossfade を即時実行する。
  // これにより resumeAll 時点では「新曲スロットが activeSlot」の確定状態から再生再開できる。
  if (isFading) {
    clearTimeout(xfadeTimer);
    const _outSlot = activeSlot;
    const _inSlot  = 1 - activeSlot;
    if (actx && gainA && gainB) {
      const now = actx.currentTime;
      const outNode = _outSlot === 0 ? gainA : gainB;
      const inNode  = _inSlot  === 0 ? gainA : gainB;
      outNode.gain.cancelScheduledValues(now);
      outNode.gain.setValueAtTime(0, now);
      inNode.gain.cancelScheduledValues(now);
      inNode.gain.setValueAtTime(1, now);
    }
    finishCrossfade(_outSlot, _inSlot);
  }

  isPlaying  = false;
  userPaused = true;
  // 音だけ止める（src・タイマー・インデックスは残す）
  audios.forEach(a => {
    markInternalAudioOp();
    try { a.pause(); } catch (_) {}
  });
  if (actx && masterGain) {
    masterGain.gain.cancelScheduledValues(actx.currentTime);
    masterGain.gain.setValueAtTime(masterVolume, actx.currentTime);
  }
  // wobble ノイズ消音
  if (noiseGainNode && actx) {
    noiseGainNode.gain.setTargetAtTime(0, actx.currentTime, 0.2);
  }
  const btnPlay = document.getElementById('btnPlay');
  btnPlay.textContent = '▶ PLAY';
  btnPlay.classList.remove('stop-mode');
  btnPlay.setAttribute('aria-pressed', 'false');
  document.getElementById('vinyl').classList.remove('spinning');
  setMediaSessionPlaybackState('paused');
}

// ポーズ後の再開
async function resumeAll() {
  if (isPlaying) return;
  userPaused = false;
  isPlaying  = true;
  await resumeAudioContext();
  // 両スロットのうち src がある方を再生再開
  audios.forEach(a => {
    if (a.src) a.play().catch(() => {});
  });
  if (noiseGainNode && actx && wobbleIntensity > 0) {
    // wobble が有効なら再生再開時にノイズも戻す（wobbleTick が担うが即時反映のため）
  }
  const btnPlay = document.getElementById('btnPlay');
  btnPlay.textContent = '⏹ STOP';
  btnPlay.classList.add('stop-mode');
  btnPlay.setAttribute('aria-pressed', 'true');
  document.getElementById('vinyl').classList.add('spinning');
  setMediaSessionPlaybackState('playing');

  // visibilitychange で非表示中に tickTimer が clearInterval されていた場合、
  // 復帰時は !isPlaying でスキップされるため再起動されない。
  // resumeAll 側で確実に再起動してプログレスバーを動かす。
  if (isFullPlay) {
    startFullCountdown();
  } else if (isRepeatOne) {
    startRepeatCountdown();
  } else if (currentIdx >= 0) {
    const remSec = Math.max(0, (slotEndTime - Date.now()) / 1000);
    startCountdown(remSec, slotEndTime);
  }
}

function stopAll() {
  isPlaying   = false;
  isFading    = false;
  stopWatchdog();              // ヘルスチェック停止
  isFullPlay  = false;
  isRepeatOne = false;
  audios.forEach(a => { a.loop = false; });   // audio.loop を確実に解除
  operationId++;                 // 進行中のすべての非同期コールバックを無効化
  clearTimeout(fadeTimer);
  clearTimeout(preloadTimer);    // プリロードタイマーも止める
  if (_preloadMetaCleanup) { _preloadMetaCleanup(); _preloadMetaCleanup = null; }  // preload リスナーを除去
  preloadedForIdx = -1;
  clearInterval(tickTimer);
  clearInterval(xfadeTimer);

  // toggleFullPlay が残した ended リスナーを両スロットから一掃する。
  // operationId のインクリメントだけではリスナー自体は Audio 要素に残り続けるため
  // 明示的に removeEventListener する必要がある。
  if (_onFullEnded) {
    audios.forEach(a => a.removeEventListener('ended', _onFullEnded));
    _onFullEnded = null;
  }

  // クロスフェード中のオートメーション（gain ramp）をキャンセルして
  // スロットゲインを即時 0 にする。masterGain は次回 PLAY 用に
  // masterVolume を維持する（即時 0 を挟むと同 currentTime の上書きで
  // 打ち消されるだけなので意味がない）。
  if (actx && masterGain) {
    masterGain.gain.cancelScheduledValues(actx.currentTime);
    masterGain.gain.setValueAtTime(masterVolume, actx.currentTime);
  }
  if (actx && gainA) {
    gainA.gain.cancelScheduledValues(actx.currentTime);
    gainA.gain.setValueAtTime(0, actx.currentTime);
  }
  if (actx && gainB) {
    gainB.gain.cancelScheduledValues(actx.currentTime);
    gainB.gain.setValueAtTime(0, actx.currentTime);
  }

  // pause() の失敗（エラー状態の audio 要素、play/pause 競合など）が
  // clearSlotSrc の呼び出しをスキップさせないよう try-catch で分離する。
  // forEach はコールバック内の例外を呼び出し元に伝播させるため、
  // pause() が slot 0 で投げると slot 1 を含む後続処理が止まる。
  audios.forEach((a, i) => {
    markInternalAudioOp();
    try { a.pause(); } catch (_) {}
    if (!actx) a.volume = 0;   // WebAudio 未使用フォールバック用のみ消音
    clearSlotSrc(i);
    setSlotGain(i, 0);  // 停止中は両スロット完全消音（次回 togglePlay で再設定）
  });

  // 停止後に masterGain を再生音量へ戻す（次回 PLAY に備える）
  if (actx && masterGain) {
    masterGain.gain.setValueAtTime(masterVolume, actx.currentTime);
  }

  // ピンクノイズを明示的に消音する。
  // wobbleIntensity > 0 のとき wobbleTick() がノイズゲインを上げ続けているため、
  // stopAll() だけでは「サー」というヒス音が鳴り続いてしまう盲点を塞ぐ。
  if (noiseGainNode && actx) {
    noiseGainNode.gain.setTargetAtTime(0, actx.currentTime, 0.2);
  }

  currentIdx = nextIdx = -1;

  const btnPlay = document.getElementById('btnPlay');
  btnPlay.textContent = '▶ PLAY';
  btnPlay.classList.remove('stop-mode');
  btnPlay.setAttribute('aria-pressed', 'false');
  document.getElementById('btnSkip').disabled   = true;
  document.getElementById('btnFull').disabled   = true;
  document.getElementById('btnRepeat').disabled = true;
  updateFullBtn();
  updateRepeatBtn();

  // スリープタイマーが動作中なら停止と同時に解除（ユーザーが先に止めたケース）
  if (sleepTimerId || sleepDisplayTimer || sleepEndTime > 0) {
    clearTimeout(sleepTimerId);
    clearInterval(sleepDisplayTimer);
    sleepTimerId = null;
    sleepDisplayTimer = null;
    sleepEndTime = 0;
    document.querySelectorAll('.sleep-btn').forEach(b => {
      b.classList.toggle('active', +b.dataset.min === 0);
    });
    const v = document.getElementById('valSleep');
    if (v) v.textContent = '—';
  }

  setUIIdle();
  document.getElementById('vinyl').classList.remove('spinning');
}

// ════════════════════════════════════════════════════════
//  REPEAT 1 MODE — 現在曲を頭から無限ループ
//  audio.loop=true でブラウザ側に継ぎ目なしループを任せる。
//  Skip / 特定曲クリックでリピート対象を差し替え、トグルOFFで
//  通常のクロスフェード進行へ自然復帰する。
// ════════════════════════════════════════════════════════
function updateRepeatBtn() {
  const btn = document.getElementById('btnRepeat');
  if (!btn) return;
  if (isRepeatOne) {
    btn.textContent = '🔂 リピート解除';
    btn.classList.add('repeat-active');
    btn.setAttribute('aria-pressed', 'true');
  } else {
    btn.textContent = '🔂 リピート1';
    btn.classList.remove('repeat-active');
    btn.setAttribute('aria-pressed', 'false');
  }
}

function setUIRepeatOne() {
  document.getElementById('statusDot').className   = 'status-dot full';
  document.getElementById('statusText').textContent = 'REPEAT 1';
  document.getElementById('pillPlay').classList.remove('active');
  document.getElementById('pillFade').classList.remove('fading-pill');
  document.getElementById('pillFull').classList.remove('full-pill');
  document.getElementById('progressFill').classList.add('full-mode');
  document.getElementById('nextTitle').textContent = '🔂 同じ曲をリピート';
}

// リピート中のプログレスバー: audio.loop=true なので currentTime は
// 0..duration の間で循環する。それをそのまま % に変換するだけ。
function startRepeatCountdown() {
  clearInterval(tickTimer);
  const audio = audios[activeSlot];
  const progressFill = document.getElementById('progressFill');
  const progressBar  = document.getElementById('progressBar');
  let lastAriaVal = -1;

  tickTimer = setInterval(() => {
    if (!isRepeatOne) { clearInterval(tickTimer); return; }
    // 一時停止中はバーを更新しない
    if (!isPlaying) return;
    const total = isFinite(audio.duration) ? audio.duration : 1;
    const pct   = total > 0 ? (audio.currentTime / total) * 100 : 0;
    progressFill.style.width = pct + '%';
    const ariaVal = Math.round(pct);
    if (ariaVal !== lastAriaVal) {
      progressBar.setAttribute('aria-valuenow', ariaVal);
      lastAriaVal = ariaVal;
    }
  }, 80);
}

/**
 * 指定曲を「最初から無限ループ」で再生する。
 * リピート1モード内での Skip / 曲クリック / モード突入のすべてが本関数を経由する。
 * 既存の playTrack を流用せず分離するのは、
 *   - シーク位置をランダムにせず必ず 0 に固定
 *   - フェードインを行わず即フル音量
 *   - fadeTimer / preload を一切セットしない（次曲が存在しない）
 * という挙動が通常モードと根本的に違うため。
 */
function playRepeatOneTrack(idx) {
  if (!isPlaying || idx < 0 || idx >= files.length) return;

  isFading   = false;
  isFullPlay = false;
  updateFullBtn();

  const myOp = ++operationId;
  clearTimeout(fadeTimer);
  clearTimeout(preloadTimer);
  if (_preloadMetaCleanup) { _preloadMetaCleanup(); _preloadMetaCleanup = null; }
  if (_onFullEnded) { audios.forEach(a => a.removeEventListener('ended', _onFullEnded)); _onFullEnded = null; }
  preloadedForIdx = -1;
  clearInterval(xfadeTimer);
  clearInterval(tickTimer);

  currentIdx = idx;
  nextIdx    = idx;   // リピート中の next は自分自身

  const slot      = activeSlot;
  const audio     = audios[slot];
  const file      = files[currentIdx];
  const otherSlot = 1 - slot;

  // 反対側スロットを完全に止める（クロスフェード途中で入った場合の名残を一掃）
  markInternalAudioOp();
  try { audios[otherSlot].pause(); } catch(_) {}
  clearSlotSrc(otherSlot);
  setSlotGain(otherSlot, 0);
  audios[otherSlot].loop = false;

  setSlotGain(slot, 1);   // リピート1はフェードイン不要：即フル音量
  highlightFile(currentIdx);
  document.getElementById('nextTitle').textContent = '🔂 同じ曲をリピート';

  setSlotSrc(slot, file);
  audio.loop = true;

  function onMeta() {
    audio.removeEventListener('loadedmetadata', onMeta);
    audio.removeEventListener('error',          onErr);
    if (myOp !== operationId || !isPlaying || !isRepeatOne) return;

    try { audio.currentTime = 0; } catch(_) {}
    disablePitchPreservation(audio);

    audio.play().then(() => {
      if (myOp !== operationId || !isPlaying || !isRepeatOne) return;
      document.getElementById('vinyl').classList.add('spinning');
      setUIPlaying(file.name, true);   // 履歴追加 & MediaSession 反映
      setUIRepeatOne();                 // ステータスを REPEAT 1 で上書き
      startRepeatCountdown();
    }).catch(err => {
      if (myOp !== operationId || !isPlaying) return;
      console.warn('Repeat play failed:', err);
      if (actx && actx.state === 'suspended') actx.resume().catch(() => {});
      setTimeout(() => {
        if (myOp === operationId && isPlaying && isRepeatOne) playRepeatOneTrack(idx);
      }, 500);
    });
  }

  // 破損ファイル等で metadata が来ない場合は別の曲でリピート継続
  function onErr(e) {
    audio.removeEventListener('loadedmetadata', onMeta);
    audio.removeEventListener('error',          onErr);
    if (myOp !== operationId || !isPlaying) return;
    console.warn('Repeat load error, trying another:', file?.name, e);
    setTimeout(() => {
      if (myOp === operationId && isPlaying && isRepeatOne) {
        playRepeatOneTrack(randIdx(currentIdx));
      }
    }, 300);
  }

  audio.addEventListener('loadedmetadata', onMeta);
  audio.addEventListener('error',          onErr);
  audio.load();
}

function toggleRepeatOne() {
  if (!isPlaying) return;

  if (isRepeatOne) {
    // ── 解除 → 通常のクロスフェード進行へ復帰 ──
    isRepeatOne = false;
    audios.forEach(a => { a.loop = false; });
    updateRepeatBtn();
    clearInterval(tickTimer);

    const audio = audios[activeSlot];
    const myOp  = ++operationId;

    if (audio && isFinite(audio.duration)) {
      const rem = Math.max(0, audio.duration - audio.currentTime);
      nextIdx = randIdx(currentIdx);
      document.getElementById('nextTitle').textContent =
        files[nextIdx]?.name ? stripExt(files[nextIdx].name) : '—';

      if (rem > fadeDuration + 1) {
        // フェード圏外: 残り時間ぶんカウント → fadeDuration 残でクロスフェード
        slotEndTime = Date.now() + rem * 1000;
        startCountdown(rem, slotEndTime);
        clearTimeout(fadeTimer);
        fadeTimer = setTimeout(() => {
          if (myOp !== operationId || !isPlaying || isFading || isFullPlay || isRepeatOne) return;
          if (!shouldAdvancePlayback()) return;
          startCrossfade(true);
        }, Math.max(100, rem * 1000 - fadeDuration * 1000));
      } else {
        // 既にフェード圏内: 即クロスフェード
        slotEndTime = Date.now() + (fadeDuration + playDuration) * 1000;
        startCountdown(fadeDuration + playDuration, slotEndTime);
        startCrossfade(true);
      }

      // 通常表示に戻す（曲名は維持、ステータスを PLAYING へ）
      setUIPlaying(files[currentIdx]?.name ?? '', false);
    } else {
      // duration 不明: 仕切り直し
      playTrack(false);
    }
  } else {
    // ── 開始 ──
    // クロスフェード中なら NOW PLAYING に出ている曲（inSlot=nextIdx）を対象に
    const targetIdx = (isFading && nextIdx >= 0) ? nextIdx : currentIdx;

    // フルモードと排他
    if (isFullPlay) {
      isFullPlay = false;
      if (_onFullEnded) { audios.forEach(a => a.removeEventListener('ended', _onFullEnded)); _onFullEnded = null; }
      updateFullBtn();
    }

    isRepeatOne = true;
    updateRepeatBtn();
    playRepeatOneTrack(targetIdx);
  }
}

// ════════════════════════════════════════════════════════
//  FULL PLAY MODE
// ════════════════════════════════════════════════════════
function toggleFullPlay() {
  if (!isPlaying) return;

  if (isFullPlay) {
    // フルモード解除 → ノーマルへ戻す
    isFullPlay = false;
    updateFullBtn();
    clearInterval(tickTimer);

    // フルモード中に登録した ended リスナーをここで確実に除去する。
    if (_onFullEnded) {
      audios.forEach(a => a.removeEventListener('ended', _onFullEnded));
      _onFullEnded = null;
    }

    // operationId をインクリメントして古い fadeTimer 等を無効化する。
